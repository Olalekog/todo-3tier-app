# SonarQube project configuration
# Keep core settings here; CI can override projectKey per environment when needed.

sonar.projectName=react-js-application
sonar.projectKey=react-js-application
sonar.sourceEncoding=UTF-8

# Languages
sonar.python.version=3.12

# Source code to scan
sonar.sources=frontend/src,backend

# Optional test folders
sonar.tests=frontend/src,backend
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx,**/test_*.py,**/*_test.py

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.terraform/**,**/__pycache__/**,**/*.pyc,**/.git/**,**/venv/**,**/.venv/**