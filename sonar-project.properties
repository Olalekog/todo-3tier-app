# SonarQube project configuration
# Keep core settings here; CI can override projectKey per environment when needed.

sonar.projectName=react-js-application
sonar.sourceEncoding=UTF-8

# Analyze application source directories
sonar.sources=frontend/src,backend

# Exclude generated and third-party content
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.terraform/**,**/__pycache__/**,**/*.pyc
