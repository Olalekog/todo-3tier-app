<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs><style>.title{font:700 26px Arial;fill:#172033}.box{fill:#fff;stroke:#98a2b3;stroke-width:2;rx:14}.pub{fill:#ecfdf3;stroke:#12b76a;stroke-width:2;rx:14}.priv{fill:#eff8ff;stroke:#2e90fa;stroke-width:2;rx:14}.db{fill:#fff7ed;stroke:#f79009;stroke-width:2;rx:14}.h{font:700 16px Arial;fill:#111827}.t{font:400 13px Arial;fill:#344054}.arrow{stroke:#344054;stroke-width:3;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#344054"/></marker></defs>
  <text x="40" y="50" class="title">Application Request and Database Flow</text>
  <rect x="50" y="125" width="180" height="90" class="box"/><text x="85" y="160" class="h">Browser</text><text x="85" y="185" class="t">GET / and /api</text>
  <rect x="310" y="125" width="210" height="90" class="pub"/><text x="335" y="160" class="h">Frontend EC2</text><text x="335" y="185" class="t">Nginx + React container</text>
  <rect x="600" y="125" width="210" height="90" class="priv"/><text x="625" y="160" class="h">Backend EC2</text><text x="625" y="185" class="t">FastAPI container</text>
  <rect x="890" y="125" width="210" height="90" class="db"/><text x="915" y="160" class="h">RDS MySQL</text><text x="915" y="185" class="t">todos table</text>
  <path class="arrow" d="M230 170 L310 170"/><text x="247" y="154" class="t">HTTP :80</text>
  <path class="arrow" d="M520 170 L600 170"/><text x="532" y="154" class="t">/api :8000</text>
  <path class="arrow" d="M810 170 L890 170"/><text x="824" y="154" class="t">:3306</text>
  <path class="arrow" d="M890 225 C820 320 670 320 600 225"/><text x="708" y="332" class="t">Query result</text>
  <path class="arrow" d="M600 225 C530 320 390 320 520 225"/><text x="445" y="332" class="t">JSON response</text>
  <path class="arrow" d="M310 225 C230 320 120 320 230 225"/><text x="150" y="332" class="t">Rendered UI</text>
</svg>
