<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="380" viewBox="0 0 1100 380">
  <defs><style>.title{font:700 24px Arial;fill:#1f2937}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:14}.small{font:13px Arial;fill:#374151}.label{font:700 15px Arial;fill:#111827}.arrow{stroke:#111827;stroke-width:2.5;marker-end:url(#arrow)}.public{fill:#ecfdf5}.private{fill:#eff6ff}.db{fill:#fff7ed}</style><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#111827"/></marker></defs>
  <text x="40" y="45" class="title">Application Request Flow</text>
  <rect x="65" y="110" width="160" height="90" class="box"/><text x="115" y="145" class="label">Browser</text><text x="85" y="170" class="small">http://frontend-ip</text>
  <rect x="310" y="100" width="190" height="110" class="box public"/><text x="350" y="135" class="label">Frontend EC2</text><text x="340" y="162" class="small">Nginx serves React</text><text x="350" y="185" class="small">Proxy /api</text>
  <rect x="590" y="100" width="190" height="110" class="box private"/><text x="635" y="135" class="label">Backend EC2</text><text x="635" y="162" class="small">FastAPI :8000</text><text x="625" y="185" class="small">CRUD /api/todos</text>
  <rect x="865" y="100" width="160" height="110" class="box db"/><text x="905" y="135" class="label">RDS MySQL</text><text x="900" y="162" class="small">todos table</text><text x="900" y="185" class="small">seed record</text>
  <path class="arrow" d="M225 155H310"/><text x="245" y="140" class="small">HTTP :80</text>
  <path class="arrow" d="M500 155H590"/><text x="518" y="140" class="small">/api</text>
  <path class="arrow" d="M780 155H865"/><text x="800" y="140" class="small">3306</text>
  <rect x="145" y="270" width="790" height="45" class="box" fill="#f8fafc"/><text x="172" y="298" class="small">Security groups: Internet → Frontend :80, Frontend SG → Backend :8000, Backend SG → RDS :3306.</text>
</svg>
