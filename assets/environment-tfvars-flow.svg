<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <rect width="1000" height="520" fill="#f8fafc"/>
  <text x="500" y="42" font-family="Arial" font-size="26" font-weight="700" text-anchor="middle" fill="#0f172a">Environment tfvars Deployment Flow</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
  </defs>
  <g font-family="Arial" font-size="15" fill="#0f172a">
    <rect x="70" y="95" width="210" height="70" rx="12" fill="#dbeafe" stroke="#2563eb"/>
    <text x="175" y="125" text-anchor="middle" font-weight="700">GitHub Branch/Input</text>
    <text x="175" y="148" text-anchor="middle">dev | uat | prod</text>

    <rect x="395" y="95" width="210" height="70" rx="12" fill="#dcfce7" stroke="#16a34a"/>
    <text x="500" y="125" text-anchor="middle" font-weight="700">Resolve Environment</text>
    <text x="500" y="148" text-anchor="middle">set-environment job</text>

    <rect x="720" y="95" width="210" height="70" rx="12" fill="#fef3c7" stroke="#d97706"/>
    <text x="825" y="125" text-anchor="middle" font-weight="700">Select tfvars</text>
    <text x="825" y="148" text-anchor="middle">environments/&lt;env&gt;.tfvars</text>

    <line x1="280" y1="130" x2="395" y2="130" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="605" y1="130" x2="720" y2="130" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="70" y="250" width="210" height="80" rx="12" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="175" y="280" text-anchor="middle" font-weight="700">Terraform Backend</text>
    <text x="175" y="303" text-anchor="middle">S3 key per environment</text>

    <rect x="395" y="250" width="210" height="80" rx="12" fill="#fee2e2" stroke="#dc2626"/>
    <text x="500" y="280" text-anchor="middle" font-weight="700">Build and Test</text>
    <text x="500" y="303" text-anchor="middle">Docker images + tests</text>

    <rect x="720" y="250" width="210" height="80" rx="12" fill="#ccfbf1" stroke="#0f766e"/>
    <text x="825" y="280" text-anchor="middle" font-weight="700">Deploy Stack</text>
    <text x="825" y="303" text-anchor="middle">VPC, EC2, ECR, RDS</text>

    <line x1="825" y1="165" x2="825" y2="250" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="720" y1="290" x2="605" y2="290" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="395" y1="290" x2="280" y2="290" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="170" y="390" width="660" height="70" rx="12" fill="#ffffff" stroke="#64748b"/>
    <text x="500" y="420" text-anchor="middle" font-weight="700">Result</text>
    <text x="500" y="443" text-anchor="middle">Separate dev, uat, and prod infrastructure using the same reusable Terraform modules</text>
  </g>
</svg>
