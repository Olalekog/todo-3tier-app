<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000" role="img" aria-labelledby="title desc">
  <title id="title">AWS Solution Diagram - 3-Tier To-Do Application with Security and Monitoring</title>
  <desc id="desc">Architecture diagram showing React frontend, FastAPI backend, RDS MySQL, ECR, Terraform remote state, GitHub Actions OIDC, and a security tools EC2 instance running SonarQube, Trivy, Checkov, Prometheus, and Grafana.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <marker id="dashArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .h1 { font: 700 24px Arial, sans-serif; fill: #111827; }
      .h2 { font: 700 18px Arial, sans-serif; fill: #0f3b82; }
      .h3 { font: 700 16px Arial, sans-serif; fill: #111827; }
      .text { font: 14px Arial, sans-serif; fill: #111827; }
      .small { font: 12px Arial, sans-serif; fill: #111827; }
      .tiny { font: 11px Arial, sans-serif; fill: #374151; }
      .awsbox { fill: #ffffff; stroke: #111827; stroke-width: 2; }
      .outside { fill: #fbfdff; stroke: #2563eb; stroke-width: 2; stroke-dasharray: 8 7; }
      .vpc { fill: #f6fff5; stroke: #168a2f; stroke-width: 2; }
      .az { fill: #ffffff; stroke: #2563eb; stroke-width: 2; stroke-dasharray: 8 7; }
      .public { fill: #f1faed; stroke: #238823; stroke-width: 2; }
      .private { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; }
      .db { fill: #f5f0ff; stroke: #7c3aed; stroke-width: 2; }
      .security { fill: #f8fff8; stroke: #15803d; stroke-width: 2; stroke-dasharray: 8 7; }
      .card { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
      .ecr { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
      .s3 { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; }
      .tool-purple { fill: #f4f0ff; stroke: #6d28d9; stroke-width: 2; }
      .tool-teal { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; }
      .tool-blue { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; }
      .tool-orange { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
      .line { stroke: #111827; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #374151; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#dashArrow); }
      .legend { fill: #ffffff; stroke: #1e3a8a; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1800" height="1000" fill="#ffffff"/>
  <text x="900" y="44" text-anchor="middle" class="title">AWS Solution Diagram - 3-Tier To-Do Application with Security and Monitoring</text>

  <!-- User and AWS boundary -->
  <g>
    <circle cx="62" cy="350" r="26" fill="#ffffff" stroke="#111827" stroke-width="4"/>
    <path d="M 25 435 Q 62 375 99 435" fill="#ffffff" stroke="#111827" stroke-width="4"/>
    <rect x="25" y="435" width="74" height="48" rx="8" fill="#ffffff" stroke="#111827" stroke-width="4"/>
    <circle cx="62" cy="459" r="14" fill="#e0f2fe" stroke="#111827" stroke-width="2"/>
    <text x="62" y="514" text-anchor="middle" class="h3">User Browser</text>
  </g>

  <rect x="175" y="70" width="1265" height="760" rx="8" class="awsbox"/>
  <rect x="175" y="70" width="72" height="64" fill="#111827"/>
  <text x="211" y="107" text-anchor="middle" font-family="Arial" font-size="26" font-weight="700" fill="#ffffff">aws</text>
  <text x="266" y="113" class="h1">AWS Cloud</text>

  <path d="M 105 435 L 175 435" class="line"/>
  <text x="123" y="415" class="small">HTTP/HTTPS</text>

  <!-- VPC -->
  <rect x="270" y="130" width="705" height="445" rx="8" class="vpc"/>
  <text x="310" y="166" font-family="Arial" font-size="22" font-weight="700" fill="#047857">VPC - react-js-application</text>

  <!-- Internet Gateway -->
  <g>
    <circle cx="242" cy="430" r="44" fill="#f5f3ff" stroke="#6d28d9" stroke-width="4"/>
    <path d="M 220 450 L 220 411 L 242 397 L 264 411 L 264 450" fill="none" stroke="#6d28d9" stroke-width="5"/>
    <text x="242" y="497" text-anchor="middle" class="h3">Internet</text>
    <text x="242" y="516" text-anchor="middle" class="h3">Gateway</text>
  </g>
  <path d="M 286 430 L 330 430" class="line"/>

  <!-- Application AZs -->
  <rect x="305" y="190" width="205" height="360" rx="8" class="az"/>
  <text x="407" y="217" text-anchor="middle" class="h2">Availability Zone A</text>
  <rect x="335" y="245" width="150" height="260" rx="8" class="public"/>
  <text x="410" y="278" text-anchor="middle" fill="#166534" font-family="Arial" font-size="15" font-weight="700">Public Subnet</text>
  <text x="410" y="300" text-anchor="middle" class="text">Internet-facing</text>
  <rect x="365" y="340" width="88" height="74" rx="8" fill="#f97316"/>
  <text x="409" y="388" text-anchor="middle" font-family="Arial" font-size="42" font-weight="700" fill="#ffffff">EC2</text>
  <text x="410" y="447" text-anchor="middle" class="h1">Frontend EC2</text>
  <rect x="350" y="463" width="120" height="55" rx="6" class="card"/>
  <text x="410" y="486" text-anchor="middle" class="small">React + Nginx</text>
  <text x="410" y="504" text-anchor="middle" class="small">Docker Container</text>

  <rect x="540" y="190" width="205" height="360" rx="8" class="az"/>
  <text x="642" y="217" text-anchor="middle" class="h2">Availability Zone B</text>
  <rect x="570" y="245" width="150" height="260" rx="8" class="private"/>
  <text x="645" y="278" text-anchor="middle" fill="#1d4ed8" font-family="Arial" font-size="15" font-weight="700">Private App Subnet</text>
  <text x="645" y="300" text-anchor="middle" class="text">Private</text>
  <rect x="600" y="340" width="88" height="74" rx="8" fill="#f97316"/>
  <text x="644" y="388" text-anchor="middle" font-family="Arial" font-size="42" font-weight="700" fill="#ffffff">EC2</text>
  <text x="645" y="447" text-anchor="middle" class="h1">Backend EC2</text>
  <rect x="585" y="463" width="120" height="55" rx="6" class="card"/>
  <text x="645" y="486" text-anchor="middle" class="small">FastAPI</text>
  <text x="645" y="504" text-anchor="middle" class="small">Docker Container</text>

  <rect x="775" y="190" width="170" height="360" rx="8" class="az"/>
  <text x="860" y="217" text-anchor="middle" class="h2">Availability Zone C</text>
  <rect x="795" y="245" width="130" height="260" rx="8" class="db"/>
  <text x="860" y="278" text-anchor="middle" fill="#5b21b6" font-family="Arial" font-size="15" font-weight="700">Private DB Subnet</text>
  <text x="860" y="300" text-anchor="middle" class="text">Private</text>
  <rect x="828" y="340" width="72" height="74" rx="8" fill="#2563eb"/>
  <text x="864" y="386" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700" fill="#ffffff">DB</text>
  <text x="860" y="447" text-anchor="middle" class="h1">RDS MySQL</text>
  <rect x="815" y="463" width="92" height="55" rx="6" class="card"/>
  <text x="861" y="486" text-anchor="middle" class="small">Private DB</text>
  <text x="861" y="504" text-anchor="middle" class="small">Subnets</text>

  <path d="M 453 377 L 598 377" class="line"/>
  <text x="505" y="358" class="small">API :8000</text>
  <path d="M 688 377 L 826 377" class="line"/>
  <text x="716" y="358" class="small">MySQL :3306</text>

  <!-- Security tools area -->
  <rect x="995" y="105" width="260" height="500" rx="8" class="security"/>
  <text x="1030" y="134" font-family="Arial" font-size="18" font-weight="700" fill="#166534">Public Subnet</text>
  <text x="1030" y="156" font-family="Arial" font-size="18" font-weight="700" fill="#166534">Security and Monitoring</text>
  <rect x="1020" y="178" width="210" height="400" rx="8" class="card"/>
  <text x="1125" y="205" text-anchor="middle" class="h3">Security Tools EC2</text>

  <rect x="1042" y="226" width="166" height="58" rx="7" class="tool-purple"/>
  <text x="1070" y="262" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#6d28d9">SQ</text>
  <text x="1132" y="252" text-anchor="middle" class="h3">SonarQube</text>
  <text x="1132" y="271" text-anchor="middle" class="small">:9000</text>

  <rect x="1042" y="299" width="166" height="58" rx="7" class="tool-teal"/>
  <text x="1070" y="335" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#0f766e">TV</text>
  <text x="1132" y="325" text-anchor="middle" class="h3">Trivy</text>
  <text x="1132" y="344" text-anchor="middle" class="small">:4954</text>

  <rect x="1042" y="372" width="166" height="58" rx="7" class="tool-blue"/>
  <text x="1070" y="408" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#1d4ed8">CK</text>
  <text x="1132" y="408" text-anchor="middle" class="h3">Checkov</text>

  <rect x="1042" y="445" width="166" height="58" rx="7" class="tool-orange"/>
  <text x="1070" y="481" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#ea580c">PM</text>
  <text x="1132" y="471" text-anchor="middle" class="h3">Prometheus</text>
  <text x="1132" y="490" text-anchor="middle" class="small">:9090</text>

  <rect x="1042" y="518" width="166" height="58" rx="7" class="tool-orange"/>
  <text x="1070" y="554" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#ea580c">GF</text>
  <text x="1132" y="544" text-anchor="middle" class="h3">Grafana</text>
  <text x="1132" y="563" text-anchor="middle" class="small">:3000</text>
  <path d="M 1125 503 L 1125 518" class="line"/>
  <text x="1136" y="511" class="tiny">Dashboards</text>

  <!-- ECR -->
  <rect x="295" y="635" width="560" height="160" rx="8" class="ecr"/>
  <text x="575" y="672" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#ea580c">Amazon ECR (Elastic Container Registry)</text>
  <rect x="325" y="700" width="245" height="68" rx="7" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="448" y="728" text-anchor="middle" class="h3">react-js-application/dev/</text>
  <text x="448" y="752" text-anchor="middle" class="h3">todo-frontend</text>
  <rect x="585" y="700" width="245" height="68" rx="7" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="708" y="728" text-anchor="middle" class="h3">react-js-application/dev/</text>
  <text x="708" y="752" text-anchor="middle" class="h3">todo-backend</text>

  <path d="M 410 635 L 410 518" class="dash"/>
  <text x="365" y="604" class="small">Pull Docker</text>
  <text x="378" y="623" class="small">Image</text>
  <path d="M 645 635 L 645 518" class="dash"/>
  <text x="615" y="604" class="small">Pull Docker</text>
  <text x="628" y="623" class="small">Image</text>

  <!-- S3 state -->
  <rect x="1105" y="650" width="120" height="86" rx="8" class="s3"/>
  <text x="1165" y="685" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#15803d">S3</text>
  <text x="1165" y="715" text-anchor="middle" class="small">Terraform</text>
  <text x="1165" y="733" text-anchor="middle" class="small">Remote State</text>

  <!-- Outside AWS cloud CI/CD -->
  <rect x="1535" y="70" width="225" height="760" rx="10" class="outside"/>
  <text x="1647" y="100" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#1d4ed8">Outside AWS Cloud</text>
  <rect x="1560" y="125" width="175" height="135" rx="8" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="1647" y="164" text-anchor="middle" class="h3">GitHub Actions</text>
  <text x="1647" y="211" text-anchor="middle" font-family="Arial" font-size="42" fill="#2563eb">CI</text>
  <rect x="1560" y="335" width="175" height="110" rx="8" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="1647" y="393" text-anchor="middle" class="h1">OIDC IAM Role</text>
  <rect x="1560" y="500" width="175" height="110" rx="8" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="1647" y="565" text-anchor="middle" class="h1">Terraform</text>
  <rect x="1560" y="685" width="175" height="105" rx="8" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="1647" y="729" text-anchor="middle" class="h2">Provision / Update</text>
  <text x="1647" y="756" text-anchor="middle" class="h2">AWS Resources</text>

  <path d="M 1647 260 L 1647 334" class="line"/>
  <text x="1664" y="301" class="small">OIDC</text>
  <path d="M 1647 445 L 1647 499" class="line"/>
  <path d="M 1647 610 L 1647 684" class="line"/>

  <!-- CI/CD dashed connections -->
  <path d="M 1535 185 L 1225 185 L 1225 650" class="dash"/>
  <text x="1455" y="168" class="small">Remote State</text>
  <path d="M 1535 735 L 855 735" class="dash"/>
  <text x="910" y="700" class="small">Build and Push</text>
  <text x="924" y="719" class="small">Docker Images</text>
  <path d="M 1535 245 L 1208 245" class="dash"/>
  <text x="1345" y="231" class="small">Code Quality Gate</text>
  <path d="M 1535 325 L 1208 325" class="dash"/>
  <text x="1360" y="311" class="small">Image Scan</text>
  <path d="M 1535 402 L 1208 402" class="dash"/>
  <text x="1375" y="388" class="small">IaC Scan</text>

  <!-- Legend -->
  <rect x="40" y="870" width="1720" height="90" rx="8" class="legend"/>
  <text x="95" y="925" text-anchor="middle" font-family="Arial" font-size="34" fill="#38bdf8">React</text>
  <text x="180" y="910" class="h3">Frontend:</text>
  <text x="180" y="933" class="text">React.js</text>
  <line x1="320" y1="888" x2="320" y2="945" stroke="#94a3b8"/>

  <text x="390" y="925" text-anchor="middle" font-family="Arial" font-size="34" fill="#0f766e">API</text>
  <text x="460" y="910" class="h3">Backend:</text>
  <text x="460" y="933" class="text">FastAPI</text>
  <line x1="595" y1="888" x2="595" y2="945" stroke="#94a3b8"/>

  <text x="660" y="925" text-anchor="middle" font-family="Arial" font-size="34" fill="#2563eb">DB</text>
  <text x="730" y="910" class="h3">Database:</text>
  <text x="730" y="933" class="text">MySQL RDS</text>
  <line x1="875" y1="888" x2="875" y2="945" stroke="#94a3b8"/>

  <text x="940" y="925" text-anchor="middle" font-family="Arial" font-size="34" fill="#6d28d9">SEC</text>
  <text x="1020" y="910" class="h3">Security:</text>
  <text x="1020" y="933" class="text">SonarQube + Trivy + Checkov</text>
  <line x1="1240" y1="888" x2="1240" y2="945" stroke="#94a3b8"/>

  <text x="1305" y="925" text-anchor="middle" font-family="Arial" font-size="34" fill="#ea580c">MON</text>
  <text x="1390" y="910" class="h3">Monitoring:</text>
  <text x="1390" y="933" class="text">Prometheus + Grafana</text>
  <line x1="1565" y1="888" x2="1565" y2="945" stroke="#94a3b8"/>

  <text x="1605" y="910" class="h3">CI/CD:</text>
  <text x="1605" y="933" class="text">GitHub Actions + Terraform</text>
</svg>
