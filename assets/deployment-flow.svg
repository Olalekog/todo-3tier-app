<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420">
  <defs><style>.title{font:700 24px Arial;fill:#1f2937}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:14}.stage{fill:#eff6ff}.test{fill:#ecfdf5}.deploy{fill:#fff7ed}.small{font:13px Arial;fill:#374151}.label{font:700 15px Arial;fill:#111827}.arrow{stroke:#111827;stroke-width:2.5;marker-end:url(#arrow)}</style><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#111827"/></marker></defs>
  <text x="40" y="45" class="title">GitHub Actions Pipeline: Dev Build → Test → Deploy</text>
  <rect x="55" y="95" width="185" height="145" class="box stage"/><text x="90" y="130" class="label">1. Dev Validate</text><text x="80" y="160" class="small">Terraform fmt</text><text x="80" y="182" class="small">Terraform init</text><text x="80" y="204" class="small">Terraform validate/plan</text>
  <rect x="300" y="95" width="185" height="145" class="box stage"/><text x="340" y="130" class="label">2. Dev Build</text><text x="325" y="160" class="small">Create ECR repos</text><text x="325" y="182" class="small">Build frontend image</text><text x="325" y="204" class="small">Build backend image</text>
  <rect x="545" y="95" width="185" height="145" class="box test"/><text x="595" y="130" class="label">3. Dev Test</text><text x="570" y="160" class="small">Login to ECR</text><text x="570" y="182" class="small">Pull images</text><text x="570" y="204" class="small">Test / and /health</text>
  <rect x="790" y="95" width="185" height="145" class="box deploy"/><text x="835" y="130" class="label">4. Dev Deploy</text><text x="815" y="160" class="small">Terraform apply</text><text x="815" y="182" class="small">EC2 pulls images</text><text x="815" y="204" class="small">RDS seed data</text>
  <path class="arrow" d="M240 168H300"/><path class="arrow" d="M485 168H545"/><path class="arrow" d="M730 168H790"/>
  <rect x="90" y="300" width="880" height="55" class="box" fill="#f8fafc"/><text x="125" y="334" class="small">Authentication: GitHub OIDC assumes arn:aws:iam::866934333672:role/react-js-application-github-actions-bootstrap-role. Terraform backend uses S3 bucket only.</text>
</svg>
