name: Security Tools Infrastructure Deploy

on:
  push:
    branches:
      - dev
    paths:
      - "terraform/security-tools/deploy/**"
      - "terraform/security-tools/sonarqube/**"
      - "terraform/security-tools/grafana/**"
      - "terraform/security-tools/prometheus/**"
      - "terraform/templates/user_data_sonarqube.sh.tftpl"
      - ".github/workflows/security-tools-deploy.yml"
  pull_request:
    branches:
      - uat
      - prod
    paths:
      - "terraform/security-tools/deploy/**"
      - "terraform/security-tools/sonarqube/**"
      - "terraform/security-tools/grafana/**"
      - "terraform/security-tools/prometheus/**"
      - "terraform/templates/user_data_sonarqube.sh.tftpl"
      - ".github/workflows/security-tools-deploy.yml"
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action
        required: true
        type: choice
        options:
          - plan
          - apply
        default: apply
      target_environment:
        description: Promotion target
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
        default: dev

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-security-tools-${{ github.event.inputs.target_environment || github.base_ref || github.ref_name }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION || '1.9.0' }}
  TRIVY_IMAGE: aquasec/trivy:latest
  CHECKOV_IMAGE: bridgecrew/checkov:latest
  SONARQUBE_IMAGE: sonarqube:community
  PROMETHEUS_IMAGE: prom/prometheus:latest
  GRAFANA_IMAGE: grafana/grafana-oss:latest
  TFVARS_FILE: scurity-tools.tfvars
  USER_DATA_TEMPLATE_PATH: ../../templates/user_data_sonarqube.sh.tftpl

jobs:
  resolve_promotion:
    name: Resolve Promotion
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.resolve.outputs.action }}
      target_environment: ${{ steps.resolve.outputs.target_environment }}
      state_key: ${{ steps.resolve.outputs.state_key }}
    steps:
      - name: Validate promotion path
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ACTION="plan"
            SOURCE_BRANCH="${GITHUB_HEAD_REF}"
            TARGET_ENVIRONMENT="${GITHUB_BASE_REF}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ACTION="${{ github.event.inputs.action }}"
            SOURCE_BRANCH="${GITHUB_REF_NAME}"
            TARGET_ENVIRONMENT="${{ github.event.inputs.target_environment }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            ACTION="apply"
            SOURCE_BRANCH="${GITHUB_REF_NAME}"
            TARGET_ENVIRONMENT="${SOURCE_BRANCH}"
          else
            echo "Unsupported event: ${{ github.event_name }}"
            exit 1
          fi

          case "${TARGET_ENVIRONMENT}" in
            dev)
              if [[ "${SOURCE_BRANCH}" != "dev" ]]; then
                echo "Dev deployments must run from the dev branch."
                exit 1
              fi
              ;;
            uat)
              if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                if [[ "${SOURCE_BRANCH}" != "dev" ]]; then
                  echo "Only pull requests from dev to uat are allowed."
                  exit 1
                fi
              elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                if [[ "${SOURCE_BRANCH}" != "dev" ]]; then
                  echo "Manual UAT promotions must be dispatched from the dev branch."
                  exit 1
                fi
              else
                echo "UAT security-tools deployments are not allowed from push. Use manual dispatch from dev."
                exit 1
              fi
              ;;
            prod)
              if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                if [[ "${SOURCE_BRANCH}" != "uat" ]]; then
                  echo "Only pull requests from uat to prod are allowed."
                  exit 1
                fi
              elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                if [[ "${SOURCE_BRANCH}" != "uat" || "${ACTION}" != "apply" ]]; then
                  echo "Prod deployments must be manually applied from the uat branch."
                  exit 1
                fi
              else
                echo "Prod security-tools deployments require manual approval and cannot run from push."
                exit 1
              fi
              ;;
            *)
              echo "Unsupported target environment: ${TARGET_ENVIRONMENT}"
              exit 1
              ;;
          esac

          echo "action=${ACTION}" >> "$GITHUB_OUTPUT"
          echo "target_environment=${TARGET_ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "state_key=${PROJECT_NAME}/${TARGET_ENVIRONMENT}/security-tools/sucurity.state" >> "$GITHUB_OUTPUT"
          echo "Resolved security-tools deployment: event=${{ github.event_name }}, source=${SOURCE_BRANCH}, target=${TARGET_ENVIRONMENT}, action=${ACTION}"

  detect_changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    needs:
      - resolve_promotion
    outputs:
      run_all: ${{ steps.scope.outputs.run_all }}
      run_sonarqube: ${{ steps.scope.outputs.run_sonarqube }}
      run_grafana: ${{ steps.scope.outputs.run_grafana }}
      run_prometheus: ${{ steps.scope.outputs.run_prometheus }}
      any_tool: ${{ steps.scope.outputs.any_tool }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            CHANGED_FILES=""
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            CHANGED_FILES="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BEFORE_SHA="${{ github.event.before }}"
            if [[ -z "${BEFORE_SHA}" || "${BEFORE_SHA}" =~ ^0+$ ]]; then
              CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}")"
            else
              CHANGED_FILES="$(git diff --name-only "${BEFORE_SHA}" "${GITHUB_SHA}")"
            fi
          else
            CHANGED_FILES=""
          fi

          echo "Changed files:"
          if [[ -n "${CHANGED_FILES}" ]]; then
            echo "${CHANGED_FILES}"
          else
            echo "None detected for this event."
          fi

          has_change() {
            local pattern="$1"
            grep -Eq "${pattern}" <<<"${CHANGED_FILES}"
          }

          TERRAFORM=false
          SONARQUBE=false
          GRAFANA=false
          PROMETHEUS=false

          if has_change '^(terraform/security-tools/deploy/|terraform/templates/user_data_sonarqube\.sh\.tftpl$|\.github/workflows/security-tools-deploy\.yml$)'; then TERRAFORM=true; fi
          if has_change '^terraform/security-tools/sonarqube/'; then SONARQUBE=true; fi
          if has_change '^terraform/security-tools/grafana/'; then GRAFANA=true; fi
          if has_change '^terraform/security-tools/prometheus/'; then PROMETHEUS=true; fi

          echo "terraform=${TERRAFORM}" >> "$GITHUB_OUTPUT"
          echo "sonarqube=${SONARQUBE}" >> "$GITHUB_OUTPUT"
          echo "grafana=${GRAFANA}" >> "$GITHUB_OUTPUT"
          echo "prometheus=${PROMETHEUS}" >> "$GITHUB_OUTPUT"

      - name: Resolve workflow scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          RUN_ALL=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ steps.changes.outputs.terraform }}" == "true" ]]; then
            RUN_ALL=true
          fi

          ANY_TOOL=false
          RUN_SONARQUBE=false
          RUN_GRAFANA=false
          RUN_PROMETHEUS=false

          if [[ "${{ github.event_name }}" != "workflow_dispatch" && "${{ steps.changes.outputs.sonarqube }}" == "true" ]]; then
            RUN_SONARQUBE=true
          fi

          if [[ "${{ github.event_name }}" != "workflow_dispatch" && "${{ steps.changes.outputs.grafana }}" == "true" ]]; then
            RUN_GRAFANA=true
          fi

          if [[ "${{ github.event_name }}" != "workflow_dispatch" && "${{ steps.changes.outputs.prometheus }}" == "true" ]]; then
            RUN_PROMETHEUS=true
          fi

          if [[ "${RUN_SONARQUBE}" == "true" || "${RUN_GRAFANA}" == "true" || "${RUN_PROMETHEUS}" == "true" ]]; then
            ANY_TOOL=true
          fi

          echo "run_all=${RUN_ALL}" >> "$GITHUB_OUTPUT"
          echo "run_sonarqube=${RUN_SONARQUBE}" >> "$GITHUB_OUTPUT"
          echo "run_grafana=${RUN_GRAFANA}" >> "$GITHUB_OUTPUT"
          echo "run_prometheus=${RUN_PROMETHEUS}" >> "$GITHUB_OUTPUT"
          echo "any_tool=${ANY_TOOL}" >> "$GITHUB_OUTPUT"

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs:
      - resolve_promotion
      - detect_changes
    if: needs.detect_changes.outputs.run_all == 'true'
    env:
      ENVIRONMENT: ${{ needs.resolve_promotion.outputs.target_environment }}
      STATE_KEY: ${{ needs.resolve_promotion.outputs.state_key }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsSecurityToolsPlan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform/security-tools/deploy
        shell: bash
        run: |
          set -euo pipefail

          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: terraform/security-tools/deploy
        shell: bash
        run: terraform validate

      - name: Verify tfvars file
        working-directory: terraform/security-tools/deploy
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f "${TFVARS_FILE}" ]]; then
            echo "Missing ${TFVARS_FILE} in terraform/security-tools/deploy."
            ls -la
            exit 1
          fi

      - name: Discover shared network
        id: network
        shell: bash
        run: |
          set -euo pipefail

          VPC_ID="$(aws ec2 describe-vpcs \
            --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=${PROJECT_NAME}-${ENVIRONMENT}-vpc" "Name=state,Values=available" \
            --query 'Vpcs[0].VpcId' \
            --output text)"

          SUBNET_ID="$(aws ec2 describe-subnets \
            --region "${AWS_REGION}" \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=tag:Name,Values=${PROJECT_NAME}-${ENVIRONMENT}-public-1" \
            --query 'Subnets[0].SubnetId' \
            --output text)"

          if [[ -z "${VPC_ID}" || "${VPC_ID}" == "None" || -z "${SUBNET_ID}" || "${SUBNET_ID}" == "None" ]]; then
            echo "Could not find the shared VPC and public subnet for ${PROJECT_NAME}-${ENVIRONMENT}."
            exit 1
          fi

          echo "vpc_id=${VPC_ID}" >> "$GITHUB_OUTPUT"
          echo "subnet_id=${SUBNET_ID}" >> "$GITHUB_OUTPUT"

      - name: Import existing security tools resources
        working-directory: terraform/security-tools/deploy
        shell: bash
        env:
          VPC_ID: ${{ steps.network.outputs.vpc_id }}
          SUBNET_ID: ${{ steps.network.outputs.subnet_id }}
        run: |
          set -euo pipefail

          ROLE_NAME="${PROJECT_NAME}-${ENVIRONMENT}-sonarqube-ec2-role"
          PROFILE_NAME="${PROJECT_NAME}-${ENVIRONMENT}-sonarqube-instance-profile"
          SECURITY_GROUP_NAME="${PROJECT_NAME}-${ENVIRONMENT}-sonarqube-sg"
          INSTANCE_NAME="${PROJECT_NAME}-${ENVIRONMENT}-sonarqube"
          SSM_POLICY_ARN="arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"

          TF_VARS=(
            -var-file="${TFVARS_FILE}"
            -var="aws_region=${AWS_REGION}"
            -var="project_name=${PROJECT_NAME}"
            -var="environment=${ENVIRONMENT}"
            -var="vpc_id=${VPC_ID}"
            -var="sonarqube_subnet_id=${SUBNET_ID}"
            -var="user_data_template_path=${USER_DATA_TEMPLATE_PATH}"
          )

          import_if_missing() {
            local address="$1"
            local id="$2"

            if terraform state list | grep -Fx "${address}" >/dev/null; then
              echo "Already managed: ${address}"
              return 0
            fi

            if [[ -z "${id}" || "${id}" == "None" ]]; then
              echo "No existing resource found for ${address}; Terraform will create it."
              return 0
            fi

            terraform import "${TF_VARS[@]}" "${address}" "${id}"
          }

          ROLE_EXISTS="$(aws iam get-role \
            --role-name "${ROLE_NAME}" \
            --query 'Role.RoleName' \
            --output text 2>/dev/null || true)"

          SSM_ATTACHMENT_EXISTS=""
          if [[ -n "${ROLE_EXISTS}" && "${ROLE_EXISTS}" != "None" ]]; then
            SSM_ATTACHMENT_EXISTS="$(aws iam list-attached-role-policies \
              --role-name "${ROLE_NAME}" \
              --query "AttachedPolicies[?PolicyArn=='${SSM_POLICY_ARN}'].PolicyArn | [0]" \
              --output text 2>/dev/null || true)"
          fi

          PROFILE_EXISTS="$(aws iam get-instance-profile \
            --instance-profile-name "${PROFILE_NAME}" \
            --query 'InstanceProfile.InstanceProfileName' \
            --output text 2>/dev/null || true)"

          SECURITY_GROUP_ID="$(aws ec2 describe-security-groups \
            --region "${AWS_REGION}" \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=group-name,Values=${SECURITY_GROUP_NAME}" \
            --query 'SecurityGroups[0].GroupId' \
            --output text 2>/dev/null || true)"

          INSTANCE_ID="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=${INSTANCE_NAME}" "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text | awk '{print $1}')"

          import_if_missing 'module.sonarqube_compute[0].aws_iam_role.this' "${ROLE_EXISTS}"
          import_if_missing 'module.sonarqube_compute[0].aws_iam_instance_profile.this' "${PROFILE_EXISTS}"
          if [[ -n "${SSM_ATTACHMENT_EXISTS}" && "${SSM_ATTACHMENT_EXISTS}" != "None" ]]; then
            import_if_missing 'module.sonarqube_compute[0].aws_iam_role_policy_attachment.ssm' "${ROLE_NAME}/${SSM_POLICY_ARN}"
          fi
          import_if_missing 'module.security_groups.aws_security_group.sonarqube[0]' "${SECURITY_GROUP_ID}"
          import_if_missing 'module.sonarqube_compute[0].aws_instance.this' "${INSTANCE_ID}"

      - name: Terraform plan
        working-directory: terraform/security-tools/deploy
        shell: bash
        env:
          VPC_ID: ${{ steps.network.outputs.vpc_id }}
          SUBNET_ID: ${{ steps.network.outputs.subnet_id }}
        run: |
          set -euo pipefail

          terraform plan \
            -var-file="${TFVARS_FILE}" \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="environment=${ENVIRONMENT}" \
            -var="vpc_id=${VPC_ID}" \
            -var="sonarqube_subnet_id=${SUBNET_ID}" \
            -var="user_data_template_path=${USER_DATA_TEMPLATE_PATH}" \
            -out=security-tools.tfplan

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: security-tools-plan
          path: terraform/security-tools/deploy/security-tools.tfplan
          if-no-files-found: error

  prod_approval:
    name: Prod Approval
    runs-on: ubuntu-latest
    needs:
      - resolve_promotion
      - detect_changes
      - plan
    if: needs.detect_changes.outputs.run_all == 'true' && needs.resolve_promotion.outputs.action == 'apply' && needs.resolve_promotion.outputs.target_environment == 'prod'
    environment: prod
    steps:
      - name: Approval received
        shell: bash
        run: echo "Approved prod security-tools deployment."

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs:
      - resolve_promotion
      - detect_changes
      - plan
      - prod_approval
    if: always() && needs.detect_changes.outputs.run_all == 'true' && needs.resolve_promotion.outputs.action == 'apply' && needs.plan.result == 'success' && (needs.resolve_promotion.outputs.target_environment != 'prod' || needs.prod_approval.result == 'success')
    env:
      ENVIRONMENT: ${{ needs.resolve_promotion.outputs.target_environment }}
      STATE_KEY: ${{ needs.resolve_promotion.outputs.state_key }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsSecurityToolsApply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform/security-tools/deploy
        shell: bash
        run: |
          set -euo pipefail

          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: security-tools-plan
          path: terraform/security-tools/deploy

      - name: Terraform apply
        working-directory: terraform/security-tools/deploy
        shell: bash
        run: terraform apply -auto-approve security-tools.tfplan

  resolve_outputs:
    name: Resolve Security Tools Outputs
    runs-on: ubuntu-latest
    needs:
      - resolve_promotion
      - detect_changes
      - apply
    if: always() && (needs.detect_changes.outputs.run_all == 'true' || needs.detect_changes.outputs.any_tool == 'true') && needs.resolve_promotion.outputs.action == 'apply' && (needs.apply.result == 'success' || needs.apply.result == 'skipped')
    env:
      ENVIRONMENT: ${{ needs.resolve_promotion.outputs.target_environment }}
      STATE_KEY: ${{ needs.resolve_promotion.outputs.state_key }}
      RUN_ALL: ${{ needs.detect_changes.outputs.run_all }}
      RUN_SONARQUBE: ${{ needs.detect_changes.outputs.run_sonarqube }}
      RUN_GRAFANA: ${{ needs.detect_changes.outputs.run_grafana }}
      RUN_PROMETHEUS: ${{ needs.detect_changes.outputs.run_prometheus }}
    outputs:
      sonarqube_url: ${{ steps.outputs.outputs.sonarqube_url }}
      trivy_server_url: ${{ steps.outputs.outputs.trivy_server_url }}
      prometheus_url: ${{ steps.outputs.outputs.prometheus_url }}
      grafana_url: ${{ steps.outputs.outputs.grafana_url }}
      instance_id: ${{ steps.instance.outputs.instance_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsSecurityToolsOutputs

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform/security-tools/deploy
        shell: bash
        run: |
          set -euo pipefail

          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Read Terraform outputs
        id: outputs
        working-directory: terraform/security-tools/deploy
        shell: bash
        run: |
          set -euo pipefail

          terraform output -json > terraform-outputs.json

          if [[ "$(jq 'length' terraform-outputs.json)" == "0" ]]; then
            echo "No Terraform outputs found in state ${STATE_KEY}."
            echo "Run an apply for ${ENVIRONMENT} before running component-only verification."
            exit 1
          fi

          REQUIRED_OUTPUTS=()

          if [[ "${RUN_ALL}" == "true" || "${RUN_SONARQUBE}" == "true" ]]; then
            REQUIRED_OUTPUTS+=(sonarqube_url)
          fi

          if [[ "${RUN_ALL}" == "true" ]]; then
            REQUIRED_OUTPUTS+=(trivy_server_url)
          fi

          if [[ "${RUN_ALL}" == "true" || "${RUN_GRAFANA}" == "true" ]]; then
            REQUIRED_OUTPUTS+=(grafana_url)
          fi

          if [[ "${RUN_ALL}" == "true" || "${RUN_PROMETHEUS}" == "true" ]]; then
            REQUIRED_OUTPUTS+=(prometheus_url)
          fi

          for OUTPUT_NAME in "${REQUIRED_OUTPUTS[@]}"; do
            OUTPUT_VALUE="$(jq -r --arg name "${OUTPUT_NAME}" '.[$name].value // empty' terraform-outputs.json)"
            if [[ -z "${OUTPUT_VALUE}" || "${OUTPUT_VALUE}" == "null" ]]; then
              echo "Missing required Terraform output: ${OUTPUT_NAME}"
              exit 1
            fi

            echo "${OUTPUT_NAME}=${OUTPUT_VALUE}" >> "$GITHUB_OUTPUT"
          done

      - name: Resolve EC2 instance
        id: instance
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_ID="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=${PROJECT_NAME}-${ENVIRONMENT}-sonarqube" "Name=instance-state-name,Values=pending,running" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text | awk '{print $1}')"

          if [[ -z "${INSTANCE_ID}" || "${INSTANCE_ID}" == "None" ]]; then
            echo "No running security tools instance found."
            exit 1
          fi

          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - resolve_outputs
    if: always() && needs.resolve_outputs.result == 'success' && needs.detect_changes.outputs.run_sonarqube == 'true'
    steps:
      - name: Verify SonarQube endpoint
        env:
          SONARQUBE_URL: ${{ needs.resolve_outputs.outputs.sonarqube_url }}
        shell: bash
        run: |
          set -euo pipefail

          echo "SonarQube URL: ${SONARQUBE_URL}"
          for i in {1..60}; do
            if curl -fsS --max-time 10 "${SONARQUBE_URL}" >/dev/null; then
              exit 0
            fi
            sleep 15
          done

          echo "SonarQube did not become reachable in time."
          exit 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsSonarQubeVerify

      - name: Verify SonarQube container
        env:
          INSTANCE_ID: ${{ needs.resolve_outputs.outputs.instance_id }}
        shell: bash
        run: |
          set -euo pipefail

          COMMAND_ID="$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Verify SonarQube container" \
            --timeout-seconds 1200 \
