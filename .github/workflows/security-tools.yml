name: Security Tools Deploy and Scan

on:
  push:
    branches:
      - dev
    paths:
      - "terraform/**"
      - "!terraform/security-tools/**"
      - "!terraform/templates/user_data_sonarqube.sh.tftpl"
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/security-tools.yml"

  workflow_call:
    inputs:
      environment:
        description: Environment to use
        required: true
        type: string
      action:
        description: Terraform action
        required: false
        type: string
        default: apply
      image_tag:
        description: Docker image tag for Trivy scan builds
        required: false
        type: string
        default: latest
      scan_frontend:
        description: Scan frontend image with Trivy
        required: false
        type: boolean
        default: true
      scan_backend:
        description: Scan backend image with Trivy
        required: false
        type: boolean
        default: true
      scan_source:
        description: Run SonarQube source scan
        required: false
        type: boolean
        default: true
    secrets:
      DB_PASSWORD:
        required: true
      SONAR_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false

  workflow_dispatch:
    inputs:
      environment:
        description: Environment
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
        default: dev
      action:
        description: Terraform action
        required: true
        type: choice
        options:
          - plan
          - apply
        default: apply
      image_tag:
        description: Docker image tag for Trivy scan builds
        required: false
        type: string
        default: latest
      scan_frontend:
        description: Scan frontend image with Trivy
        required: false
        type: boolean
        default: true
      scan_backend:
        description: Scan backend image with Trivy
        required: false
        type: boolean
        default: true
      scan_source:
        description: Run SonarQube source scan
        required: false
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION || '1.9.0' }}

jobs:
  resolve:
    name: Resolve Security Inputs
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      action: ${{ steps.resolve.outputs.action }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      scan_frontend: ${{ steps.resolve.outputs.scan_frontend }}
      scan_backend: ${{ steps.resolve.outputs.scan_backend }}
      scan_source: ${{ steps.resolve.outputs.scan_source }}
      tfvars_file: ${{ steps.resolve.outputs.tfvars_file }}
      state_key: ${{ steps.resolve.outputs.state_key }}
      aws_account_id: ${{ steps.resolve.outputs.aws_account_id }}

    steps:
      - name: Resolve inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          EVENT_NAME="${{ github.event_name }}"

          RESOLVED_AWS_ACCOUNT_ID="${AWS_ACCOUNT_ID}"
          if [[ -z "${RESOLVED_AWS_ACCOUNT_ID}" ]]; then
            RESOLVED_AWS_ACCOUNT_ID="$(echo "${BOOTSTRAP_ROLE_ARN}" | awk -F: '{print $5}')"
          fi

          REQUIRED_VARS=("AWS_REGION" "PROJECT_NAME" "BOOTSTRAP_ROLE_ARN" "TF_STATE_BUCKET" "RESOLVED_AWS_ACCOUNT_ID")
          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME}" ]]; then
              echo "Missing required value: ${VAR_NAME}"
              exit 1
            fi
          done

          if [[ -z "${{ secrets.DB_PASSWORD }}" ]]; then
            echo "Missing required GitHub Actions secret: DB_PASSWORD"
            exit 1
          fi

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment || 'dev' }}"
            ACTION="${{ github.event.inputs.action || 'apply' }}"
            IMAGE_TAG="${{ github.event.inputs.image_tag || 'latest' }}"
            SCAN_FRONTEND="${{ github.event.inputs.scan_frontend || 'true' }}"
            SCAN_BACKEND="${{ github.event.inputs.scan_backend || 'true' }}"
            SCAN_SOURCE="${{ github.event.inputs.scan_source || 'true' }}"
          else
            ENVIRONMENT="${{ inputs.environment || 'dev' }}"
            ACTION="${{ inputs.action || 'apply' }}"
            IMAGE_TAG="${{ inputs.image_tag || 'latest' }}"
            SCAN_FRONTEND="${{ inputs.scan_frontend }}"
            SCAN_BACKEND="${{ inputs.scan_backend }}"
            SCAN_SOURCE="${{ inputs.scan_source }}"
          fi

          # Normalize possibly-empty booleans to explicit strings for downstream job conditions.
          SCAN_FRONTEND="${SCAN_FRONTEND:-true}"
          SCAN_BACKEND="${SCAN_BACKEND:-true}"
          SCAN_SOURCE="${SCAN_SOURCE:-true}"

          if [[ "${SCAN_SOURCE}" == "true" && -z "${{ secrets.SONAR_TOKEN }}" ]]; then
            echo "SonarQube token missing; source scan will be skipped."
            SCAN_SOURCE="false"
          fi

          case "${ENVIRONMENT}" in
            dev|uat|prod) ;;
            *)
              echo "Invalid environment: ${ENVIRONMENT}"
              exit 1
              ;;
          esac

          case "${ACTION}" in
            plan|apply) ;;
            *)
              echo "Invalid action: ${ACTION}"
              exit 1
              ;;
          esac

          TFVARS_FILE="environments/${ENVIRONMENT}.tfvars"
          STATE_KEY="${PROJECT_NAME}/${ENVIRONMENT}/terraform.tfstate"

          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "action=${ACTION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "scan_frontend=${SCAN_FRONTEND}" >> "$GITHUB_OUTPUT"
          echo "scan_backend=${SCAN_BACKEND}" >> "$GITHUB_OUTPUT"
          echo "scan_source=${SCAN_SOURCE}" >> "$GITHUB_OUTPUT"
          echo "tfvars_file=${TFVARS_FILE}" >> "$GITHUB_OUTPUT"
          echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"
          echo "aws_account_id=${RESOLVED_AWS_ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

      - name: Log resolved security inputs
        shell: bash
        run: |
          echo "Resolved environment: ${{ steps.resolve.outputs.environment }}"
          echo "Resolved action: ${{ steps.resolve.outputs.action }}"
          echo "Resolved tfvars_file: ${{ steps.resolve.outputs.tfvars_file }}"

  scan-terraform:
    name: Checkov Terraform Scan
    runs-on: ubuntu-latest
    needs:
      - resolve
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan Terraform with Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          skip_check: BC_AWS_LOGGING_9,CKV2_AWS_11
          soft_fail: true
          output_format: cli,sarif
          output_file_path: console,checkov.sarif

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
          category: checkov-terraform

  scan-source:
    name: SonarQube Source Scan
    runs-on: ubuntu-latest
    needs:
      - resolve
    if: needs.resolve.outputs.scan_source == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Sonar new-code baseline
        id: sonar_baseline
        shell: bash
        run: |
          set -euo pipefail

          ENVIRONMENT="${{ needs.resolve.outputs.environment }}"
          BASELINE_BRANCH="dev"

          if [[ "${ENVIRONMENT}" == "prod" ]]; then
            BASELINE_BRANCH="uat"
          fi

          echo "reference_branch=${BASELINE_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials for SonarQube access
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsSonarQubeScan

      - name: Allow this runner to reach SonarQube
        id: sonar_access
        shell: bash
        env:
          ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
          INITIAL_SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: |
          set -euo pipefail

          RUNNER_IP="$(curl -fsS --connect-timeout 10 https://api.ipify.org)"
          RUNNER_CIDR="${RUNNER_IP}/32"
          CANDIDATE_NAMES=("${PROJECT_NAME}-${ENVIRONMENT}-sonarqube" "${PROJECT_NAME}-dev-sonarqube")

          if [[ -z "${RUNNER_IP}" ]]; then
            echo "Unable to resolve runner public IP."
            exit 1
          fi

          INSTANCE_ID=""
          for INSTANCE_NAME in "${CANDIDATE_NAMES[@]}"; do
            INSTANCE_ID="$(aws ec2 describe-instances \
              --region "${AWS_REGION}" \
              --filters "Name=tag:Name,Values=${INSTANCE_NAME}" "Name=instance-state-name,Values=pending,running" \
              --query 'Reservations[].Instances[].InstanceId' \
              --output text | awk '{print $1}')"

            if [[ -n "${INSTANCE_ID}" && "${INSTANCE_ID}" != "None" ]]; then
              echo "Found SonarQube instance ${INSTANCE_ID} by tag Name=${INSTANCE_NAME}"
              break
            fi
          done

          if [[ -z "${INSTANCE_ID}" || "${INSTANCE_ID}" == "None" ]]; then
            SONAR_HOST="$(python3 -c 'import os, urllib.parse; print(urllib.parse.urlparse(os.environ.get("INITIAL_SONAR_HOST_URL", "")).hostname or "")')"
            SONAR_IP="${SONAR_HOST}"
            if [[ -n "${SONAR_IP}" ]]; then
              if [[ ! "${SONAR_IP}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                SONAR_IP="$(getent ahostsv4 "${SONAR_HOST}" | awk '{print $1; exit}')"
              fi
            fi

            if [[ -n "${SONAR_IP}" ]]; then
              INSTANCE_ID="$(aws ec2 describe-instances \
                --region "${AWS_REGION}" \
                --filters "Name=ip-address,Values=${SONAR_IP}" "Name=instance-state-name,Values=pending,running" \
                --query 'Reservations[].Instances[].InstanceId' \
                --output text | awk '{print $1}')"
            fi
          fi

          if [[ -z "${INSTANCE_ID}" || "${INSTANCE_ID}" == "None" ]]; then
            echo "No running SonarQube EC2 instance found. Checked tags: ${CANDIDATE_NAMES[*]}."
            echo "Initial SONAR_HOST_URL was: ${INITIAL_SONAR_HOST_URL:-unset}"
            exit 1
          fi

          SONAR_IP="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --instance-ids "${INSTANCE_ID}" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)"

          SG_IDS="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --instance-ids "${INSTANCE_ID}" \
            --query 'Reservations[].Instances[].SecurityGroups[].GroupId' \
            --output text)"

          if [[ -z "${SONAR_IP}" || "${SONAR_IP}" == "None" || -z "${SG_IDS}" || "${SG_IDS}" == "None" ]]; then
            echo "SonarQube instance ${INSTANCE_ID} is missing a public IP or security group."
            exit 1
          fi

          echo "SONAR_HOST_URL=http://${SONAR_IP}:9000" >> "$GITHUB_ENV"
          echo "Resolved SonarQube URL: http://${SONAR_IP}:9000"

          for SG_ID in ${SG_IDS}; do
            echo "Authorizing ${RUNNER_CIDR} for ${SG_ID}:9000"
            aws ec2 authorize-security-group-ingress \
              --region "${AWS_REGION}" \
              --group-id "${SG_ID}" \
              --ip-permissions "IpProtocol=tcp,FromPort=9000,ToPort=9000,IpRanges=[{CidrIp=${RUNNER_CIDR},Description=github-actions-sonarqube-scan}]" \
              >/dev/null 2>&1 || true
          done

          echo "runner_cidr=${RUNNER_CIDR}" >> "$GITHUB_OUTPUT"
          echo "security_group_ids=${SG_IDS}" >> "$GITHUB_OUTPUT"

      - name: Verify SonarQube is ready
        shell: bash
        run: |
          set -euo pipefail

          STATUS_URL="${SONAR_HOST_URL%/}/api/system/status"
          echo "Checking ${STATUS_URL}"

          STATUS="$(curl -fsS \
            --connect-timeout 10 \
            --max-time 20 \
            "${STATUS_URL}")"

          jq -e '.status == "UP"' <<<"${STATUS}" >/dev/null

      - name: SonarQube scan (non-blocking quality gate for dev)
        if: needs.resolve.outputs.environment == 'dev'
        uses: sonarsource/sonarqube-scan-action@v6
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=${{ vars.PROJECT_NAME }}-${{ needs.resolve.outputs.environment }}
            -Dsonar.projectName=${{ vars.PROJECT_NAME }}
            -Dsonar.sources=frontend/src,backend
            -Dsonar.qualitygate.wait=false
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube scan (enforce quality gate)
        if: needs.resolve.outputs.environment != 'dev'
        uses: sonarsource/sonarqube-scan-action@v6
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=${{ vars.PROJECT_NAME }}-${{ needs.resolve.outputs.environment }}
            -Dsonar.projectName=${{ vars.PROJECT_NAME }}
            -Dsonar.sources=frontend/src,backend
            -Dsonar.newCode.referenceBranch=${{ steps.sonar_baseline.outputs.reference_branch }}
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Revoke runner SonarQube access
        if: always() && steps.sonar_access.outputs.security_group_ids != ''
        shell: bash
        run: |
          set -euo pipefail

          RUNNER_CIDR="${{ steps.sonar_access.outputs.runner_cidr }}"
          SG_IDS="${{ steps.sonar_access.outputs.security_group_ids }}"

          for SG_ID in ${SG_IDS}; do
            echo "Revoking ${RUNNER_CIDR} from ${SG_ID}:9000"
            aws ec2 revoke-security-group-ingress \
              --region "${AWS_REGION}" \
              --group-id "${SG_ID}" \
              --ip-permissions "IpProtocol=tcp,FromPort=9000,ToPort=9000,IpRanges=[{CidrIp=${RUNNER_CIDR}}]" \
              >/dev/null 2>&1 || true
          done

  build-images:
    name: Build Images for Trivy
    runs-on: ubuntu-latest
    needs:
      - resolve
    if: needs.resolve.outputs.scan_frontend == 'true' || needs.resolve.outputs.scan_backend == 'true'
    env:
      ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
      RESOLVED_AWS_ACCOUNT_ID: ${{ needs.resolve.outputs.aws_account_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend image
        if: needs.resolve.outputs.scan_frontend == 'true'
        shell: bash
        run: |
          set -euo pipefail
          FRONTEND_IMAGE="${RESOLVED_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}/${ENVIRONMENT}/todo-frontend:${IMAGE_TAG}"
          docker build -t "${FRONTEND_IMAGE}" frontend
          docker save "${FRONTEND_IMAGE}" -o frontend-image.tar

      - name: Build backend image
        if: needs.resolve.outputs.scan_backend == 'true'
        shell: bash
        run: |
          set -euo pipefail
          BACKEND_IMAGE="${RESOLVED_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}/${ENVIRONMENT}/todo-backend:${IMAGE_TAG}"
          docker build -t "${BACKEND_IMAGE}" backend
          docker save "${BACKEND_IMAGE}" -o backend-image.tar

      - name: Upload Docker images
        uses: actions/upload-artifact@v4
        with:
          name: security-tools-images-${{ needs.resolve.outputs.image_tag }}
          path: |
            frontend-image.tar
            backend-image.tar
          if-no-files-found: error

  scan-images:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs:
      - resolve
      - build-images
    if: needs.resolve.outputs.scan_frontend == 'true' || needs.resolve.outputs.scan_backend == 'true'
    env:
      TRIVY_DISABLE_VEX_NOTICE: "false"
    steps:
      - name: Download Docker images
        uses: actions/download-artifact@v4
        with:
          name: security-tools-images-${{ needs.resolve.outputs.image_tag }}
          path: .

      - name: Scan frontend image with Trivy
        id: trivy_frontend_gate
        continue-on-error: true
        if: needs.resolve.outputs.scan_frontend == 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: frontend-image.tar
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan backend image with Trivy
        id: trivy_backend_gate
        continue-on-error: true
        if: needs.resolve.outputs.scan_backend == 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: backend-image.tar
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Generate frontend Trivy SARIF
        if: always() && needs.resolve.outputs.scan_frontend == 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: frontend-image.tar
          format: sarif
          output: trivy-frontend.sarif
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Generate backend Trivy SARIF
        if: always() && needs.resolve.outputs.scan_backend == 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: backend-image.tar
          format: sarif
          output: trivy-backend.sarif
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload frontend Trivy SARIF
        if: always() && needs.resolve.outputs.scan_frontend == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend-image

      - name: Upload backend Trivy SARIF
        if: always() && needs.resolve.outputs.scan_backend == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend-image

      - name: Enforce Trivy gate
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          FRONTEND_RESULT="${{ steps.trivy_frontend_gate.outcome || 'skipped' }}"
          BACKEND_RESULT="${{ steps.trivy_backend_gate.outcome || 'skipped' }}"

          echo "Frontend Trivy gate outcome: ${FRONTEND_RESULT}"
          echo "Backend Trivy gate outcome: ${BACKEND_RESULT}"

          if [[ "${FRONTEND_RESULT}" == "failure" || "${BACKEND_RESULT}" == "failure" ]]; then
            echo "Trivy gate failed due to HIGH/CRITICAL findings."
            exit 1
          fi

