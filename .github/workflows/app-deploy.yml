name: App Infrastructure Deploy

on:
  push:
    branches:
      - dev
    paths:
      - "frontend/**"
      - "backend/**"
      - "terraform/*.tf"
      - "terraform/environments/**"
      - "terraform/modules/**"
      - "terraform/templates/user_data_frontend.sh.tftpl"
      - "terraform/templates/user_data_backend.sh.tftpl"
      - "sonar-project.properties"
      - ".github/workflows/app-deploy.yml"
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action
        required: true
        type: choice
        options:
          - plan
          - apply
        default: apply
      target_environment:
        description: Promotion target
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
        default: dev
  pull_request:
    branches:
      - uat
      - prod
    paths:
      - "frontend/**"
      - "backend/**"
      - "terraform/*.tf"
      - "terraform/environments/**"
      - "terraform/modules/**"
      - "terraform/templates/user_data_frontend.sh.tftpl"
      - "terraform/templates/user_data_backend.sh.tftpl"
      - "sonar-project.properties"
      - ".github/workflows/app-deploy.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-app-${{ github.event.inputs.target_environment || github.base_ref || github.ref_name }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION || '1.9.0' }}
  IMAGE_TAG: ${{ github.sha }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

jobs:
  resolve_promotion:
    name: Resolve Promotion
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.resolve.outputs.action }}
      target_environment: ${{ steps.resolve.outputs.target_environment }}
      state_key: ${{ steps.resolve.outputs.state_key }}
      tfvars_file: ${{ steps.resolve.outputs.tfvars_file }}
    steps:
      - name: Validate promotion path
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ACTION="plan"
            SOURCE_BRANCH="${GITHUB_HEAD_REF}"
            TARGET_ENVIRONMENT="${GITHUB_BASE_REF}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ACTION="${{ github.event.inputs.action }}"
            SOURCE_BRANCH="${GITHUB_REF_NAME}"
            TARGET_ENVIRONMENT="${{ github.event.inputs.target_environment }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            ACTION="apply"
            SOURCE_BRANCH="${GITHUB_REF_NAME}"
            TARGET_ENVIRONMENT="${GITHUB_REF_NAME}"
          else
            echo "Unsupported event: ${{ github.event_name }}"
            exit 1
          fi

          case "${TARGET_ENVIRONMENT}" in
            dev)
              if [[ "${SOURCE_BRANCH}" != "dev" ]]; then
                echo "Dev deployments must run from the dev branch."
                exit 1
              fi
              ;;
            uat)
              if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                if [[ "${SOURCE_BRANCH}" != "dev" ]]; then
                  echo "Only pull requests from dev to uat are allowed."
                  exit 1
                fi
              elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                if [[ "${SOURCE_BRANCH}" != "dev" ]]; then
                  echo "Manual UAT promotions must be dispatched from the dev branch."
                  exit 1
                fi
              else
                echo "UAT deployments are not allowed from push. Use a dev-to-uat pull request or manual dispatch from dev."
                exit 1
              fi
              ;;
            prod)
              if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                if [[ "${SOURCE_BRANCH}" != "uat" ]]; then
                  echo "Only pull requests from uat to prod are allowed."
                  exit 1
                fi
              elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                if [[ "${SOURCE_BRANCH}" != "uat" || "${ACTION}" != "apply" ]]; then
                  echo "Prod deployments must be manually applied from the uat branch."
                  exit 1
                fi
              else
                echo "Prod deployments require manual approval and cannot run from push."
                exit 1
              fi
              ;;
            *)
              echo "Unsupported target environment: ${TARGET_ENVIRONMENT}"
              exit 1
              ;;
          esac

          echo "action=${ACTION}" >> "$GITHUB_OUTPUT"
          echo "target_environment=${TARGET_ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "state_key=${PROJECT_NAME}/${TARGET_ENVIRONMENT}/app/terraform.tfstate" >> "$GITHUB_OUTPUT"
          echo "tfvars_file=environments/${TARGET_ENVIRONMENT}.tfvars" >> "$GITHUB_OUTPUT"

          echo "Resolved app deployment: event=${{ github.event_name }}, source=${SOURCE_BRANCH}, target=${TARGET_ENVIRONMENT}, action=${ACTION}"

  detect_changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    needs:
      - resolve_promotion
    outputs:
      run_environment: ${{ steps.scope.outputs.run_environment }}
      build_frontend: ${{ steps.scope.outputs.build_frontend }}
      build_backend: ${{ steps.scope.outputs.build_backend }}
      run_sonarqube: ${{ steps.scope.outputs.run_sonarqube }}
      run_checkov: ${{ steps.scope.outputs.run_checkov }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filters
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - "frontend/**"
            backend:
              - "backend/**"
            app:
              - "frontend/**"
              - "backend/**"
              - "terraform/templates/user_data_frontend.sh.tftpl"
              - "terraform/templates/user_data_backend.sh.tftpl"
            sonarqube_config:
              - "sonar-project.properties"
            shared_infra:
              - "terraform/*.tf"
              - "terraform/modules/**"
              - ".github/workflows/app-deploy.yml"
            dev_config:
              - "terraform/environments/dev.tfvars"
            uat_config:
              - "terraform/environments/uat.tfvars"
            prod_config:
              - "terraform/environments/prod.tfvars"

      - name: Resolve workflow scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          TARGET_ENVIRONMENT="${{ needs.resolve_promotion.outputs.target_environment }}"
          RUN_ENVIRONMENT=false
          BUILD_FRONTEND=false
          BUILD_BACKEND=false
          RUN_SONARQUBE=false
          RUN_CHECKOV=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ steps.filters.outputs.app }}" == "true" || "${{ steps.filters.outputs.sonarqube_config }}" == "true" || "${{ steps.filters.outputs.shared_infra }}" == "true" ]]; then
            RUN_ENVIRONMENT=true
          elif [[ "${TARGET_ENVIRONMENT}" == "dev" && "${{ steps.filters.outputs.dev_config }}" == "true" ]]; then
            RUN_ENVIRONMENT=true
          elif [[ "${TARGET_ENVIRONMENT}" == "uat" && "${{ steps.filters.outputs.uat_config }}" == "true" ]]; then
            RUN_ENVIRONMENT=true
          elif [[ "${TARGET_ENVIRONMENT}" == "prod" && "${{ steps.filters.outputs.prod_config }}" == "true" ]]; then
            RUN_ENVIRONMENT=true
          fi

          if [[ "${{ github.event_name }}" != "workflow_dispatch" && "${{ steps.filters.outputs.frontend }}" == "true" ]]; then
            BUILD_FRONTEND=true
          fi

          if [[ "${{ github.event_name }}" != "workflow_dispatch" && "${{ steps.filters.outputs.backend }}" == "true" ]]; then
            BUILD_BACKEND=true
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ steps.filters.outputs.frontend }}" == "true" || "${{ steps.filters.outputs.backend }}" == "true" || "${{ steps.filters.outputs.sonarqube_config }}" == "true" ]]; then
            RUN_SONARQUBE=true
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ steps.filters.outputs.shared_infra }}" == "true" ]]; then
            RUN_CHECKOV=true
          elif [[ "${TARGET_ENVIRONMENT}" == "dev" && "${{ steps.filters.outputs.dev_config }}" == "true" ]]; then
            RUN_CHECKOV=true
          elif [[ "${TARGET_ENVIRONMENT}" == "uat" && "${{ steps.filters.outputs.uat_config }}" == "true" ]]; then
            RUN_CHECKOV=true
          elif [[ "${TARGET_ENVIRONMENT}" == "prod" && "${{ steps.filters.outputs.prod_config }}" == "true" ]]; then
            RUN_CHECKOV=true
          fi

          echo "run_environment=${RUN_ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "build_frontend=${BUILD_FRONTEND}" >> "$GITHUB_OUTPUT"
          echo "build_backend=${BUILD_BACKEND}" >> "$GITHUB_OUTPUT"
          echo "run_sonarqube=${RUN_SONARQUBE}" >> "$GITHUB_OUTPUT"
          echo "run_checkov=${RUN_CHECKOV}" >> "$GITHUB_OUTPUT"

  sonarqube_scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs:
      - resolve_promotion
      - detect_changes
    if: needs.detect_changes.outputs.run_environment == 'true' && needs.detect_changes.outputs.run_sonarqube == 'true' && github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate SonarQube inputs
        shell: bash
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${SONAR_HOST_URL}" ]]; then
            echo "Missing required GitHub variable: SONAR_HOST_URL"
            exit 1
          fi

          if [[ -z "${SONAR_TOKEN}" ]]; then
            echo "Missing required GitHub secret: SONAR_TOKEN"
            exit 1
          fi

      - name: Run SonarQube quality scan
        id: sonar
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.PROJECT_NAME }}-${{ needs.resolve_promotion.outputs.target_environment }}
            -Dsonar.qualitygate.wait=true

      - name: Print SonarQube failure details
        if: failure()
        shell: bash
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ env.PROJECT_NAME }}-${{ needs.resolve_promotion.outputs.target_environment }}
        run: |
          set -euo pipefail

          if [[ ! -f .scannerwork/report-task.txt ]]; then
            echo "SonarScanner report-task.txt was not found."
            exit 0
          fi

          CE_TASK_ID="$(awk -F= '/^ceTaskId=/{print $2}' .scannerwork/report-task.txt)"
          if [[ -z "${CE_TASK_ID}" ]]; then
            echo "Could not find ceTaskId in .scannerwork/report-task.txt."
            exit 0
          fi

          echo "SonarQube CE task: ${SONAR_HOST_URL%/}/api/ce/task?id=${CE_TASK_ID}"
          curl -fsS -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL%/}/api/ce/task?id=${CE_TASK_ID}" | jq . || true

          echo "SonarQube Quality Gate:"
          curl -fsS -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL%/}/api/qualitygates/project_status?projectKey=${SONAR_PROJECT_KEY}" | jq . || true

  checkov_scan:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    needs:
      - resolve_promotion
      - detect_changes
    if: needs.detect_changes.outputs.run_environment == 'true' && needs.detect_changes.outputs.run_checkov == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov scan
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm \
            -v "${PWD}:/repo" \
            bridgecrew/checkov:latest \
            -d /repo/terraform \
            --framework terraform \
            --skip-check CKV2_AWS_11 \
            --skip-path /repo/terraform/security-tools \
            --quiet

  docker:
    name: Build, Test and Push Image
    runs-on: ubuntu-latest
    needs:
      - resolve_promotion
      - detect_changes
      - sonarqube_scan
      - checkov_scan
      - prod_approval
    if: always() && needs.detect_changes.outputs.run_environment == 'true' && needs.resolve_promotion.outputs.action == 'apply' && (needs.sonarqube_scan.result == 'success' || needs.sonarqube_scan.result == 'skipped') && (needs.checkov_scan.result == 'success' || needs.checkov_scan.result == 'skipped') && (needs.resolve_promotion.outputs.target_environment != 'prod' || needs.prod_approval.result == 'success')
    env:
      ENVIRONMENT: ${{ needs.resolve_promotion.outputs.target_environment }}
    outputs:
      registry: ${{ steps.repos.outputs.registry }}
      frontend_repository: ${{ steps.repos.outputs.frontend_repository }}
      backend_repository: ${{ steps.repos.outputs.backend_repository }}
      frontend_image_tag: ${{ steps.tags.outputs.frontend_image_tag }}
      backend_image_tag: ${{ steps.tags.outputs.backend_image_tag }}
      frontend_image_uri: ${{ steps.tags.outputs.frontend_image_uri }}
      backend_image_uri: ${{ steps.tags.outputs.backend_image_uri }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsAppDocker

      - name: Resolve existing ECR repositories
        id: repos
        shell: bash
        run: |
          set -euo pipefail

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          FRONTEND_REPOSITORY="${PROJECT_NAME}/${ENVIRONMENT}/todo-frontend"
          BACKEND_REPOSITORY="${PROJECT_NAME}/${ENVIRONMENT}/todo-backend"

          if [[ -z "${REGISTRY}" || -z "${FRONTEND_REPOSITORY}" || -z "${BACKEND_REPOSITORY}" ]]; then
            echo "Failed to resolve ECR repository outputs."
            exit 1
          fi

          aws ecr describe-repositories \
            --region "${AWS_REGION}" \
            --repository-names "${FRONTEND_REPOSITORY}" >/dev/null

          aws ecr describe-repositories \
            --region "${AWS_REGION}" \
            --repository-names "${BACKEND_REPOSITORY}" >/dev/null

          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "frontend_repository=${FRONTEND_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "backend_repository=${BACKEND_REPOSITORY}" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        shell: bash
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${{ steps.repos.outputs.registry }}"

      - name: Build and push backend
        if: needs.detect_changes.outputs.build_backend == 'true'
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_URI="${{ steps.repos.outputs.registry }}/${{ steps.repos.outputs.backend_repository }}:${IMAGE_TAG}"
          if aws ecr describe-images \
            --region "${AWS_REGION}" \
            --repository-name "${{ steps.repos.outputs.backend_repository }}" \
            --image-ids imageTag="${IMAGE_TAG}" >/dev/null 2>&1; then
            echo "Backend image already exists: ${IMAGE_URI}"
            exit 0
          fi

          docker build -t "${IMAGE_URI}" backend
          docker push "${IMAGE_URI}"

      - name: Build and push frontend
        if: needs.detect_changes.outputs.build_frontend == 'true'
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_URI="${{ steps.repos.outputs.registry }}/${{ steps.repos.outputs.frontend_repository }}:${IMAGE_TAG}"
          if aws ecr describe-images \
            --region "${AWS_REGION}" \
            --repository-name "${{ steps.repos.outputs.frontend_repository }}" \
            --image-ids imageTag="${IMAGE_TAG}" >/dev/null 2>&1; then
            echo "Frontend image already exists: ${IMAGE_URI}"
            exit 0
          fi

          docker build -t "${IMAGE_URI}" frontend
          docker push "${IMAGE_URI}"

      - name: Resolve deployment image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          latest_tag() {
            local repository="$1"

            aws ecr describe-images \
              --region "${AWS_REGION}" \
              --repository-name "${repository}" \
              --query 'reverse(sort_by(imageDetails[?length(imageTags) > `0`], &imagePushedAt))[0].imageTags[0]' \
              --output text
          }

          FRONTEND_IMAGE_TAG="${IMAGE_TAG}"
          BACKEND_IMAGE_TAG="${IMAGE_TAG}"

          if [[ "${{ needs.detect_changes.outputs.build_frontend }}" != "true" ]]; then
            FRONTEND_IMAGE_TAG="$(latest_tag "${{ steps.repos.outputs.frontend_repository }}")"
          fi

          if [[ "${{ needs.detect_changes.outputs.build_backend }}" != "true" ]]; then
            BACKEND_IMAGE_TAG="$(latest_tag "${{ steps.repos.outputs.backend_repository }}")"
          fi

          if [[ -z "${FRONTEND_IMAGE_TAG}" || "${FRONTEND_IMAGE_TAG}" == "None" ]]; then
            echo "No frontend image tag is available in ECR. Change frontend files or run a manual apply to build one."
            exit 1
          fi

          if [[ -z "${BACKEND_IMAGE_TAG}" || "${BACKEND_IMAGE_TAG}" == "None" ]]; then
            echo "No backend image tag is available in ECR. Change backend files or run a manual apply to build one."
            exit 1
          fi

          echo "frontend_image_tag=${FRONTEND_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "backend_image_tag=${BACKEND_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "frontend_image_uri=${{ steps.repos.outputs.registry }}/${{ steps.repos.outputs.frontend_repository }}:${FRONTEND_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "backend_image_uri=${{ steps.repos.outputs.registry }}/${{ steps.repos.outputs.backend_repository }}:${BACKEND_IMAGE_TAG}" >> "$GITHUB_OUTPUT"

  trivy_scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs:
      - resolve_promotion
      - detect_changes
      - docker
    if: always() && needs.detect_changes.outputs.run_environment == 'true' && needs.resolve_promotion.outputs.action == 'apply' && needs.docker.result == 'success'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsAppTrivy

      - name: Login to ECR
        shell: bash
        run: |
          set -euo pipefail

          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${{ needs.docker.outputs.registry }}"

      - name: Scan backend image
        if: needs.detect_changes.outputs.build_backend == 'true'
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${HOME}/.docker:/root/.docker:ro" \
            -v "${HOME}/.cache/trivy:/root/.cache/" \
            aquasec/trivy:latest image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            "${{ needs.docker.outputs.backend_image_uri }}"

      - name: Scan frontend image
        if: needs.detect_changes.outputs.build_frontend == 'true'
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${HOME}/.docker:/root/.docker:ro" \
            -v "${HOME}/.cache/trivy:/root/.cache/" \
            aquasec/trivy:latest image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            "${{ needs.docker.outputs.frontend_image_uri }}"

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs:
      - resolve_promotion
      - detect_changes
      - docker
      - trivy_scan
    if: always() && needs.detect_changes.outputs.run_environment == 'true' && (needs.resolve_promotion.outputs.action != 'apply' || (needs.docker.result == 'success' && (needs.trivy_scan.result == 'success' || needs.trivy_scan.result == 'skipped')))
    env:
      ENVIRONMENT: ${{ needs.resolve_promotion.outputs.target_environment }}
      STATE_KEY: ${{ needs.resolve_promotion.outputs.state_key }}
      TFVARS_FILE: ${{ needs.resolve_promotion.outputs.tfvars_file }}
      DEPLOY_FRONTEND_IMAGE_TAG: ${{ needs.docker.outputs.frontend_image_tag || 'latest' }}
      DEPLOY_BACKEND_IMAGE_TAG: ${{ needs.docker.outputs.backend_image_tag || 'latest' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsAppPlan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Import existing database resources
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          DB_NAME_PREFIX="${PROJECT_NAME}-${ENVIRONMENT}-app"
          DB_SUBNET_GROUP="${DB_NAME_PREFIX}-db-subnet-group"
          DB_MONITORING_ROLE="${DB_NAME_PREFIX}-rds-enhanced-monitoring-role"
          DB_IDENTIFIER="${DB_NAME_PREFIX}-mysql"
          RDS_MONITORING_POLICY_ARN="arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole"
          TF_VARS=(
            -var-file="${TFVARS_FILE}"
            -var="frontend_image_tag=${DEPLOY_FRONTEND_IMAGE_TAG}"
            -var="backend_image_tag=${DEPLOY_BACKEND_IMAGE_TAG}"
          )

          forget_if_mismatched() {
            local address="$1"
            local expected_id="$2"
            local current_id

            current_id="$(terraform state show -no-color "${address}" 2>/dev/null \
              | awk -F'= ' '/^[[:space:]]*id[[:space:]]*=/{print $2; exit}' || true)"

            if [[ -n "${current_id}" && "${current_id}" != "${expected_id}" ]]; then
              echo "Removing mismatched state for ${address}: expected ${expected_id}, found ${current_id}."
              terraform state rm "${address}"
            fi
          }

          import_if_exists() {
            local address="$1"
            local id="$2"
            shift 2

            if terraform state show "${address}" >/dev/null 2>&1; then
              echo "${address} is already managed by Terraform."
              return
            fi

            if "$@" >/dev/null 2>&1; then
              echo "Importing existing resource ${id} into ${address}."
              terraform import "${TF_VARS[@]}" "${address}" "${id}"
            else
              echo "Resource ${id} does not exist yet."
            fi
          }

          forget_if_mismatched "module.database.aws_db_subnet_group.this" "${DB_SUBNET_GROUP}"
          forget_if_mismatched "module.database.aws_iam_role.rds_enhanced_monitoring" "${DB_MONITORING_ROLE}"
          forget_if_mismatched "module.database.aws_iam_role_policy_attachment.rds_enhanced_monitoring" "${DB_MONITORING_ROLE}/${RDS_MONITORING_POLICY_ARN}"
          forget_if_mismatched "module.database.aws_db_instance.this" "${DB_IDENTIFIER}"

          import_if_exists \
            "module.database.aws_db_subnet_group.this" \
            "${DB_SUBNET_GROUP}" \
            aws rds describe-db-subnet-groups \
              --region "${AWS_REGION}" \
              --db-subnet-group-name "${DB_SUBNET_GROUP}"

          import_if_exists \
            "module.database.aws_iam_role.rds_enhanced_monitoring" \
            "${DB_MONITORING_ROLE}" \
            aws iam get-role \
              --role-name "${DB_MONITORING_ROLE}"

          if terraform state show "module.database.aws_iam_role_policy_attachment.rds_enhanced_monitoring" >/dev/null 2>&1; then
            echo "module.database.aws_iam_role_policy_attachment.rds_enhanced_monitoring is already managed by Terraform."
          elif [[ "$(aws iam list-attached-role-policies \
              --role-name "${DB_MONITORING_ROLE}" \
              --query "contains(AttachedPolicies[].PolicyArn, '${RDS_MONITORING_POLICY_ARN}')" \
              --output text 2>/dev/null || true)" == "True" ]]; then
            echo "Importing existing resource ${DB_MONITORING_ROLE}/${RDS_MONITORING_POLICY_ARN} into module.database.aws_iam_role_policy_attachment.rds_enhanced_monitoring."
            terraform import "${TF_VARS[@]}" \
              "module.database.aws_iam_role_policy_attachment.rds_enhanced_monitoring" \
              "${DB_MONITORING_ROLE}/${RDS_MONITORING_POLICY_ARN}"
          else
            echo "Resource ${DB_MONITORING_ROLE}/${RDS_MONITORING_POLICY_ARN} does not exist yet."
          fi

          import_if_exists \
            "module.database.aws_db_instance.this" \
            "${DB_IDENTIFIER}" \
            aws rds describe-db-instances \
              --region "${AWS_REGION}" \
              --db-instance-identifier "${DB_IDENTIFIER}"

      - name: Terraform plan
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          terraform plan \
            -var-file="${TFVARS_FILE}" \
            -var="frontend_image_tag=${DEPLOY_FRONTEND_IMAGE_TAG}" \
            -var="backend_image_tag=${DEPLOY_BACKEND_IMAGE_TAG}" \
            -out=app.tfplan

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: app-plan
          path: terraform/app.tfplan
          if-no-files-found: error

  prod_approval:
    name: Prod Approval
    runs-on: ubuntu-latest
    needs:
      - resolve_promotion
      - detect_changes
    if: needs.detect_changes.outputs.run_environment == 'true' && needs.resolve_promotion.outputs.action == 'apply' && needs.resolve_promotion.outputs.target_environment == 'prod'
    environment: prod
    steps:
      - name: Approval received
        shell: bash
        run: echo "Approved prod app deployment."

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs:
      - resolve_promotion
      - plan
    if: always() && needs.resolve_promotion.outputs.action == 'apply' && needs.plan.result == 'success'
    env:
      ENVIRONMENT: ${{ needs.resolve_promotion.outputs.target_environment }}
      STATE_KEY: ${{ needs.resolve_promotion.outputs.state_key }}
      TFVARS_FILE: ${{ needs.resolve_promotion.outputs.tfvars_file }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsAppApply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: app-plan
          path: terraform

      - name: Terraform apply
        working-directory: terraform
        shell: bash
        run: terraform apply -auto-approve app.tfplan

  deploy_containers:
    name: Deploy App Containers
    runs-on: ubuntu-latest
    needs:
      - resolve_promotion
      - detect_changes
      - docker
      - apply
    if: always() && needs.resolve_promotion.outputs.action == 'apply' && needs.apply.result == 'success' && (needs.detect_changes.outputs.build_frontend == 'true' || needs.detect_changes.outputs.build_backend == 'true')
    env:
      ENVIRONMENT: ${{ needs.resolve_promotion.outputs.target_environment }}
      STATE_KEY: ${{ needs.resolve_promotion.outputs.state_key }}
      TFVARS_FILE: ${{ needs.resolve_promotion.outputs.tfvars_file }}
      FRONTEND_IMAGE_URI: ${{ needs.docker.outputs.frontend_image_uri }}
      BACKEND_IMAGE_URI: ${{ needs.docker.outputs.backend_image_uri }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsAppContainerDeploy

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Deploy changed containers through SSM
        working-directory: terraform
        shell: bash
        env:
          BUILD_FRONTEND: ${{ needs.detect_changes.outputs.build_frontend }}
          BUILD_BACKEND: ${{ needs.detect_changes.outputs.build_backend }}
        run: |
          set -euo pipefail

          FRONTEND_INSTANCE_ID="$(terraform output -raw frontend_instance_id)"
          BACKEND_INSTANCE_ID="$(terraform output -raw backend_instance_id)"
          BACKEND_PRIVATE_IP="$(terraform output -raw backend_private_ip)"
          DB_HOST="$(terraform output -raw db_address)"
          DB_NAME="$(terraform output -raw db_name 2>/dev/null || echo todoapp)"
          DB_USER="$(terraform output -raw db_username 2>/dev/null || echo todo_admin)"
          DB_PASSWORD_B64="$(printf '%s' "${DB_PASSWORD}" | base64 -w0)"

          send_and_wait() {
            local instance_id="$1"
            local comment="$2"
            local command="$3"
            local parameters
            local command_id
            local result
            local status

            parameters="$(jq -n --arg command "${command}" '{commands: [$command], executionTimeout: ["900"]}')"
            command_id="$(aws ssm send-command \
              --region "${AWS_REGION}" \
              --instance-ids "${instance_id}" \
              --document-name "AWS-RunShellScript" \
              --comment "${comment}" \
              --parameters "${parameters}" \
              --query 'Command.CommandId' \
              --output text)"

            for attempt in {1..60}; do
              result="$(aws ssm get-command-invocation \
                --region "${AWS_REGION}" \
                --command-id "${command_id}" \
                --instance-id "${instance_id}" \
                --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
                --output json)"
              status="$(jq -r '.Status' <<<"${result}")"

              if [[ "${status}" == "Success" ]]; then
                echo "${result}"
                return 0
              fi

              if [[ "${status}" == "Failed" || "${status}" == "Cancelled" || "${status}" == "TimedOut" || "${status}" == "Cancelling" ]]; then
                echo "${result}"
                return 1
              fi

              sleep 10
            done

            echo "${result}"
            echo "SSM command did not finish in time."
            return 1
          }

          if [[ "${BUILD_BACKEND}" == "true" ]]; then
            backend_command="$(cat <<SCRIPT
          set -eu
          AWS_REGION="${AWS_REGION}"
          IMAGE_URI="${BACKEND_IMAGE_URI}"
          DB_HOST="${DB_HOST}"
          DB_NAME="${DB_NAME}"
          DB_USER="${DB_USER}"
          DB_PASSWORD="\$(printf '%s' '${DB_PASSWORD_B64}' | base64 -d)"
          REGISTRY="\${IMAGE_URI%%/*}"
          aws ecr get-login-password --region "\${AWS_REGION}" | docker login --username AWS --password-stdin "\${REGISTRY}"
          docker pull "\${IMAGE_URI}"
          docker rm -f todo-backend >/dev/null 2>&1 || true
          docker run -d --name todo-backend --restart unless-stopped -p 8000:8000 -e DB_HOST="\${DB_HOST}" -e DB_PORT="3306" -e DB_NAME="\${DB_NAME}" -e DB_USER="\${DB_USER}" -e DB_PASSWORD="\${DB_PASSWORD}" "\${IMAGE_URI}"
          docker ps --filter name=todo-backend
          SCRIPT
          )"
            send_and_wait "${BACKEND_INSTANCE_ID}" "Deploy backend container" "${backend_command}"
          fi

          if [[ "${BUILD_FRONTEND}" == "true" ]]; then
            frontend_command="$(cat <<SCRIPT
          set -eu
          AWS_REGION="${AWS_REGION}"
          IMAGE_URI="${FRONTEND_IMAGE_URI}"
          BACKEND_HOST="${BACKEND_PRIVATE_IP}"
          REGISTRY="\${IMAGE_URI%%/*}"
          aws ecr get-login-password --region "\${AWS_REGION}" | docker login --username AWS --password-stdin "\${REGISTRY}"
          docker pull "\${IMAGE_URI}"
          docker rm -f todo-frontend >/dev/null 2>&1 || true
          docker run -d --name todo-frontend --restart unless-stopped -p 80:80 -e BACKEND_HOST="\${BACKEND_HOST}" "\${IMAGE_URI}"
          docker ps --filter name=todo-frontend
          SCRIPT
          )"
            send_and_wait "${FRONTEND_INSTANCE_ID}" "Deploy frontend container" "${frontend_command}"
          fi

  verify:
    name: Verify App
    runs-on: ubuntu-latest
    needs:
      - resolve_promotion
      - detect_changes
      - docker
      - apply
      - deploy_containers
    if: always() && needs.resolve_promotion.outputs.action == 'apply' && needs.apply.result == 'success' && (needs.deploy_containers.result == 'success' || needs.deploy_containers.result == 'skipped')
    env:
      ENVIRONMENT: ${{ needs.resolve_promotion.outputs.target_environment }}
      STATE_KEY: ${{ needs.resolve_promotion.outputs.state_key }}
      TFVARS_FILE: ${{ needs.resolve_promotion.outputs.tfvars_file }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsAppVerify

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Verify frontend
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          FRONTEND_URL="$(terraform output -raw frontend_url)"
          echo "Frontend URL: ${FRONTEND_URL}"

          for i in {1..40}; do
            if curl -fsS --max-time 10 "${FRONTEND_URL}" >/dev/null; then
              echo "Frontend HTTP check passed."
              exit 0
            fi

            sleep 15
          done

          echo "Frontend did not become reachable in time."
          exit 1
