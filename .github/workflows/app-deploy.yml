name: App Infrastructure Deploy

on:
  push:
    branches:
      - dev
    paths:
      - "frontend/**"
      - "backend/**"
      - "terraform/*.tf"
      - "terraform/environments/**"
      - "terraform/modules/**"
      - "terraform/templates/user_data_frontend.sh.tftpl"
      - "terraform/templates/user_data_backend.sh.tftpl"
      - ".github/workflows/app-deploy.yml"
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action
        required: true
        type: choice
        options:
          - plan
          - apply
        default: apply

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-app-dev
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION || '1.9.0' }}
  ENVIRONMENT: dev
  STATE_KEY: ${{ vars.PROJECT_NAME }}/dev/app/terraform.tfstate
  TFVARS_FILE: environments/dev.tfvars
  IMAGE_TAG: ${{ github.sha }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

jobs:
  ecr:
    name: Create ECR
    runs-on: ubuntu-latest
    outputs:
      frontend_repository: ${{ steps.repos.outputs.frontend_repository }}
      backend_repository: ${{ steps.repos.outputs.backend_repository }}
      registry: ${{ steps.repos.outputs.registry }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${TF_VAR_db_password}" ]]; then
            echo "Missing required GitHub secret: DB_PASSWORD"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsAppEcr

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: terraform
        shell: bash
        run: terraform validate

      - name: Import existing ECR repositories
        if: github.event_name == 'push' || github.event.inputs.action == 'apply'
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          FRONTEND_REPOSITORY="${PROJECT_NAME}/${ENVIRONMENT}/todo-frontend"
          BACKEND_REPOSITORY="${PROJECT_NAME}/${ENVIRONMENT}/todo-backend"
          TF_VARS=(
            -var-file="${TFVARS_FILE}"
            -var="frontend_image_tag=${IMAGE_TAG}"
            -var="backend_image_tag=${IMAGE_TAG}"
          )

          import_if_exists() {
            local address="$1"
            local repository="$2"

            if terraform state show "${address}" >/dev/null 2>&1; then
              echo "${address} is already managed by Terraform."
              return
            fi

            if aws ecr describe-repositories \
              --region "${AWS_REGION}" \
              --repository-names "${repository}" >/dev/null 2>&1; then
              echo "Importing existing ECR repository ${repository} into ${address}."
              terraform import "${TF_VARS[@]}" "${address}" "${repository}"
            else
              echo "ECR repository ${repository} does not exist yet."
            fi
          }

          import_if_exists "module.ecr.aws_ecr_repository.frontend" "${FRONTEND_REPOSITORY}"
          import_if_exists "module.ecr.aws_ecr_repository.backend" "${BACKEND_REPOSITORY}"

      - name: Create ECR repositories
        if: github.event_name == 'push' || github.event.inputs.action == 'apply'
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          terraform apply -auto-approve \
            -target=module.ecr \
            -var-file="${TFVARS_FILE}" \
            -var="frontend_image_tag=${IMAGE_TAG}" \
            -var="backend_image_tag=${IMAGE_TAG}"

      - name: Resolve repository names
        id: repos
        shell: bash
        run: |
          set -euo pipefail

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          FRONTEND_REPOSITORY="${PROJECT_NAME}/${ENVIRONMENT}/todo-frontend"
          BACKEND_REPOSITORY="${PROJECT_NAME}/${ENVIRONMENT}/todo-backend"

          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "frontend_repository=${FRONTEND_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "backend_repository=${BACKEND_REPOSITORY}" >> "$GITHUB_OUTPUT"

  docker:
    name: Build And Push Images
    runs-on: ubuntu-latest
    needs:
      - ecr
    if: github.event_name == 'push' || github.event.inputs.action == 'apply'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsAppDocker

      - name: Login to ECR
        shell: bash
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${{ needs.ecr.outputs.registry }}"

      - name: Build and push backend
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_URI="${{ needs.ecr.outputs.registry }}/${{ needs.ecr.outputs.backend_repository }}:${IMAGE_TAG}"
          if aws ecr describe-images \
            --region "${AWS_REGION}" \
            --repository-name "${{ needs.ecr.outputs.backend_repository }}" \
            --image-ids imageTag="${IMAGE_TAG}" >/dev/null 2>&1; then
            echo "Backend image already exists: ${IMAGE_URI}"
            exit 0
          fi

          docker build -t "${IMAGE_URI}" backend
          docker push "${IMAGE_URI}"

      - name: Build and push frontend
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_URI="${{ needs.ecr.outputs.registry }}/${{ needs.ecr.outputs.frontend_repository }}:${IMAGE_TAG}"
          if aws ecr describe-images \
            --region "${AWS_REGION}" \
            --repository-name "${{ needs.ecr.outputs.frontend_repository }}" \
            --image-ids imageTag="${IMAGE_TAG}" >/dev/null 2>&1; then
            echo "Frontend image already exists: ${IMAGE_URI}"
            exit 0
          fi

          docker build -t "${IMAGE_URI}" frontend
          docker push "${IMAGE_URI}"

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs:
      - ecr
      - docker
    if: always() && needs.ecr.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.docker.result == 'success')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsAppPlan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Import existing database resources
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          DB_SUBNET_GROUP="${PROJECT_NAME}-${ENVIRONMENT}-db-subnet-group"
          DB_MONITORING_ROLE="${PROJECT_NAME}-${ENVIRONMENT}-rds-enhanced-monitoring-role"
          DB_IDENTIFIER="${PROJECT_NAME}-${ENVIRONMENT}-mysql"
          RDS_MONITORING_POLICY_ARN="arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole"
          TF_VARS=(
            -var-file="${TFVARS_FILE}"
            -var="frontend_image_tag=${IMAGE_TAG}"
            -var="backend_image_tag=${IMAGE_TAG}"
          )

          import_if_exists() {
            local address="$1"
            local id="$2"
            shift 2

            if terraform state show "${address}" >/dev/null 2>&1; then
              echo "${address} is already managed by Terraform."
              return
            fi

            if "$@" >/dev/null 2>&1; then
              echo "Importing existing resource ${id} into ${address}."
              terraform import "${TF_VARS[@]}" "${address}" "${id}"
            else
              echo "Resource ${id} does not exist yet."
            fi
          }

          import_if_exists \
            "module.database.aws_db_subnet_group.this" \
            "${DB_SUBNET_GROUP}" \
            aws rds describe-db-subnet-groups \
              --region "${AWS_REGION}" \
              --db-subnet-group-name "${DB_SUBNET_GROUP}"

          import_if_exists \
            "module.database.aws_iam_role.rds_enhanced_monitoring" \
            "${DB_MONITORING_ROLE}" \
            aws iam get-role \
              --role-name "${DB_MONITORING_ROLE}"

          if terraform state show "module.database.aws_iam_role_policy_attachment.rds_enhanced_monitoring" >/dev/null 2>&1; then
            echo "module.database.aws_iam_role_policy_attachment.rds_enhanced_monitoring is already managed by Terraform."
          elif [[ "$(aws iam list-attached-role-policies \
              --role-name "${DB_MONITORING_ROLE}" \
              --query "contains(AttachedPolicies[].PolicyArn, '${RDS_MONITORING_POLICY_ARN}')" \
              --output text 2>/dev/null || true)" == "True" ]]; then
            echo "Importing existing resource ${DB_MONITORING_ROLE}/${RDS_MONITORING_POLICY_ARN} into module.database.aws_iam_role_policy_attachment.rds_enhanced_monitoring."
            terraform import "${TF_VARS[@]}" \
              "module.database.aws_iam_role_policy_attachment.rds_enhanced_monitoring" \
              "${DB_MONITORING_ROLE}/${RDS_MONITORING_POLICY_ARN}"
          else
            echo "Resource ${DB_MONITORING_ROLE}/${RDS_MONITORING_POLICY_ARN} does not exist yet."
          fi

          import_if_exists \
            "module.database.aws_db_instance.this" \
            "${DB_IDENTIFIER}" \
            aws rds describe-db-instances \
              --region "${AWS_REGION}" \
              --db-instance-identifier "${DB_IDENTIFIER}"

      - name: Terraform plan
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          terraform plan \
            -var-file="${TFVARS_FILE}" \
            -var="frontend_image_tag=${IMAGE_TAG}" \
            -var="backend_image_tag=${IMAGE_TAG}" \
            -out=app.tfplan

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: app-plan
          path: terraform/app.tfplan
          if-no-files-found: error

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs:
      - plan
    if: github.event_name == 'push' || github.event.inputs.action == 'apply'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsAppApply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: app-plan
          path: terraform

      - name: Terraform apply
        working-directory: terraform
        shell: bash
        run: terraform apply -auto-approve app.tfplan

  verify:
    name: Verify App
    runs-on: ubuntu-latest
    needs:
      - apply
    if: needs.apply.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsAppVerify

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Verify frontend
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          FRONTEND_URL="$(terraform output -raw frontend_url)"
          echo "Frontend URL: ${FRONTEND_URL}"

          for i in {1..40}; do
            if curl -fsS --max-time 10 "${FRONTEND_URL}" >/dev/null; then
              echo "Frontend HTTP check passed."
              exit 0
            fi

            sleep 15
          done

          echo "Frontend did not become reachable in time."
          exit 1
