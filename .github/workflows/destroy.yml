name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to destroy
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
        default: dev

      confirm_destroy:
        description: Type DESTROY to confirm infrastructure deletion
        required: true
        type: string

      image_tag:
        description: Legacy/default Docker image tag used only to satisfy Terraform variables
        required: false
        type: string
        default: latest

      frontend_image_tag:
        description: Frontend Docker image tag used only to satisfy Terraform variables
        required: false
        type: string
        default: latest

      backend_image_tag:
        description: Backend Docker image tag used only to satisfy Terraform variables
        required: false
        type: string
        default: latest

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
  APP_DIR: .

jobs:
  validate:
    name: Validate Destroy Request
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      tfvars_file: ${{ steps.resolve.outputs.tfvars_file }}
      state_key: ${{ steps.resolve.outputs.state_key }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      frontend_image_tag: ${{ steps.resolve.outputs.frontend_image_tag }}
      backend_image_tag: ${{ steps.resolve.outputs.backend_image_tag }}
      aws_account_id: ${{ steps.resolve.outputs.aws_account_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve destroy inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          ENVIRONMENT="${{ github.event.inputs.environment }}"
          CONFIRM_DESTROY="${{ github.event.inputs.confirm_destroy }}"
          IMAGE_TAG="${{ github.event.inputs.image_tag || 'latest' }}"
          FRONTEND_IMAGE_TAG="${{ github.event.inputs.frontend_image_tag || 'latest' }}"
          BACKEND_IMAGE_TAG="${{ github.event.inputs.backend_image_tag || 'latest' }}"

          case "${ENVIRONMENT}" in
            dev|uat|prod) ;;
            *) echo "Invalid environment: ${ENVIRONMENT}"; exit 1 ;;
          esac

          if [[ "${CONFIRM_DESTROY}" != "DESTROY" ]]; then
            echo "Destroy blocked. You must type DESTROY in confirm_destroy."
            exit 1
          fi

          REQUIRED_VARS=(
            "AWS_REGION"
            "PROJECT_NAME"
            "BOOTSTRAP_ROLE_ARN"
            "TF_STATE_BUCKET"
            "TERRAFORM_VERSION"
          )

          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME}" ]]; then
              echo "Missing required GitHub variable: ${VAR_NAME}"
              exit 1
            fi
          done

          RESOLVED_AWS_ACCOUNT_ID="${AWS_ACCOUNT_ID:-}"
          if [[ -z "${RESOLVED_AWS_ACCOUNT_ID}" ]]; then
            RESOLVED_AWS_ACCOUNT_ID="$(echo "${BOOTSTRAP_ROLE_ARN}" | awk -F: '{print $5}')"
          fi

          TFVARS_FILE="environments/${ENVIRONMENT}.tfvars"
          STATE_KEY="${PROJECT_NAME}/${ENVIRONMENT}/terraform.tfstate"

          if [[ ! -f "terraform/${TFVARS_FILE}" ]]; then
            echo "Missing tfvars file: terraform/${TFVARS_FILE}"
            find terraform -maxdepth 3 -type f | sort
            exit 1
          fi

          echo "environment=${ENVIRONMENT}" >> "${GITHUB_OUTPUT}"
          echo "tfvars_file=${TFVARS_FILE}" >> "${GITHUB_OUTPUT}"
          echo "state_key=${STATE_KEY}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "frontend_image_tag=${FRONTEND_IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "backend_image_tag=${BACKEND_IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "aws_account_id=${RESOLVED_AWS_ACCOUNT_ID}" >> "${GITHUB_OUTPUT}"

      - name: Display destroy summary
        shell: bash
        run: |
          echo "Environment: ${{ steps.resolve.outputs.environment }}"
          echo "State key: ${{ steps.resolve.outputs.state_key }}"
          echo "Tfvars file: terraform/${{ steps.resolve.outputs.tfvars_file }}"
          echo "Project: ${PROJECT_NAME}"
          echo "AWS Region: ${AWS_REGION}"
          echo "AWS Account ID: ${{ steps.resolve.outputs.aws_account_id }}"

  terraform-destroy:
    name: Terraform Destroy
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ needs.validate.outputs.environment }}
    env:
      ENVIRONMENT: ${{ needs.validate.outputs.environment }}
      TFVARS_FILE: ${{ needs.validate.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.validate.outputs.state_key }}
      IMAGE_TAG: ${{ needs.validate.outputs.image_tag }}
      FRONTEND_IMAGE_TAG: ${{ needs.validate.outputs.frontend_image_tag }}
      BACKEND_IMAGE_TAG: ${{ needs.validate.outputs.backend_image_tag }}
      AWS_ACCOUNT_ID: ${{ needs.validate.outputs.aws_account_id }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformDestroy

      - name: Confirm AWS identity
        shell: bash
        run: |
          aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        shell: bash
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        working-directory: terraform
        shell: bash
        run: terraform validate

      - name: Terraform Destroy Plan
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          terraform plan -destroy \
            -var-file="${TFVARS_FILE}" \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${IMAGE_TAG}" \
            -var="frontend_image_tag=${FRONTEND_IMAGE_TAG}" \
            -var="backend_image_tag=${BACKEND_IMAGE_TAG}" \
            -out=tf-destroy-plan

      - name: Terraform Destroy Apply
        working-directory: terraform
        shell: bash
        run: |
          terraform apply -auto-approve tf-destroy-plan
