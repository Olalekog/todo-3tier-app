name: Docker Build Test Push

on:
  push:
    branches:
      - dev
      - uat
      - prod
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/docker-build-push.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
        default: dev

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  APP_DIR: .

jobs:
  resolve:
    name: Resolve Build Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      aws_account_id: ${{ steps.resolve.outputs.aws_account_id }}
      ecr_registry: ${{ steps.resolve.outputs.ecr_registry }}
      frontend_repository: ${{ steps.resolve.outputs.frontend_repository }}
      backend_repository: ${{ steps.resolve.outputs.backend_repository }}
      frontend_image: ${{ steps.resolve.outputs.frontend_image }}
      backend_image: ${{ steps.resolve.outputs.backend_image }}
      frontend_image_latest: ${{ steps.resolve.outputs.frontend_image_latest }}
      backend_image_latest: ${{ steps.resolve.outputs.backend_image_latest }}
    steps:
      - name: Resolve environment and image names
        id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
          else
            ENVIRONMENT="${GITHUB_REF_NAME}"
          fi

          case "${ENVIRONMENT}" in
            dev|uat|prod)
              ;;
            *)
              echo "Unsupported environment: ${ENVIRONMENT}"
              exit 1
              ;;
          esac

          RESOLVED_AWS_ACCOUNT_ID="${AWS_ACCOUNT_ID}"
          if [[ -z "${RESOLVED_AWS_ACCOUNT_ID}" && -n "${BOOTSTRAP_ROLE_ARN}" ]]; then
            RESOLVED_AWS_ACCOUNT_ID="$(echo "${BOOTSTRAP_ROLE_ARN}" | awk -F: '{print $5}')"
          fi

          REQUIRED_VARS=(
            "AWS_REGION"
            "RESOLVED_AWS_ACCOUNT_ID"
            "PROJECT_NAME"
            "BOOTSTRAP_ROLE_ARN"
          )

          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME}" ]]; then
              echo "Missing required GitHub variable: ${VAR_NAME}"
              exit 1
            fi
          done

          ECR_REGISTRY="${RESOLVED_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          FRONTEND_REPOSITORY="${PROJECT_NAME}/${ENVIRONMENT}/todo-frontend"
          BACKEND_REPOSITORY="${PROJECT_NAME}/${ENVIRONMENT}/todo-backend"
          IMAGE_TAG="${GITHUB_SHA}"

          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "aws_account_id=${RESOLVED_AWS_ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "ecr_registry=${ECR_REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "frontend_repository=${FRONTEND_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "backend_repository=${BACKEND_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${ECR_REGISTRY}/${FRONTEND_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${ECR_REGISTRY}/${BACKEND_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "frontend_image_latest=${ECR_REGISTRY}/${FRONTEND_REPOSITORY}:latest" >> "$GITHUB_OUTPUT"
          echo "backend_image_latest=${ECR_REGISTRY}/${BACKEND_REPOSITORY}:latest" >> "$GITHUB_OUTPUT"

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs:
      - resolve
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker build paths
        shell: bash
        run: |
          if [[ ! -d "frontend" ]]; then
            echo "Missing frontend directory at repo root."
            exit 1
          fi

          if [[ ! -d "backend" ]]; then
            echo "Missing backend directory at repo root."
            exit 1
          fi

          if [[ ! -f "frontend/Dockerfile" ]]; then
            echo "Missing frontend/Dockerfile."
            exit 1
          fi

          if [[ ! -f "backend/Dockerfile" ]]; then
            echo "Missing backend/Dockerfile."
            exit 1
          fi

      - name: Build frontend image
        shell: bash
        run: |
          docker build \
            -t "${{ needs.resolve.outputs.frontend_image }}" \
            -t "${{ needs.resolve.outputs.frontend_image_latest }}" \
            frontend

      - name: Build backend image
        shell: bash
        run: |
          docker build \
            -t "${{ needs.resolve.outputs.backend_image }}" \
            -t "${{ needs.resolve.outputs.backend_image_latest }}" \
            backend

      - name: Save Docker images as artifacts
        shell: bash
        run: |
          mkdir -p docker-artifacts
          docker save "${{ needs.resolve.outputs.frontend_image }}" "${{ needs.resolve.outputs.frontend_image_latest }}" \
            -o docker-artifacts/frontend-image.tar
          docker save "${{ needs.resolve.outputs.backend_image }}" "${{ needs.resolve.outputs.backend_image_latest }}" \
            -o docker-artifacts/backend-image.tar

      - name: Upload frontend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: docker-artifacts/frontend-image.tar
          retention-days: 1

      - name: Upload backend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: docker-artifacts/backend-image.tar
          retention-days: 1

  test:
    name: Test Docker Images
    runs-on: ubuntu-latest
    needs:
      - resolve
      - build
    steps:
      - name: Download frontend image artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: docker-artifacts

      - name: Download backend image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: docker-artifacts

      - name: Load Docker images
        shell: bash
        run: |
          docker load -i docker-artifacts/frontend-image.tar
          docker load -i docker-artifacts/backend-image.tar
          docker images

      - name: Test frontend container
        shell: bash
        run: |
          docker run -d --name todo-frontend-test -p 8080:80 "${{ needs.resolve.outputs.frontend_image }}"
          sleep 10
          curl -f http://localhost:8080 || (docker logs todo-frontend-test && exit 1)
          docker rm -f todo-frontend-test

      - name: Test backend container
        shell: bash
        run: |
          docker network create todo-test-network

          docker run -d --name todo-mysql-test --network todo-test-network \
            -e MYSQL_ROOT_PASSWORD=rootpassword \
            -e MYSQL_DATABASE=todoapp \
            -e MYSQL_USER=todo_admin \
            -e MYSQL_PASSWORD=todo_password \
            mysql:8

          sleep 35

          docker run -d --name todo-backend-test --network todo-test-network -p 8000:8000 \
            -e DB_HOST=todo-mysql-test \
            -e DB_PORT=3306 \
            -e DB_NAME=todoapp \
            -e DB_USER=todo_admin \
            -e DB_PASSWORD=todo_password \
            "${{ needs.resolve.outputs.backend_image }}"

          sleep 15
          curl -f http://localhost:8000/health || (docker logs todo-backend-test && exit 1)
          docker rm -f todo-backend-test todo-mysql-test
          docker network rm todo-test-network

  push:
    name: Push Docker Images to ECR
    runs-on: ubuntu-latest
    needs:
      - resolve
      - test
    steps:
      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsDockerPush

      - name: Confirm AWS identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        shell: bash
        run: |
          aws ecr describe-repositories --repository-names "${{ needs.resolve.outputs.frontend_repository }}" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "${{ needs.resolve.outputs.frontend_repository }}" \
              --image-scanning-configuration scanOnPush=true

          aws ecr describe-repositories --repository-names "${{ needs.resolve.outputs.backend_repository }}" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "${{ needs.resolve.outputs.backend_repository }}" \
              --image-scanning-configuration scanOnPush=true

      - name: Download frontend image artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: docker-artifacts

      - name: Download backend image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: docker-artifacts

      - name: Load Docker images
        shell: bash
        run: |
          docker load -i docker-artifacts/frontend-image.tar
          docker load -i docker-artifacts/backend-image.tar
          docker images

      - name: Push frontend images
        shell: bash
        run: |
          docker push "${{ needs.resolve.outputs.frontend_image }}"
          docker push "${{ needs.resolve.outputs.frontend_image_latest }}"

      - name: Push backend images
        shell: bash
        run: |
          docker push "${{ needs.resolve.outputs.backend_image }}"
          docker push "${{ needs.resolve.outputs.backend_image_latest }}"

      - name: Print pushed image URIs
        shell: bash
        run: |
          echo "Frontend SHA image: ${{ needs.resolve.outputs.frontend_image }}"
          echo "Frontend latest image: ${{ needs.resolve.outputs.frontend_image_latest }}"
          echo "Backend SHA image: ${{ needs.resolve.outputs.backend_image }}"
          echo "Backend latest image: ${{ needs.resolve.outputs.backend_image_latest }}"
