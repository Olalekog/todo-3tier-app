name: Docker Build Test Push

on:
  push:
    branches:
      - dev
      - uat
      - prod
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/docker-build-push.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
        default: dev
      image_tag:
        description: "Optional image tag. Default is the Git SHA."
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  APP_DIR: .
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}

jobs:
  set-environment:
    name: Set Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set.outputs.environment }}
      image_tag: ${{ steps.set.outputs.image_tag }}
      frontend_repository: ${{ steps.set.outputs.frontend_repository }}
      backend_repository: ${{ steps.set.outputs.backend_repository }}
      frontend_image_latest: ${{ steps.set.outputs.frontend_image_latest }}
      backend_image_latest: ${{ steps.set.outputs.backend_image_latest }}
      frontend_image_revision: ${{ steps.set.outputs.frontend_image_revision }}
      backend_image_revision: ${{ steps.set.outputs.backend_image_revision }}
      aws_account_id: ${{ steps.set.outputs.aws_account_id }}
    steps:
      - name: Resolve environment and image names
        id: set
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
              IMAGE_TAG="${{ github.event.inputs.image_tag }}"
            else
              IMAGE_TAG="${GITHUB_SHA}"
            fi
          else
            BRANCH="${GITHUB_REF_NAME}"
            case "${BRANCH}" in
              dev) ENVIRONMENT="dev" ;;
              uat) ENVIRONMENT="uat" ;;
              prod) ENVIRONMENT="prod" ;;
              *) echo "Unsupported branch: ${BRANCH}"; exit 1 ;;
            esac
            IMAGE_TAG="${GITHUB_SHA}"
          fi

          if [[ -z "${AWS_ACCOUNT_ID}" ]]; then
            AWS_ACCOUNT_ID="$(echo "${BOOTSTRAP_ROLE_ARN}" | cut -d: -f5)"
          fi

          if [[ -z "${AWS_ACCOUNT_ID}" || ! "${AWS_ACCOUNT_ID}" =~ ^[0-9]{12}$ ]]; then
            echo "Unable to resolve AWS_ACCOUNT_ID. Set the GitHub variable AWS_ACCOUNT_ID or use a valid BOOTSTRAP_ROLE_ARN."
            exit 1
          fi

          FRONTEND_REPOSITORY="${PROJECT_NAME}/${ENVIRONMENT}/todo-frontend"
          BACKEND_REPOSITORY="${PROJECT_NAME}/${ENVIRONMENT}/todo-backend"
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "frontend_repository=${FRONTEND_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "backend_repository=${BACKEND_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "frontend_image_latest=${ECR_REGISTRY}/${FRONTEND_REPOSITORY}:latest" >> "$GITHUB_OUTPUT"
          echo "backend_image_latest=${ECR_REGISTRY}/${BACKEND_REPOSITORY}:latest" >> "$GITHUB_OUTPUT"
          echo "frontend_image_revision=${ECR_REGISTRY}/${FRONTEND_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "backend_image_revision=${ECR_REGISTRY}/${BACKEND_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "aws_account_id=${AWS_ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

          echo "Environment: ${ENVIRONMENT}"
          echo "Image tag: ${IMAGE_TAG}"
          echo "AWS account ID: ${AWS_ACCOUNT_ID}"

  docker-build-test-push:
    name: Build Test Push Docker Images
    runs-on: ubuntu-latest
    needs:
      - set-environment
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required variables and folders
        shell: bash
        run: |
          REQUIRED_VARS=(
            "AWS_REGION"
            "PROJECT_NAME"
            "BOOTSTRAP_ROLE_ARN"
          )

          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME}" ]]; then
              echo "Missing required GitHub variable: ${VAR_NAME}"
              exit 1
            fi
          done

          if [[ ! -d "${APP_DIR}/frontend" ]]; then
            echo "Missing frontend folder: ${APP_DIR}/frontend"
            exit 1
          fi

          if [[ ! -d "${APP_DIR}/backend" ]]; then
            echo "Missing backend folder: ${APP_DIR}/backend"
            exit 1
          fi

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions

      - name: Confirm AWS identity
        shell: bash
        run: aws sts get-caller-identity

      - name: Ensure ECR repositories exist
        shell: bash
        run: |
          for REPOSITORY in \
            "${{ needs.set-environment.outputs.frontend_repository }}" \
            "${{ needs.set-environment.outputs.backend_repository }}"; do
            if aws ecr describe-repositories --repository-names "${REPOSITORY}" >/dev/null 2>&1; then
              echo "ECR repository exists: ${REPOSITORY}"
            else
              echo "Creating ECR repository: ${REPOSITORY}"
              aws ecr create-repository \
                --repository-name "${REPOSITORY}" \
                --image-scanning-configuration scanOnPush=true \
                --image-tag-mutability MUTABLE >/dev/null
            fi
          done

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build frontend image locally
        shell: bash
        run: |
          docker build \
            -t todo-frontend-test:${{ needs.set-environment.outputs.image_tag }} \
            "${APP_DIR}/frontend"

      - name: Build backend image locally
        shell: bash
        run: |
          docker build \
            -t todo-backend-test:${{ needs.set-environment.outputs.image_tag }} \
            "${APP_DIR}/backend"

      - name: Test frontend container locally
        shell: bash
        run: |
          docker run -d --name todo-frontend-test -p 8080:80 \
            todo-frontend-test:${{ needs.set-environment.outputs.image_tag }}
          sleep 10
          curl -f http://localhost:8080 || (docker logs todo-frontend-test && exit 1)
          docker rm -f todo-frontend-test

      - name: Test backend container locally
        shell: bash
        run: |
          docker network create todo-test-network
          docker run -d --name todo-mysql-test --network todo-test-network \
            -e MYSQL_ROOT_PASSWORD=rootpassword \
            -e MYSQL_DATABASE=todoapp \
            -e MYSQL_USER=todo_admin \
            -e MYSQL_PASSWORD=testpassword \
            mysql:8.0

          echo "Waiting for MySQL test database..."
          sleep 35

          docker run -d --name todo-backend-test --network todo-test-network -p 8000:8000 \
            -e DB_HOST=todo-mysql-test \
            -e DB_PORT=3306 \
            -e DB_NAME=todoapp \
            -e DB_USER=todo_admin \
            -e DB_PASSWORD=testpassword \
            todo-backend-test:${{ needs.set-environment.outputs.image_tag }}

          sleep 15
          curl -f http://localhost:8000/health || (docker logs todo-backend-test && exit 1)
          docker rm -f todo-backend-test todo-mysql-test
          docker network rm todo-test-network

      - name: Tag images for ECR
        shell: bash
        run: |
          docker tag todo-frontend-test:${{ needs.set-environment.outputs.image_tag }} \
            "${{ needs.set-environment.outputs.frontend_image_latest }}"
          docker tag todo-frontend-test:${{ needs.set-environment.outputs.image_tag }} \
            "${{ needs.set-environment.outputs.frontend_image_revision }}"

          docker tag todo-backend-test:${{ needs.set-environment.outputs.image_tag }} \
            "${{ needs.set-environment.outputs.backend_image_latest }}"
          docker tag todo-backend-test:${{ needs.set-environment.outputs.image_tag }} \
            "${{ needs.set-environment.outputs.backend_image_revision }}"

      - name: Push images to ECR
        shell: bash
        run: |
          docker push "${{ needs.set-environment.outputs.frontend_image_latest }}"
          docker push "${{ needs.set-environment.outputs.frontend_image_revision }}"
          docker push "${{ needs.set-environment.outputs.backend_image_latest }}"
          docker push "${{ needs.set-environment.outputs.backend_image_revision }}"

      - name: Image summary
        shell: bash
        run: |
          echo "Frontend latest:  ${{ needs.set-environment.outputs.frontend_image_latest }}"
          echo "Frontend tagged:  ${{ needs.set-environment.outputs.frontend_image_revision }}"
          echo "Backend latest:   ${{ needs.set-environment.outputs.backend_image_latest }}"
          echo "Backend tagged:   ${{ needs.set-environment.outputs.backend_image_revision }}"
