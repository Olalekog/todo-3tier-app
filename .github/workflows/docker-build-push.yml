name: Docker Build Test Push

on:
  pull_request:
    branches:
      - dev
      - prod
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches: [dev]
    paths:
      - "frontend/**"
      - "backend/**"
      - "terraform/**"
      - ".github/workflows/docker-build-push.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Environment
        required: true
        type: choice
        options: [dev, uat, prod]
        default: dev
      workload:
        description: Workload to build
        required: true
        type: choice
        options: [frontend, backend, app]
        default: app

permissions:
  id-token: write
  contents: read
  pull-requests: read
  actions: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  APP_DIR: .

jobs:

  validate-promotion-path:
    name: Validate PR Promotion Path
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Enforce dev-to-uat and uat-to-prod only
        shell: bash
        run: |
          set -euo pipefail

          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"

          echo "Pull request source branch: ${HEAD_BRANCH}"
          echo "Pull request target branch: ${BASE_BRANCH}"

          if [[ "${BASE_BRANCH}" == "uat" && "${HEAD_BRANCH}" == "dev" ]]; then
            echo "Allowed promotion path: dev -> uat"
            exit 0
          fi

          if [[ "${BASE_BRANCH}" == "prod" && "${HEAD_BRANCH}" == "uat" ]]; then
            echo "Allowed promotion path: uat -> prod"
            exit 0
          fi

          echo "Invalid promotion path: ${HEAD_BRANCH} -> ${BASE_BRANCH}"
          echo "Only these PR promotion paths are allowed:"
          echo "  dev -> uat"
          echo "  uat -> prod"
          exit 1

  push-branch-guard:
    name: Push Branch Guard
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Enforce uat-only push trigger
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" != "dev" ]]; then
            echo "Push-based workflow execution is restricted to the dev branch only."
            echo "Current branch: ${GITHUB_REF_NAME}"
            exit 1
          fi
          echo "Push branch allowed: ${GITHUB_REF_NAME}"


  pr-validation-complete:
    name: PR Validation Complete
    runs-on: ubuntu-latest
    needs:
      - validate-promotion-path
    if: github.event_name == 'pull_request'
    steps:
      - name: Stop after PR promotion validation
        run: |
          echo "PR validation only; Docker build and push are skipped for pull requests."
          echo "Docker image build/push runs on allowed branch push only."

  resolve:
    if: github.event_name != 'pull_request'
    name: Resolve Changes
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      workload: ${{ steps.resolve.outputs.workload }}
      build_frontend: ${{ steps.resolve.outputs.build_frontend }}
      build_backend: ${{ steps.resolve.outputs.build_backend }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      frontend_image_tag: ${{ steps.resolve.outputs.frontend_image_tag }}
      backend_image_tag: ${{ steps.resolve.outputs.backend_image_tag }}
      aws_account_id: ${{ steps.resolve.outputs.aws_account_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve environment and changed workload
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          RESOLVED_AWS_ACCOUNT_ID="${AWS_ACCOUNT_ID}"
          if [[ -z "${RESOLVED_AWS_ACCOUNT_ID}" ]]; then
            RESOLVED_AWS_ACCOUNT_ID="$(echo "${BOOTSTRAP_ROLE_ARN}" | awk -F: '{print $5}')"
          fi

          REQUIRED_VARS=(
            "AWS_REGION"
            "PROJECT_NAME"
            "BOOTSTRAP_ROLE_ARN"
            "RESOLVED_AWS_ACCOUNT_ID"
          )

          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME}" ]]; then
              echo "Missing required value: ${VAR_NAME}"
              exit 1
            fi
          done

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            REQUESTED_WORKLOAD="${{ github.event.inputs.workload }}"

            if [[ "${REQUESTED_WORKLOAD}" == "frontend" ]]; then
              BUILD_FRONTEND="true"
              BUILD_BACKEND="false"
              WORKLOAD="frontend"
            elif [[ "${REQUESTED_WORKLOAD}" == "backend" ]]; then
              BUILD_FRONTEND="false"
              BUILD_BACKEND="true"
              WORKLOAD="backend"
            else
              BUILD_FRONTEND="true"
              BUILD_BACKEND="true"
              WORKLOAD="app"
            fi
          else
            case "${GITHUB_REF_NAME}" in
              dev) ENVIRONMENT="dev" ;;
              uat|prod)
                echo "Push-based Docker workflow is restricted. Only pushes to the dev branch are allowed."
                echo "Current branch: ${GITHUB_REF_NAME}"
                exit 1
                ;;
              *) echo "Unsupported branch: ${GITHUB_REF_NAME}"; exit 1 ;;
            esac

            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"

            if [[ -z "${BEFORE}" || "${BEFORE}" == "0000000000000000000000000000000000000000" ]]; then
              CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "${AFTER}")"
            else
              CHANGED_FILES="$(git diff --name-only "${BEFORE}" "${AFTER}")"
            fi

            echo "Changed files:"
            echo "${CHANGED_FILES}"

            BUILD_FRONTEND="false"
            BUILD_BACKEND="false"

            if echo "${CHANGED_FILES}" | grep -Eq '^frontend/'; then
              BUILD_FRONTEND="true"
            fi

            if echo "${CHANGED_FILES}" | grep -Eq '^backend/'; then
              BUILD_BACKEND="true"
            fi

            if [[ "${BUILD_FRONTEND}" == "true" && "${BUILD_BACKEND}" == "true" ]]; then
              WORKLOAD="app"
            elif [[ "${BUILD_FRONTEND}" == "true" ]]; then
              WORKLOAD="frontend"
            elif [[ "${BUILD_BACKEND}" == "true" ]]; then
              WORKLOAD="backend"
            else
              WORKLOAD="infra"
            fi
          fi

          IMAGE_TAG="${GITHUB_SHA}"

          # The changed workload gets the new SHA tag.
          # Unchanged workloads stay on latest so Terraform does not force unrelated image updates.
          FRONTEND_IMAGE_TAG="latest"
          BACKEND_IMAGE_TAG="latest"

          if [[ "${BUILD_FRONTEND}" == "true" ]]; then
            FRONTEND_IMAGE_TAG="${IMAGE_TAG}"
          fi

          if [[ "${BUILD_BACKEND}" == "true" ]]; then
            BACKEND_IMAGE_TAG="${IMAGE_TAG}"
          fi

          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "workload=${WORKLOAD}" >> "$GITHUB_OUTPUT"
          echo "build_frontend=${BUILD_FRONTEND}" >> "$GITHUB_OUTPUT"
          echo "build_backend=${BUILD_BACKEND}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "frontend_image_tag=${FRONTEND_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "backend_image_tag=${BACKEND_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "aws_account_id=${RESOLVED_AWS_ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

          echo "Resolved environment: ${ENVIRONMENT}"
          echo "Resolved workload: ${WORKLOAD}"
          echo "Build frontend: ${BUILD_FRONTEND}"
          echo "Build backend: ${BUILD_BACKEND}"
          echo "Image tag: ${IMAGE_TAG}"
          echo "Frontend deploy tag: ${FRONTEND_IMAGE_TAG}"
          echo "Backend deploy tag: ${BACKEND_IMAGE_TAG}"

  build:
    name: Build Images
    needs: resolve
    if: needs.resolve.outputs.build_frontend == 'true' || needs.resolve.outputs.build_backend == 'true'
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
      RESOLVED_AWS_ACCOUNT_ID: ${{ needs.resolve.outputs.aws_account_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend image
        if: needs.resolve.outputs.build_frontend == 'true'
        shell: bash
        run: |
          set -euo pipefail
          FRONTEND_IMAGE="${RESOLVED_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}/${ENVIRONMENT}/todo-frontend:${IMAGE_TAG}"
          docker build -t "${FRONTEND_IMAGE}" frontend
          docker save "${FRONTEND_IMAGE}" -o frontend-image.tar

      - name: Build backend image
        if: needs.resolve.outputs.build_backend == 'true'
        shell: bash
        run: |
          set -euo pipefail
          BACKEND_IMAGE="${RESOLVED_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}/${ENVIRONMENT}/todo-backend:${IMAGE_TAG}"
          docker build -t "${BACKEND_IMAGE}" backend
          docker save "${BACKEND_IMAGE}" -o backend-image.tar

      - name: Upload Docker images
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-${{ needs.resolve.outputs.image_tag }}
          path: |
            frontend-image.tar
            backend-image.tar
          if-no-files-found: error

  test:
    name: Test Images
    needs: [resolve, build]
    if: needs.resolve.outputs.build_frontend == 'true' || needs.resolve.outputs.build_backend == 'true'
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
      RESOLVED_AWS_ACCOUNT_ID: ${{ needs.resolve.outputs.aws_account_id }}

    steps:
      - name: Download Docker images
        uses: actions/download-artifact@v4
        with:
          name: docker-images-${{ needs.resolve.outputs.image_tag }}
          path: .

      - name: Load Docker image artifacts
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f frontend-image.tar ]]; then
            echo "Loading frontend image artifact..."
            docker load -i frontend-image.tar
          else
            echo "No frontend image artifact found. Skipping frontend image load."
          fi

          if [[ -f backend-image.tar ]]; then
            echo "Loading backend image artifact..."
            docker load -i backend-image.tar
          else
            echo "No backend image artifact found. Skipping backend image load."
          fi

          echo "Loaded Docker images:"
          docker images

      - name: Test frontend container
        if: needs.resolve.outputs.build_frontend == 'true'
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${RESOLVED_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}/${ENVIRONMENT}/todo-frontend:${IMAGE_TAG}"

          docker run -d --name frontend-test -p 8080:80 "${IMAGE}"

          for i in {1..30}; do
            if curl -fsS http://localhost:8080 >/dev/null; then
              echo "Frontend health check passed."
              docker rm -f frontend-test
              exit 0
            fi
            echo "Waiting for frontend container..."
            sleep 3
          done

          echo "Frontend container failed health check."
          docker logs frontend-test || true
          docker rm -f frontend-test || true
          exit 1

      - name: Test backend container
        if: needs.resolve.outputs.build_backend == 'true'
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${RESOLVED_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}/${ENVIRONMENT}/todo-backend:${IMAGE_TAG}"

          docker network create todo-test

          docker run -d --name todo-mysql-test --network todo-test \
            -e MYSQL_ROOT_PASSWORD=testpass \
            -e MYSQL_DATABASE=todoapp \
            -e MYSQL_USER=todo_admin \
            -e MYSQL_PASSWORD=testpass \
            mysql:8

          echo "Waiting for MySQL to accept real todo_admin connections..."
          for i in {1..40}; do
            if docker exec todo-mysql-test mysql -h 127.0.0.1 -utodo_admin -ptestpass -D todoapp -e "SELECT 1;" >/dev/null 2>&1; then
              echo "MySQL is ready."
              break
            fi
            sleep 3
          done

          docker run -d --name todo-backend-test --network todo-test -p 8000:8000 \
            -e DB_HOST=todo-mysql-test \
            -e DB_PORT=3306 \
            -e DB_NAME=todoapp \
            -e DB_USER=todo_admin \
            -e DB_PASSWORD=testpass \
            "${IMAGE}"

          for i in {1..40}; do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              echo "Backend health check passed."
              docker rm -f todo-backend-test todo-mysql-test
              docker network rm todo-test
              exit 0
            fi
            echo "Waiting for backend container..."
            sleep 3
          done

          echo "Backend container failed health check."
          docker logs todo-backend-test || true
          docker rm -f todo-backend-test todo-mysql-test || true
          docker network rm todo-test || true
          exit 1

  push:
    name: Push Images
    needs: [resolve, test]
    if: needs.resolve.outputs.build_frontend == 'true' || needs.resolve.outputs.build_backend == 'true'
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
      RESOLVED_AWS_ACCOUNT_ID: ${{ needs.resolve.outputs.aws_account_id }}

    steps:
      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsDockerPush

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download Docker images
        uses: actions/download-artifact@v4
        with:
          name: docker-images-${{ needs.resolve.outputs.image_tag }}
          path: .

      - name: Load Docker image artifacts
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f frontend-image.tar ]]; then
            echo "Loading frontend image artifact..."
            docker load -i frontend-image.tar
          else
            echo "No frontend image artifact found. Skipping frontend image load."
          fi

          if [[ -f backend-image.tar ]]; then
            echo "Loading backend image artifact..."
            docker load -i backend-image.tar
          else
            echo "No backend image artifact found. Skipping backend image load."
          fi

          echo "Loaded Docker images:"
          docker images

      - name: Ensure ECR repositories exist
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ needs.resolve.outputs.build_frontend }}" == "true" ]]; then
            aws ecr describe-repositories \
              --region "${AWS_REGION}" \
              --repository-names "${PROJECT_NAME}/${ENVIRONMENT}/todo-frontend" >/dev/null 2>&1 || \
            aws ecr create-repository \
              --region "${AWS_REGION}" \
              --repository-name "${PROJECT_NAME}/${ENVIRONMENT}/todo-frontend" \
              --image-scanning-configuration scanOnPush=true
          fi

          if [[ "${{ needs.resolve.outputs.build_backend }}" == "true" ]]; then
            aws ecr describe-repositories \
              --region "${AWS_REGION}" \
              --repository-names "${PROJECT_NAME}/${ENVIRONMENT}/todo-backend" >/dev/null 2>&1 || \
            aws ecr create-repository \
              --region "${AWS_REGION}" \
              --repository-name "${PROJECT_NAME}/${ENVIRONMENT}/todo-backend" \
              --image-scanning-configuration scanOnPush=true
          fi

      - name: Push frontend image with SHA and latest tags
        if: needs.resolve.outputs.build_frontend == 'true'
        shell: bash
        run: |
          set -euo pipefail

          REPO="${PROJECT_NAME}/${ENVIRONMENT}/todo-frontend"
          IMAGE_SHA="${RESOLVED_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${REPO}:${IMAGE_TAG}"
          IMAGE_LATEST="${RESOLVED_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${REPO}:latest"

          docker tag "${IMAGE_SHA}" "${IMAGE_LATEST}"

          docker push "${IMAGE_SHA}"
          docker push "${IMAGE_LATEST}"

          echo "Verifying frontend ECR tags exist..."
          aws ecr describe-images \
            --region "${AWS_REGION}" \
            --repository-name "${REPO}" \
            --image-ids imageTag="${IMAGE_TAG}" imageTag=latest \
            --query "imageDetails[*].imageTags" \
            --output table

      - name: Push backend image with SHA and latest tags
        if: needs.resolve.outputs.build_backend == 'true'
        shell: bash
        run: |
          set -euo pipefail

          REPO="${PROJECT_NAME}/${ENVIRONMENT}/todo-backend"
          IMAGE_SHA="${RESOLVED_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${REPO}:${IMAGE_TAG}"
          IMAGE_LATEST="${RESOLVED_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${REPO}:latest"

          docker tag "${IMAGE_SHA}" "${IMAGE_LATEST}"

          docker push "${IMAGE_SHA}"
          docker push "${IMAGE_LATEST}"

          echo "Verifying backend ECR tags exist..."
          aws ecr describe-images \
            --region "${AWS_REGION}" \
            --repository-name "${REPO}" \
            --image-ids imageTag="${IMAGE_TAG}" imageTag=latest \
            --query "imageDetails[*].imageTags" \
            --output table

  deploy-dev:
    name: Deploy Dev Workload With New Image
    needs: [resolve, push]
    if: needs.resolve.outputs.environment == 'dev' && (needs.resolve.outputs.build_frontend == 'true' || needs.resolve.outputs.build_backend == 'true')
    uses: ./.github/workflows/deploy.yml
    with:
      environment: dev
      action: apply
      workload: ${{ needs.resolve.outputs.workload }}
      frontend_image_tag: ${{ needs.resolve.outputs.frontend_image_tag }}
      backend_image_tag: ${{ needs.resolve.outputs.backend_image_tag }}
      allow_replacement: false
    secrets: inherit

  deploy-dev-infra-only:
    name: Deploy Dev Infrastructure Only
    needs: resolve
    if: needs.resolve.outputs.environment == 'dev' && needs.resolve.outputs.workload == 'infra'
    uses: ./.github/workflows/deploy.yml
    with:
      environment: dev
      action: apply
      workload: infra
      frontend_image_tag: latest
      backend_image_tag: latest
      allow_replacement: false
    secrets: inherit
