name: Terraform Deploy Todo App

on:
  push:
    branches:
      - dev
      - uat
      - prod
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yml"

  pull_request:
    branches:
      - uat
      - prod
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - uat
          - prod
      terraform_action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy
      image_tag:
        description: "Docker image tag to deploy. Use a Git SHA from the Docker workflow, or latest."
        required: true
        default: "latest"
        type: string

permissions:
  id-token: write
  contents: read
  pull-requests: read

concurrency:
  group: todo-3tier-deploy-${{ github.event_name }}-${{ github.ref_name }}-${{ github.event.inputs.environment || github.base_ref || github.ref_name }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

jobs:
  validate-promotion-path:
    name: Validate Promotion Path
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate source and target branch
        shell: bash
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          TARGET_BRANCH="${{ github.base_ref }}"

          echo "Source branch: ${SOURCE_BRANCH}"
          echo "Target branch: ${TARGET_BRANCH}"

          if [[ "${TARGET_BRANCH}" == "uat" && "${SOURCE_BRANCH}" == "dev" ]]; then
            echo "Valid promotion path: dev -> uat"
            exit 0
          fi

          if [[ "${TARGET_BRANCH}" == "prod" && "${SOURCE_BRANCH}" == "uat" ]]; then
            echo "Valid promotion path: uat -> prod"
            echo "Production deployment requires GitHub Environment approval on prod after merge."
            exit 0
          fi

          echo "Invalid promotion path."
          echo "Allowed promotion paths are:"
          echo "  dev -> uat"
          echo "  uat -> prod"
          exit 1

  set-environment:
    name: Resolve Deployment Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      tfvars_file: ${{ steps.resolve.outputs.tfvars_file }}
      terraform_action: ${{ steps.resolve.outputs.terraform_action }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
    steps:
      - name: Resolve environment, action, and image tag
        id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            TERRAFORM_ACTION="${{ github.event.inputs.terraform_action }}"
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ENVIRONMENT="${{ github.base_ref }}"
            TERRAFORM_ACTION="plan"
            IMAGE_TAG="latest"
          else
            case "${{ github.ref_name }}" in
              dev)
                ENVIRONMENT="dev"
                ;;
              uat)
                ENVIRONMENT="uat"
                ;;
              prod)
                ENVIRONMENT="prod"
                ;;
              *)
                echo "Unsupported branch: ${{ github.ref_name }}"
                exit 1
                ;;
            esac
            TERRAFORM_ACTION="apply"
            IMAGE_TAG="latest"
          fi

          TFVARS_FILE="terraform/environments/${ENVIRONMENT}.tfvars"

          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "tfvars_file=${TFVARS_FILE}" >> "$GITHUB_OUTPUT"
          echo "terraform_action=${TERRAFORM_ACTION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

          echo "Environment: ${ENVIRONMENT}"
          echo "TFVars file: ${TFVARS_FILE}"
          echo "Terraform action: ${TERRAFORM_ACTION}"
          echo "Image tag: ${IMAGE_TAG}"

  terraform-validate-plan:
    name: Terraform Validate and Plan
    runs-on: ubuntu-latest
    needs:
      - validate-promotion-path
      - set-environment
    if: |
      always() &&
      (
        github.event_name != 'pull_request' ||
        needs.validate-promotion-path.result == 'success'
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required variables
        shell: bash
        run: |
          REQUIRED_VARS=(
            "AWS_REGION"
            "PROJECT_NAME"
            "BOOTSTRAP_ROLE_ARN"
            "TERRAFORM_VERSION"
            "TF_STATE_BUCKET"
            "DB_PASSWORD"
          )

          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME}" ]]; then
              echo "Missing required GitHub variable or secret: ${VAR_NAME}"
              exit 1
            fi
          done

          if [[ ! -f "${{ needs.set-environment.outputs.tfvars_file }}" ]]; then
            echo "Missing tfvars file: ${{ needs.set-environment.outputs.tfvars_file }}"
            exit 1
          fi

          echo "Required variables and tfvars file are present."

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions

      - name: Confirm AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${PROJECT_NAME}/${{ needs.set-environment.outputs.environment }}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var-file="environments/${{ needs.set-environment.outputs.environment }}.tfvars" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${{ needs.set-environment.outputs.image_tag }}" \
            -out=tfplan

  terraform-deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs:
      - set-environment
      - terraform-validate-plan
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.terraform-validate-plan.result == 'success' &&
      (
        needs.set-environment.outputs.terraform_action == 'apply' ||
        needs.set-environment.outputs.terraform_action == 'destroy'
      )
    environment: ${{ needs.set-environment.outputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${PROJECT_NAME}/${{ needs.set-environment.outputs.environment }}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Apply Full Stack
        if: needs.set-environment.outputs.terraform_action == 'apply'
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var-file="environments/${{ needs.set-environment.outputs.environment }}.tfvars" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${{ needs.set-environment.outputs.image_tag }}"

      - name: Terraform Destroy
        if: needs.set-environment.outputs.terraform_action == 'destroy'
        working-directory: terraform
        run: |
          terraform destroy -auto-approve \
            -var-file="environments/${{ needs.set-environment.outputs.environment }}.tfvars" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${{ needs.set-environment.outputs.image_tag }}"

      - name: Terraform Outputs
        if: needs.set-environment.outputs.terraform_action == 'apply'
        working-directory: terraform
        run: terraform output
