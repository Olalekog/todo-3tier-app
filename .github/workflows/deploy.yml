name: Deploy Infrastructure

on:
  workflow_call:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: string
      action:
        description: Terraform action
        required: true
        type: string
      image_tag:
        description: Docker image tag to deploy
        required: false
        type: string
        default: latest
    secrets:
      DB_PASSWORD:
        required: true

  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
      action:
        description: Terraform action
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: latest

  pull_request:
    branches:
      - uat
      - prod
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
  APP_DIR: .

jobs:
  validate-promotion:
    name: Validate Promotion Path
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate branch promotion path
        shell: bash
        run: |
          set -euo pipefail
          BASE_BRANCH="${{ github.base_ref }}"
          HEAD_BRANCH="${{ github.head_ref }}"

          echo "Base branch: ${BASE_BRANCH}"
          echo "Head branch: ${HEAD_BRANCH}"

          if [[ "${BASE_BRANCH}" == "uat" && "${HEAD_BRANCH}" != "dev" ]]; then
            echo "Invalid promotion. UAT can only be promoted from dev."
            exit 1
          fi

          if [[ "${BASE_BRANCH}" == "prod" && "${HEAD_BRANCH}" != "uat" ]]; then
            echo "Invalid promotion. Prod can only be promoted from uat."
            exit 1
          fi

          echo "Promotion path is valid."

  resolve:
    name: Resolve Deployment Inputs
    runs-on: ubuntu-latest
    needs:
      - validate-promotion
    if: always() && (github.event_name != 'pull_request' || needs.validate-promotion.result == 'success')
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      action: ${{ steps.resolve.outputs.action }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      tfvars_file: ${{ steps.resolve.outputs.tfvars_file }}
      state_key: ${{ steps.resolve.outputs.state_key }}
      aws_account_id: ${{ steps.resolve.outputs.aws_account_id }}
    steps:
      - name: Resolve inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          # Reusable workflow calls inherit the caller event, such as "push".
          # Therefore, always honor provided inputs first.
          INPUT_ENVIRONMENT="${{ inputs.environment || '' }}"
          INPUT_ACTION="${{ inputs.action || '' }}"
          INPUT_IMAGE_TAG="${{ inputs.image_tag || '' }}"

          if [[ -n "${INPUT_ENVIRONMENT}" ]]; then
            ENVIRONMENT="${INPUT_ENVIRONMENT}"
            ACTION="${INPUT_ACTION:-apply}"
            IMAGE_TAG="${INPUT_IMAGE_TAG:-latest}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            ACTION="${{ github.event.inputs.action }}"
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ENVIRONMENT="${{ github.base_ref }}"
            ACTION="plan"
            IMAGE_TAG="latest"
          else
            echo "Unsupported event without reusable workflow inputs: ${{ github.event_name }}"
            exit 1
          fi

          case "${ENVIRONMENT}" in
            dev|uat|prod) ;;
            *) echo "Invalid environment: ${ENVIRONMENT}"; exit 1 ;;
          esac

          case "${ACTION}" in
            plan|apply|destroy) ;;
            *) echo "Invalid action: ${ACTION}"; exit 1 ;;
          esac

          if [[ -z "${IMAGE_TAG}" ]]; then
            IMAGE_TAG="latest"
          fi

          REQUIRED_VARS=(
            "PROJECT_NAME"
            "AWS_REGION"
            "BOOTSTRAP_ROLE_ARN"
            "TF_STATE_BUCKET"
            "TERRAFORM_VERSION"
          )

          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME}" ]]; then
              echo "Missing required GitHub variable: ${VAR_NAME}"
              exit 1
            fi
          done

          RESOLVED_AWS_ACCOUNT_ID="${AWS_ACCOUNT_ID}"
          if [[ -z "${RESOLVED_AWS_ACCOUNT_ID}" ]]; then
            RESOLVED_AWS_ACCOUNT_ID="$(echo "${BOOTSTRAP_ROLE_ARN}" | awk -F: '{print $5}')"
          fi

          TFVARS_FILE="environments/${ENVIRONMENT}.tfvars"
          STATE_KEY="${PROJECT_NAME}/${ENVIRONMENT}/terraform.tfstate"

          echo "environment=${ENVIRONMENT}" >> "${GITHUB_OUTPUT}"
          echo "action=${ACTION}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "tfvars_file=${TFVARS_FILE}" >> "${GITHUB_OUTPUT}"
          echo "state_key=${STATE_KEY}" >> "${GITHUB_OUTPUT}"
          echo "aws_account_id=${RESOLVED_AWS_ACCOUNT_ID}" >> "${GITHUB_OUTPUT}"

          echo "Environment: ${ENVIRONMENT}"
          echo "Action: ${ACTION}"
          echo "Image tag: ${IMAGE_TAG}"
          echo "State key: ${STATE_KEY}"

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs:
      - resolve
    env:
      ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
      ACTION: ${{ needs.resolve.outputs.action }}
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
      TFVARS_FILE: ${{ needs.resolve.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Terraform files
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d "terraform" ]]; then
            echo "Missing terraform directory at repo root."
            exit 1
          fi
          if [[ ! -f "terraform/${TFVARS_FILE}" ]]; then
            echo "Missing tfvars file: terraform/${TFVARS_FILE}"
            find terraform -maxdepth 3 -type f | sort
            exit 1
          fi
          if [[ -z "${DB_PASSWORD}" ]]; then
            echo "Missing required secret: DB_PASSWORD"
            exit 1
          fi

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformPlan

      - name: Confirm AWS identity
        shell: bash
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform fmt
        working-directory: terraform
        shell: bash
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform
        shell: bash
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        working-directory: terraform
        shell: bash
        run: terraform validate

      - name: Terraform Plan
        if: env.ACTION != 'destroy'
        working-directory: terraform
        shell: bash
        run: |
          terraform plan \
            -var-file="${TFVARS_FILE}" \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${IMAGE_TAG}" \
            -out=tfplan

      - name: Terraform Destroy Plan
        if: env.ACTION == 'destroy'
        working-directory: terraform
        shell: bash
        run: |
          terraform plan -destroy \
            -var-file="${TFVARS_FILE}" \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${IMAGE_TAG}" \
            -out=tfplan

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ env.ENVIRONMENT }}
          path: terraform/tfplan
          retention-days: 1

  terraform-apply-nonprod:
    name: Terraform Apply Non-Prod
    runs-on: ubuntu-latest
    needs:
      - resolve
      - terraform-plan
    if: needs.terraform-plan.result == 'success' && needs.resolve.outputs.action != 'plan' && needs.resolve.outputs.environment != 'prod'
    env:
      ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
      ACTION: ${{ needs.resolve.outputs.action }}
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
      TFVARS_FILE: ${{ needs.resolve.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformApplyNonProd

      - name: Confirm AWS identity
        shell: bash
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        shell: bash
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ env.ENVIRONMENT }}
          path: terraform

      - name: Terraform Apply
        if: env.ACTION == 'apply'
        working-directory: terraform
        shell: bash
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: env.ACTION == 'destroy'
        working-directory: terraform
        shell: bash
        run: terraform apply -auto-approve tfplan

  terraform-apply-prod:
    name: Terraform Apply Prod
    runs-on: ubuntu-latest
    needs:
      - resolve
      - terraform-plan
    if: needs.terraform-plan.result == 'success' && needs.resolve.outputs.action != 'plan' && needs.resolve.outputs.environment == 'prod'
    environment: prod
    env:
      ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
      ACTION: ${{ needs.resolve.outputs.action }}
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
      TFVARS_FILE: ${{ needs.resolve.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformApplyProd

      - name: Confirm AWS identity
        shell: bash
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        shell: bash
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ env.ENVIRONMENT }}
          path: terraform

      - name: Terraform Apply
        if: env.ACTION == 'apply'
        working-directory: terraform
        shell: bash
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: env.ACTION == 'destroy'
        working-directory: terraform
        shell: bash
        run: terraform apply -auto-approve tfplan
