name: Terraform Deploy

on:
  push:
    branches:
      - dev
      - uat
      - prod
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yml"

  pull_request:
    branches:
      - uat
      - prod
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
        default: dev
      action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan
      image_tag:
        description: "Docker image tag to deploy. Use latest or a Git SHA."
        required: false
        type: string
        default: latest

permissions:
  id-token: write
  contents: read
  pull-requests: read

env:
  APP_DIR: .
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

jobs:
  set-environment:
    name: Set Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set.outputs.environment }}
      terraform_action: ${{ steps.set.outputs.terraform_action }}
      image_tag: ${{ steps.set.outputs.image_tag }}
      tfvars_file: ${{ steps.set.outputs.tfvars_file }}
      aws_account_id: ${{ steps.set.outputs.aws_account_id }}
    steps:
      - name: Resolve environment and action
        id: set
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            TERRAFORM_ACTION="${{ github.event.inputs.action }}"
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TARGET_BRANCH="${{ github.base_ref }}"
            case "${TARGET_BRANCH}" in
              uat) ENVIRONMENT="uat" ;;
              prod) ENVIRONMENT="prod" ;;
              *) echo "Unsupported PR target branch: ${TARGET_BRANCH}"; exit 1 ;;
            esac
            TERRAFORM_ACTION="plan"
            IMAGE_TAG="latest"
          else
            BRANCH="${GITHUB_REF_NAME}"
            case "${BRANCH}" in
              dev) ENVIRONMENT="dev" ;;
              uat) ENVIRONMENT="uat" ;;
              prod) ENVIRONMENT="prod" ;;
              *) echo "Unsupported branch: ${BRANCH}"; exit 1 ;;
            esac
            TERRAFORM_ACTION="apply"
            IMAGE_TAG="latest"
          fi

          if [[ -z "${IMAGE_TAG}" ]]; then
            IMAGE_TAG="latest"
          fi

          if [[ -z "${AWS_ACCOUNT_ID}" ]]; then
            AWS_ACCOUNT_ID="$(echo "${BOOTSTRAP_ROLE_ARN}" | cut -d: -f5)"
          fi

          if [[ -z "${AWS_ACCOUNT_ID}" || ! "${AWS_ACCOUNT_ID}" =~ ^[0-9]{12}$ ]]; then
            echo "Unable to resolve AWS_ACCOUNT_ID. Set the GitHub variable AWS_ACCOUNT_ID or use a valid BOOTSTRAP_ROLE_ARN."
            exit 1
          fi

          TFVARS_FILE="${APP_DIR}/terraform/environments/${ENVIRONMENT}.tfvars"

          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "terraform_action=${TERRAFORM_ACTION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "tfvars_file=${TFVARS_FILE}" >> "$GITHUB_OUTPUT"
          echo "aws_account_id=${AWS_ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

          echo "Environment: ${ENVIRONMENT}"
          echo "Terraform action: ${TERRAFORM_ACTION}"
          echo "Image tag: ${IMAGE_TAG}"
          echo "AWS account ID: ${AWS_ACCOUNT_ID}"
          echo "tfvars file: ${TFVARS_FILE}"

  validate-promotion-path:
    name: Validate Promotion Path
    runs-on: ubuntu-latest
    needs:
      - set-environment
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate source and target branch
        shell: bash
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          TARGET_BRANCH="${{ github.base_ref }}"

          echo "Source branch: ${SOURCE_BRANCH}"
          echo "Target branch: ${TARGET_BRANCH}"

          if [[ "${TARGET_BRANCH}" == "uat" && "${SOURCE_BRANCH}" == "dev" ]]; then
            echo "Valid promotion path: dev -> uat"
            exit 0
          fi

          if [[ "${TARGET_BRANCH}" == "prod" && "${SOURCE_BRANCH}" == "uat" ]]; then
            echo "Valid promotion path: uat -> prod"
            exit 0
          fi

          echo "Invalid promotion path. Allowed paths are dev -> uat and uat -> prod."
          exit 1

  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    needs:
      - set-environment
      - validate-promotion-path
    if: |
      always() &&
      (
        github.event_name != 'pull_request' ||
        needs.validate-promotion-path.result == 'success'
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required variables and files
        shell: bash
        run: |
          REQUIRED_VARS=(
            "AWS_REGION"
            "PROJECT_NAME"
            "BOOTSTRAP_ROLE_ARN"
            "TF_STATE_BUCKET"
            "TERRAFORM_VERSION"
          )

          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME}" ]]; then
              echo "Missing required GitHub variable: ${VAR_NAME}"
              exit 1
            fi
          done

          if [[ -z "${DB_PASSWORD}" && "${{ needs.set-environment.outputs.terraform_action }}" != "destroy" ]]; then
            echo "Missing required GitHub secret: DB_PASSWORD"
            exit 1
          fi

          TFVARS_FILE="${{ needs.set-environment.outputs.tfvars_file }}"
          if [[ ! -f "${TFVARS_FILE}" ]]; then
            echo "Missing tfvars file: ${TFVARS_FILE}"
            echo "Current directory:"
            pwd
            echo "Available Terraform files:"
            find . -maxdepth 5 -type f | sort
            exit 1
          fi

          echo "Using tfvars file: ${TFVARS_FILE}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        working-directory: ${{ env.APP_DIR }}/terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.APP_DIR }}/terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${PROJECT_NAME}/${{ needs.set-environment.outputs.environment }}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        working-directory: ${{ env.APP_DIR }}/terraform
        run: terraform validate

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs:
      - set-environment
      - validate
    if: needs.validate.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions

      - name: Confirm AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.APP_DIR }}/terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${PROJECT_NAME}/${{ needs.set-environment.outputs.environment }}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        working-directory: ${{ env.APP_DIR }}/terraform
        run: |
          terraform plan \
            -var-file="environments/${{ needs.set-environment.outputs.environment }}.tfvars" \
            -var="aws_region=${AWS_REGION}" \
            -var="aws_account_id=${{ needs.set-environment.outputs.aws_account_id }}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${{ needs.set-environment.outputs.image_tag }}" \
            -out=tfplan

  apply-nonprod:
    name: Terraform Apply Non-Prod
    runs-on: ubuntu-latest
    needs:
      - set-environment
      - plan
    if: |
      needs.plan.result == 'success' &&
      needs.set-environment.outputs.terraform_action == 'apply' &&
      needs.set-environment.outputs.environment != 'prod'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.APP_DIR }}/terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${PROJECT_NAME}/${{ needs.set-environment.outputs.environment }}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Apply
        working-directory: ${{ env.APP_DIR }}/terraform
        run: |
          terraform apply -auto-approve \
            -var-file="environments/${{ needs.set-environment.outputs.environment }}.tfvars" \
            -var="aws_region=${AWS_REGION}" \
            -var="aws_account_id=${{ needs.set-environment.outputs.aws_account_id }}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${{ needs.set-environment.outputs.image_tag }}"

      - name: Terraform Outputs
        working-directory: ${{ env.APP_DIR }}/terraform
        run: terraform output

  apply-prod:
    name: Terraform Apply Prod
    runs-on: ubuntu-latest
    needs:
      - set-environment
      - plan
    if: |
      needs.plan.result == 'success' &&
      needs.set-environment.outputs.terraform_action == 'apply' &&
      needs.set-environment.outputs.environment == 'prod'
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.APP_DIR }}/terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${PROJECT_NAME}/${{ needs.set-environment.outputs.environment }}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Apply
        working-directory: ${{ env.APP_DIR }}/terraform
        run: |
          terraform apply -auto-approve \
            -var-file="environments/${{ needs.set-environment.outputs.environment }}.tfvars" \
            -var="aws_region=${AWS_REGION}" \
            -var="aws_account_id=${{ needs.set-environment.outputs.aws_account_id }}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${{ needs.set-environment.outputs.image_tag }}"

      - name: Terraform Outputs
        working-directory: ${{ env.APP_DIR }}/terraform
        run: terraform output

  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs:
      - set-environment
      - validate
    if: |
      needs.validate.result == 'success' &&
      github.event_name == 'workflow_dispatch' &&
      needs.set-environment.outputs.terraform_action == 'destroy'
    environment: ${{ needs.set-environment.outputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.APP_DIR }}/terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${PROJECT_NAME}/${{ needs.set-environment.outputs.environment }}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy
        working-directory: ${{ env.APP_DIR }}/terraform
        run: |
          terraform destroy -auto-approve \
            -var-file="environments/${{ needs.set-environment.outputs.environment }}.tfvars" \
            -var="aws_region=${AWS_REGION}" \
            -var="aws_account_id=${{ needs.set-environment.outputs.aws_account_id }}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${{ needs.set-environment.outputs.image_tag }}"
