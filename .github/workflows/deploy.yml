name: Deploy Infrastructure

on:
  push:
    branches:
      - dev
      - uat
      - prod
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yml"

  pull_request:
    branches:
      - uat
      - prod
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: apply
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
        default: dev
      image_tag:
        description: "Docker image tag to deploy"
        required: false
        default: latest

permissions:
  id-token: write
  contents: read
  pull-requests: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
  APP_DIR: .

jobs:
  set-environment:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      terraform_action: ${{ steps.resolve.outputs.terraform_action }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      tfvars_file: ${{ steps.resolve.outputs.tfvars_file }}
      state_key: ${{ steps.resolve.outputs.state_key }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve environment and action
        id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            TERRAFORM_ACTION="${{ github.event.inputs.action }}"
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ENVIRONMENT="${{ github.base_ref }}"
            TERRAFORM_ACTION="plan"
            IMAGE_TAG="latest"
          else
            ENVIRONMENT="${GITHUB_REF_NAME}"
            TERRAFORM_ACTION="apply"
            IMAGE_TAG="latest"
          fi

          if [[ -z "${IMAGE_TAG}" ]]; then
            IMAGE_TAG="latest"
          fi

          case "${ENVIRONMENT}" in
            dev|uat|prod)
              ;;
            *)
              echo "Unsupported environment: ${ENVIRONMENT}"
              exit 1
              ;;
          esac

          TFVARS_FILE="terraform/environments/${ENVIRONMENT}.tfvars"
          STATE_KEY="${PROJECT_NAME}/${ENVIRONMENT}/terraform.tfstate"

          if [[ ! -f "${TFVARS_FILE}" ]]; then
            echo "Missing tfvars file: ${TFVARS_FILE}"
            echo "Current directory:"
            pwd
            echo "Available Terraform files:"
            find ./terraform -maxdepth 5 -type f | sort || true
            exit 1
          fi

          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "terraform_action=${TERRAFORM_ACTION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "tfvars_file=environments/${ENVIRONMENT}.tfvars" >> "$GITHUB_OUTPUT"
          echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"

          echo "Environment: ${ENVIRONMENT}"
          echo "Terraform action: ${TERRAFORM_ACTION}"
          echo "Image tag: ${IMAGE_TAG}"
          echo "TFVars: ${TFVARS_FILE}"
          echo "State key: ${STATE_KEY}"

  validate-promotion-path:
    name: Validate Promotion Path
    runs-on: ubuntu-latest
    needs:
      - set-environment
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate source and target branch
        shell: bash
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          TARGET_BRANCH="${{ github.base_ref }}"

          echo "Source branch: ${SOURCE_BRANCH}"
          echo "Target branch: ${TARGET_BRANCH}"

          if [[ "${TARGET_BRANCH}" == "uat" && "${SOURCE_BRANCH}" == "dev" ]]; then
            echo "Valid promotion path: dev -> uat"
            exit 0
          fi

          if [[ "${TARGET_BRANCH}" == "prod" && "${SOURCE_BRANCH}" == "uat" ]]; then
            echo "Valid promotion path: uat -> prod"
            exit 0
          fi

          echo "Invalid promotion path."
          echo "Allowed promotion paths are:"
          echo "  dev -> uat"
          echo "  uat -> prod"
          exit 1

  terraform-check:
    name: Terraform Validate and Plan
    runs-on: ubuntu-latest
    needs:
      - set-environment
      - validate-promotion-path
    if: |
      always() &&
      (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        needs.validate-promotion-path.result == 'success'
      )
    env:
      ENVIRONMENT: ${{ needs.set-environment.outputs.environment }}
      TFVARS_FILE: ${{ needs.set-environment.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.set-environment.outputs.state_key }}
      IMAGE_TAG: ${{ needs.set-environment.outputs.image_tag }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required GitHub variables
        shell: bash
        working-directory: .
        run: |
          if [[ -z "${AWS_ACCOUNT_ID}" && -n "${BOOTSTRAP_ROLE_ARN}" ]]; then
            AWS_ACCOUNT_ID="$(echo "${BOOTSTRAP_ROLE_ARN}" | awk -F: '{print $5}')"
            echo "AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID}" >> "$GITHUB_ENV"
          fi

          REQUIRED_VARS=(
            "AWS_REGION"
            "PROJECT_NAME"
            "BOOTSTRAP_ROLE_ARN"
            "TF_STATE_BUCKET"
            "TERRAFORM_VERSION"
          )

          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME}" ]]; then
              echo "Missing required GitHub variable: ${VAR_NAME}"
              exit 1
            fi
          done

          if [[ -z "${DB_PASSWORD}" ]]; then
            echo "Missing required GitHub secret: DB_PASSWORD"
            exit 1
          fi

          echo "Required GitHub variables and secrets are set."
          echo "Resolved AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID}"

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions

      - name: Confirm AWS identity
        shell: bash
        working-directory: .
        run: |
          aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="${TFVARS_FILE}" \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${IMAGE_TAG}" \
            -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ needs.set-environment.outputs.environment }}
          path: terraform/tfplan
          if-no-files-found: error

  terraform-apply-nonprod:
    name: Terraform Apply Non-Prod
    runs-on: ubuntu-latest
    needs:
      - set-environment
      - terraform-check
    if: |
      needs.terraform-check.result == 'success' &&
      needs.set-environment.outputs.terraform_action == 'apply' &&
      needs.set-environment.outputs.environment != 'prod'
    env:
      ENVIRONMENT: ${{ needs.set-environment.outputs.environment }}
      STATE_KEY: ${{ needs.set-environment.outputs.state_key }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve AWS account ID
        shell: bash
        working-directory: .
        run: |
          if [[ -z "${AWS_ACCOUNT_ID}" && -n "${BOOTSTRAP_ROLE_ARN}" ]]; then
            AWS_ACCOUNT_ID="$(echo "${BOOTSTRAP_ROLE_ARN}" | awk -F: '{print $5}')"
            echo "AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID}" >> "$GITHUB_ENV"
          fi

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions

      - name: Confirm AWS identity
        shell: bash
        working-directory: .
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.set-environment.outputs.environment }}
          path: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Terraform Outputs
        run: terraform output

  terraform-apply-prod:
    name: Terraform Apply Prod
    runs-on: ubuntu-latest
    needs:
      - set-environment
      - terraform-check
    if: |
      needs.terraform-check.result == 'success' &&
      needs.set-environment.outputs.terraform_action == 'apply' &&
      needs.set-environment.outputs.environment == 'prod'
    environment: prod
    env:
      ENVIRONMENT: ${{ needs.set-environment.outputs.environment }}
      STATE_KEY: ${{ needs.set-environment.outputs.state_key }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve AWS account ID
        shell: bash
        working-directory: .
        run: |
          if [[ -z "${AWS_ACCOUNT_ID}" && -n "${BOOTSTRAP_ROLE_ARN}" ]]; then
            AWS_ACCOUNT_ID="$(echo "${BOOTSTRAP_ROLE_ARN}" | awk -F: '{print $5}')"
            echo "AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID}" >> "$GITHUB_ENV"
          fi

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions

      - name: Confirm AWS identity
        shell: bash
        working-directory: .
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.set-environment.outputs.environment }}
          path: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Terraform Outputs
        run: terraform output

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs:
      - set-environment
    if: github.event_name == 'workflow_dispatch' && needs.set-environment.outputs.terraform_action == 'destroy'
    environment: ${{ needs.set-environment.outputs.environment }}
    env:
      ENVIRONMENT: ${{ needs.set-environment.outputs.environment }}
      TFVARS_FILE: ${{ needs.set-environment.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.set-environment.outputs.state_key }}
      IMAGE_TAG: ${{ needs.set-environment.outputs.image_tag }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve AWS account ID
        shell: bash
        working-directory: .
        run: |
          if [[ -z "${AWS_ACCOUNT_ID}" && -n "${BOOTSTRAP_ROLE_ARN}" ]]; then
            AWS_ACCOUNT_ID="$(echo "${BOOTSTRAP_ROLE_ARN}" | awk -F: '{print $5}')"
            echo "AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID}" >> "$GITHUB_ENV"
          fi

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions

      - name: Confirm AWS identity
        shell: bash
        working-directory: .
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve \
            -var-file="${TFVARS_FILE}" \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${IMAGE_TAG}"
