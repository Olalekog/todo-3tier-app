name: Deploy Infrastructure

on:
  workflow_call:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: string
      action:
        description: Terraform action
        required: false
        type: string
        default: apply
      image_tag:
        description: Docker image tag to deploy
        required: false
        type: string
        default: latest
      allow_replacement:
        description: Allow intentional destroy or replacement actions
        required: false
        type: string
        default: "false"

  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy or destroy
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
        default: dev
      action:
        description: Terraform action
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: apply
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: latest
      allow_replacement:
        description: Set to true only when intentionally destroying or replacing resources
        required: false
        type: choice
        options:
          - "false"
          - "true"
        default: "true"

  pull_request:
    branches:
      - uat
      - prod
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yml"

  push:
    branches:
      - dev
      - uat
      - prod
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
  APP_DIR: .

jobs:
  build:
    name: Build / Resolve Inputs
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      action: ${{ steps.resolve.outputs.action }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      tfvars_file: ${{ steps.resolve.outputs.tfvars_file }}
      state_key: ${{ steps.resolve.outputs.state_key }}
      aws_account_id: ${{ steps.resolve.outputs.aws_account_id }}
      allow_replacement: ${{ steps.resolve.outputs.allow_replacement }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve deployment inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          INPUT_ENVIRONMENT="${{ inputs.environment || '' }}"
          INPUT_ACTION="${{ inputs.action || '' }}"
          INPUT_IMAGE_TAG="${{ inputs.image_tag || '' }}"
          INPUT_ALLOW_REPLACEMENT="${{ inputs.allow_replacement || 'false' }}"

          if [[ -n "${INPUT_ENVIRONMENT}" ]]; then
            ENVIRONMENT="${INPUT_ENVIRONMENT}"
            ACTION="${INPUT_ACTION:-apply}"
            IMAGE_TAG="${INPUT_IMAGE_TAG:-latest}"
            ALLOW_REPLACEMENT="${INPUT_ALLOW_REPLACEMENT:-false}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            ACTION="${{ github.event.inputs.action }}"
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
            ALLOW_REPLACEMENT="${{ github.event.inputs.allow_replacement }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TARGET_BRANCH="${{ github.base_ref }}"
            SOURCE_BRANCH="${{ github.head_ref }}"

            if [[ "${TARGET_BRANCH}" == "uat" && "${SOURCE_BRANCH}" != "dev" ]]; then
              echo "Only dev can be promoted to uat. Current source branch: ${SOURCE_BRANCH}"
              exit 1
            fi

            if [[ "${TARGET_BRANCH}" == "prod" && "${SOURCE_BRANCH}" != "uat" ]]; then
              echo "Only uat can be promoted to prod. Current source branch: ${SOURCE_BRANCH}"
              exit 1
            fi

            ENVIRONMENT="${TARGET_BRANCH}"
            ACTION="plan"
            IMAGE_TAG="latest"
            ALLOW_REPLACEMENT="false"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BRANCH="${GITHUB_REF_NAME}"
            case "${BRANCH}" in
              dev|uat|prod)
                ENVIRONMENT="${BRANCH}"
                ACTION="apply"
                IMAGE_TAG="latest"
                ALLOW_REPLACEMENT="false"
                ;;
              *)
                echo "Unsupported branch: ${BRANCH}"
                exit 1
                ;;
            esac
          else
            echo "Unsupported event: ${{ github.event_name }}"
            exit 1
          fi

          case "${ENVIRONMENT}" in
            dev|uat|prod) ;;
            *) echo "Invalid environment: ${ENVIRONMENT}"; exit 1 ;;
          esac

          case "${ACTION}" in
            plan|apply|destroy) ;;
            *) echo "Invalid action: ${ACTION}"; exit 1 ;;
          esac

          case "${ALLOW_REPLACEMENT}" in
            true|false) ;;
            *) echo "Invalid allow_replacement value: ${ALLOW_REPLACEMENT}. Use true or false."; exit 1 ;;
          esac

          if [[ "${ACTION}" == "destroy" && "${ALLOW_REPLACEMENT}" != "false" ]]; then
            echo "Destroy is blocked unless allow_replacement=false."
            exit 1
          fi

          if [[ -z "${PROJECT_NAME}" ]]; then
            echo "Missing required GitHub variable: PROJECT_NAME"
            exit 1
          fi

          if [[ -z "${AWS_REGION}" ]]; then
            echo "Missing required GitHub variable: AWS_REGION"
            exit 1
          fi

          if [[ -z "${BOOTSTRAP_ROLE_ARN}" ]]; then
            echo "Missing required GitHub variable: BOOTSTRAP_ROLE_ARN"
            exit 1
          fi

          if [[ -z "${TF_STATE_BUCKET}" ]]; then
            echo "Missing required GitHub variable: TF_STATE_BUCKET"
            exit 1
          fi

          RESOLVED_AWS_ACCOUNT_ID="${AWS_ACCOUNT_ID}"
          if [[ -z "${RESOLVED_AWS_ACCOUNT_ID}" ]]; then
            RESOLVED_AWS_ACCOUNT_ID="$(echo "${BOOTSTRAP_ROLE_ARN}" | awk -F: '{print $5}')"
          fi

          TFVARS_FILE="environments/${ENVIRONMENT}.tfvars"
          STATE_KEY="${PROJECT_NAME}/${ENVIRONMENT}/terraform.tfstate"

          if [[ ! -f "terraform/${TFVARS_FILE}" ]]; then
            echo "Missing Terraform tfvars file: terraform/${TFVARS_FILE}"
            find terraform -maxdepth 3 -type f | sort
            exit 1
          fi

          echo "environment=${ENVIRONMENT}" >> "${GITHUB_OUTPUT}"
          echo "action=${ACTION}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${IMAGE_TAG:-latest}" >> "${GITHUB_OUTPUT}"
          echo "tfvars_file=${TFVARS_FILE}" >> "${GITHUB_OUTPUT}"
          echo "state_key=${STATE_KEY}" >> "${GITHUB_OUTPUT}"
          echo "aws_account_id=${RESOLVED_AWS_ACCOUNT_ID}" >> "${GITHUB_OUTPUT}"
          echo "allow_replacement=${ALLOW_REPLACEMENT}" >> "${GITHUB_OUTPUT}"

          echo "Resolved deployment: environment=${ENVIRONMENT}, action=${ACTION}, image_tag=${IMAGE_TAG:-latest}, allow_replacement=${ALLOW_REPLACEMENT}"

  test:
    name: Test / Terraform Validate and Plan
    needs: build
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.inspect.outputs.has_changes }}
      has_destructive_changes: ${{ steps.inspect.outputs.has_destructive_changes }}
    env:
      ENVIRONMENT: ${{ needs.build.outputs.environment }}
      ACTION: ${{ needs.build.outputs.action }}
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      TFVARS_FILE: ${{ needs.build.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.build.outputs.state_key }}
      AWS_ACCOUNT_ID: ${{ needs.build.outputs.aws_account_id }}
      ALLOW_REPLACEMENT: ${{ needs.build.outputs.allow_replacement }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformPlan

      - name: Confirm AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -recursive -check

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Import existing ECR repositories if needed
        if: env.ACTION != 'destroy'
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          FRONTEND_REPO="${PROJECT_NAME}/${ENVIRONMENT}/todo-frontend"
          BACKEND_REPO="${PROJECT_NAME}/${ENVIRONMENT}/todo-backend"

          if aws ecr describe-repositories --repository-names "${FRONTEND_REPO}" >/dev/null 2>&1; then
            if ! terraform state show module.ecr.aws_ecr_repository.frontend >/dev/null 2>&1; then
              echo "Importing existing frontend ECR repo: ${FRONTEND_REPO}"
              terraform import \
                -var-file="${TFVARS_FILE}" \
                -var="aws_region=${AWS_REGION}" \
                -var="project_name=${PROJECT_NAME}" \
                -var="db_password=${DB_PASSWORD}" \
                -var="image_tag=${IMAGE_TAG}" \
                module.ecr.aws_ecr_repository.frontend \
                "${FRONTEND_REPO}"
            else
              echo "Frontend ECR repo already in Terraform state."
            fi
          else
            echo "Frontend ECR repo does not exist. Terraform can create it."
          fi

          if aws ecr describe-repositories --repository-names "${BACKEND_REPO}" >/dev/null 2>&1; then
            if ! terraform state show module.ecr.aws_ecr_repository.backend >/dev/null 2>&1; then
              echo "Importing existing backend ECR repo: ${BACKEND_REPO}"
              terraform import \
                -var-file="${TFVARS_FILE}" \
                -var="aws_region=${AWS_REGION}" \
                -var="project_name=${PROJECT_NAME}" \
                -var="db_password=${DB_PASSWORD}" \
                -var="image_tag=${IMAGE_TAG}" \
                module.ecr.aws_ecr_repository.backend \
                "${BACKEND_REPO}"
            else
              echo "Backend ECR repo already in Terraform state."
            fi
          else
            echo "Backend ECR repo does not exist. Terraform can create it."
          fi

      - name: Terraform Plan
        if: env.ACTION != 'destroy'
        working-directory: terraform
        run: |
          terraform plan \
            -var-file="${TFVARS_FILE}" \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${IMAGE_TAG}" \
            -out=tfplan

      - name: Terraform Destroy Plan
        if: env.ACTION == 'destroy'
        working-directory: terraform
        run: |
          terraform plan -destroy \
            -var-file="${TFVARS_FILE}" \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${IMAGE_TAG}" \
            -out=tfplan

      - name: Inspect Terraform Plan
        id: inspect
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          terraform show -json tfplan > tfplan.json

          CHANGE_COUNT="$(jq '[.resource_changes[]? | select(.change.actions != ["no-op"])] | length' tfplan.json)"
          DESTRUCTIVE_COUNT="$(jq '[.resource_changes[]? | select((.change.actions | index("delete")) or (.change.actions == ["delete", "create"]) or (.change.actions == ["create", "delete"]))] | length' tfplan.json)"

          echo "Terraform change count: ${CHANGE_COUNT}"
          echo "Terraform destructive/replacement count: ${DESTRUCTIVE_COUNT}"

          if [[ "${CHANGE_COUNT}" -gt 0 ]]; then
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
          fi

          if [[ "${DESTRUCTIVE_COUNT}" -gt 0 ]]; then
            echo "has_destructive_changes=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_destructive_changes=false" >> "${GITHUB_OUTPUT}"
          fi

          if [[ "${ACTION}" == "apply" && "${DESTRUCTIVE_COUNT}" -gt 0 && "${ALLOW_REPLACEMENT}" != "false" ]]; then
            echo "Blocking apply to avoid destroying or recreating application infrastructure."
            echo "To allow intentional replacement, run workflow_dispatch with allow_replacement=true."
            exit 1
          fi

          if [[ "${ACTION}" == "destroy" && "${ALLOW_REPLACEMENT}" != "false" ]]; then
            echo "Blocking destroy because allow_replacement is not false."
            exit 1
          fi

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ env.ENVIRONMENT }}
          path: |
            terraform/tfplan
            terraform/tfplan.json
          retention-days: 5

  deploy-nonprod:
    name: Deploy / Apply Non-Prod
    needs:
      - build
      - test
    if: >-
      always() &&
      needs.build.result == 'success' &&
      needs.test.result == 'success' &&
      needs.build.outputs.environment != 'prod' &&
      needs.build.outputs.action != 'plan' &&
      needs.test.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ needs.build.outputs.environment }}
      ACTION: ${{ needs.build.outputs.action }}
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      TFVARS_FILE: ${{ needs.build.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.build.outputs.state_key }}
      AWS_ACCOUNT_ID: ${{ needs.build.outputs.aws_account_id }}
      ALLOW_REPLACEMENT: ${{ needs.build.outputs.allow_replacement }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformApplyNonProd

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ env.ENVIRONMENT }}
          path: terraform

      - name: Terraform Apply
        if: env.ACTION == 'apply'
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: env.ACTION == 'destroy' && env.ALLOW_REPLACEMENT == 'false'
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

  deploy-prod:
    name: Deploy / Apply Prod
    needs:
      - build
      - test
    if: >-
      always() &&
      needs.build.result == 'success' &&
      needs.test.result == 'success' &&
      needs.build.outputs.environment == 'prod' &&
      needs.build.outputs.action != 'plan' &&
      needs.test.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: prod
    env:
      ENVIRONMENT: ${{ needs.build.outputs.environment }}
      ACTION: ${{ needs.build.outputs.action }}
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      TFVARS_FILE: ${{ needs.build.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.build.outputs.state_key }}
      AWS_ACCOUNT_ID: ${{ needs.build.outputs.aws_account_id }}
      ALLOW_REPLACEMENT: ${{ needs.build.outputs.allow_replacement }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformApplyProd

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ env.ENVIRONMENT }}
          path: terraform

      - name: Terraform Apply
        if: env.ACTION == 'apply'
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: env.ACTION == 'destroy' && env.ALLOW_REPLACEMENT == 'false'
        working-directory: terraform
        run: terraform apply -auto-approve tfplan
