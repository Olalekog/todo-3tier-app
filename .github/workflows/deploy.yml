name: Deploy Infrastructure

on:
  workflow_call:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: string
      action:
        description: Terraform action
        required: true
        type: string
      workload:
        description: Workload scope
        required: false
        type: string
        default: infra
      frontend_image_tag:
        description: Frontend image tag
        required: false
        type: string
        default: latest
      backend_image_tag:
        description: Backend image tag
        required: false
        type: string
        default: latest
    secrets:
      DB_PASSWORD:
        required: true

  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
        default: dev
      action:
        description: Terraform action
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan
      workload:
        description: Workload scope
        required: true
        type: choice
        options:
          - infra
          - frontend
          - backend
          - app
        default: infra
      frontend_image_tag:
        description: Frontend image tag
        required: false
        type: string
        default: latest
      backend_image_tag:
        description: Backend image tag
        required: false
        type: string
        default: latest

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ github.event_name == 'workflow_call' && inputs.environment || github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION || '1.9.0' }}

jobs:
  resolve:
    name: Resolve Deploy Inputs
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      action: ${{ steps.resolve.outputs.action }}
      workload: ${{ steps.resolve.outputs.workload }}
      tfvars_file: ${{ steps.resolve.outputs.tfvars_file }}
      state_key: ${{ steps.resolve.outputs.state_key }}
      frontend_image_tag: ${{ steps.resolve.outputs.frontend_image_tag }}
      backend_image_tag: ${{ steps.resolve.outputs.backend_image_tag }}
      target_args: ${{ steps.resolve.outputs.target_args }}

    steps:
      - name: Resolve inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_VARS=("AWS_REGION" "AWS_ACCOUNT_ID" "PROJECT_NAME" "BOOTSTRAP_ROLE_ARN" "TF_STATE_BUCKET")
          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME}" ]]; then
              echo "Missing required GitHub Actions variable: ${VAR_NAME}"
              exit 1
            fi
          done

          if [[ -z "${{ secrets.DB_PASSWORD }}" ]]; then
            echo "Missing required GitHub Actions secret: DB_PASSWORD"
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment || 'dev' }}"
            ACTION="${{ github.event.inputs.action || 'plan' }}"
            WORKLOAD="${{ github.event.inputs.workload || 'infra' }}"
            FRONTEND_IMAGE_TAG="${{ github.event.inputs.frontend_image_tag || 'latest' }}"
            BACKEND_IMAGE_TAG="${{ github.event.inputs.backend_image_tag || 'latest' }}"
          else
            ENVIRONMENT="${{ inputs.environment || 'dev' }}"
            ACTION="${{ inputs.action || 'plan' }}"
            WORKLOAD="${{ inputs.workload || 'infra' }}"
            FRONTEND_IMAGE_TAG="${{ inputs.frontend_image_tag || 'latest' }}"
            BACKEND_IMAGE_TAG="${{ inputs.backend_image_tag || 'latest' }}"
          fi

          case "${ENVIRONMENT}" in
            dev|uat|prod) ;;
            *)
              echo "Invalid environment: ${ENVIRONMENT}"
              exit 1
              ;;
          esac

          case "${ACTION}" in
            plan|apply) ;;
            *)
              echo "Invalid action: ${ACTION}"
              echo "Allowed actions: plan, apply"
              exit 1
              ;;
          esac

          if [[ "${ENVIRONMENT}" == "prod" && "${ACTION}" != "apply" ]]; then
            echo "Production deployments must use the apply action."
            exit 1
          fi

          case "${WORKLOAD}" in
            infra|frontend|backend|app) ;;
            *)
              echo "Invalid workload: ${WORKLOAD}"
              exit 1
              ;;
          esac

          TFVARS_FILE="environments/${ENVIRONMENT}.tfvars"
          STATE_KEY="${PROJECT_NAME}/${ENVIRONMENT}/terraform.tfstate"

          TARGET_ARGS=""
          if [[ "${WORKLOAD}" == "infra" ]]; then
            TARGET_ARGS="-target=module.network -target=module.ecr -target=module.security_groups -target=module.database -target=module.backend_compute -target=module.frontend_compute"
          elif [[ "${WORKLOAD}" == "frontend" ]]; then
            TARGET_ARGS="-target=module.frontend_compute"
          elif [[ "${WORKLOAD}" == "backend" ]]; then
            TARGET_ARGS="-target=module.backend_compute -target=module.frontend_compute"
          elif [[ "${WORKLOAD}" == "app" ]]; then
            TARGET_ARGS="-target=module.frontend_compute -target=module.backend_compute"
          fi

          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "action=${ACTION}" >> "$GITHUB_OUTPUT"
          echo "workload=${WORKLOAD}" >> "$GITHUB_OUTPUT"
          echo "tfvars_file=${TFVARS_FILE}" >> "$GITHUB_OUTPUT"
          echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"
          echo "frontend_image_tag=${FRONTEND_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "backend_image_tag=${BACKEND_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "target_args=${TARGET_ARGS}" >> "$GITHUB_OUTPUT"

  plan:
    name: Terraform Validate and Plan
    needs:
      - resolve
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
      TFVARS_FILE: ${{ needs.resolve.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
      FRONTEND_IMAGE_TAG: ${{ needs.resolve.outputs.frontend_image_tag }}
      BACKEND_IMAGE_TAG: ${{ needs.resolve.outputs.backend_image_tag }}
      TARGET_ARGS: ${{ needs.resolve.outputs.target_args }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformPlan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform fmt, init, and validate
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f "${TFVARS_FILE}" ]]; then
            echo "Missing tfvars file: terraform/${TFVARS_FILE}"
            exit 1
          fi

          terraform fmt -check -recursive

          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

          terraform validate

      - name: Verify deployment images exist in ECR
        if: needs.resolve.outputs.action == 'apply'
        shell: bash
        run: |
          set -euo pipefail

          check_image() {
            local repository="$1"
            local tag="$2"

            echo "Checking ECR image ${repository}:${tag}"
            aws ecr describe-images \
              --region "${AWS_REGION}" \
              --repository-name "${repository}" \
              --image-ids "imageTag=${tag}" \
              >/dev/null
          }

          case "${{ needs.resolve.outputs.workload }}" in
            frontend)
              check_image "${PROJECT_NAME}/${ENVIRONMENT}/todo-frontend" "${FRONTEND_IMAGE_TAG}"
              ;;
            backend|app|infra)
              check_image "${PROJECT_NAME}/${ENVIRONMENT}/todo-frontend" "${FRONTEND_IMAGE_TAG}"
              check_image "${PROJECT_NAME}/${ENVIRONMENT}/todo-backend" "${BACKEND_IMAGE_TAG}"
              ;;
          esac

      - name: Reconcile existing singleton resources into state
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          TF_IMPORT_ARGS=(
            -var-file="${TFVARS_FILE}"
            -var="aws_region=${AWS_REGION}"
            -var="project_name=${PROJECT_NAME}"
            -var="db_password=${DB_PASSWORD}"
            -var="frontend_image_tag=${FRONTEND_IMAGE_TAG}"
            -var="backend_image_tag=${BACKEND_IMAGE_TAG}"
          )

          tf_import_if_missing() {
            local address="$1"
            local import_id="$2"
            local check_cmd="$3"

            if terraform state show "$address" >/dev/null 2>&1; then
              return 0
            fi

            if eval "$check_cmd" >/dev/null 2>&1; then
              echo "Importing ${address} from ${import_id}"
              terraform import "${TF_IMPORT_ARGS[@]}" "$address" "$import_id"
            fi
          }

          PROJECT_ENV_PREFIX="${PROJECT_NAME}-${ENVIRONMENT}"

          # IAM roles
          tf_import_if_missing "module.backend_compute.aws_iam_role.this" "${PROJECT_ENV_PREFIX}-backend-ec2-role" "aws iam get-role --role-name ${PROJECT_ENV_PREFIX}-backend-ec2-role --output json"
          tf_import_if_missing "module.frontend_compute.aws_iam_role.this" "${PROJECT_ENV_PREFIX}-frontend-ec2-role" "aws iam get-role --role-name ${PROJECT_ENV_PREFIX}-frontend-ec2-role --output json"
          tf_import_if_missing "module.database.aws_iam_role.rds_enhanced_monitoring" "${PROJECT_ENV_PREFIX}-rds-enhanced-monitoring-role" "aws iam get-role --role-name ${PROJECT_ENV_PREFIX}-rds-enhanced-monitoring-role --output json"

          # IAM instance profiles
          tf_import_if_missing "module.backend_compute.aws_iam_instance_profile.this" "${PROJECT_ENV_PREFIX}-backend-instance-profile" "aws iam get-instance-profile --instance-profile-name ${PROJECT_ENV_PREFIX}-backend-instance-profile --output json"
          tf_import_if_missing "module.frontend_compute.aws_iam_instance_profile.this" "${PROJECT_ENV_PREFIX}-frontend-instance-profile" "aws iam get-instance-profile --instance-profile-name ${PROJECT_ENV_PREFIX}-frontend-instance-profile --output json"

          # IAM inline and attached policies
          tf_import_if_missing "module.backend_compute.aws_iam_role_policy.ecr_read[0]" "${PROJECT_ENV_PREFIX}-backend-ec2-role:${PROJECT_ENV_PREFIX}-backend-ecr-read" "aws iam get-role-policy --role-name ${PROJECT_ENV_PREFIX}-backend-ec2-role --policy-name ${PROJECT_ENV_PREFIX}-backend-ecr-read --output json"
          tf_import_if_missing "module.frontend_compute.aws_iam_role_policy.ecr_read[0]" "${PROJECT_ENV_PREFIX}-frontend-ec2-role:${PROJECT_ENV_PREFIX}-frontend-ecr-read" "aws iam get-role-policy --role-name ${PROJECT_ENV_PREFIX}-frontend-ec2-role --policy-name ${PROJECT_ENV_PREFIX}-frontend-ecr-read --output json"
          tf_import_if_missing "module.backend_compute.aws_iam_role_policy_attachment.ssm" "${PROJECT_ENV_PREFIX}-backend-ec2-role/arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore" "aws iam list-attached-role-policies --role-name ${PROJECT_ENV_PREFIX}-backend-ec2-role --query \"contains(AttachedPolicies[].PolicyArn, 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore')\" --output text | grep -q true"
          tf_import_if_missing "module.frontend_compute.aws_iam_role_policy_attachment.ssm" "${PROJECT_ENV_PREFIX}-frontend-ec2-role/arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore" "aws iam list-attached-role-policies --role-name ${PROJECT_ENV_PREFIX}-frontend-ec2-role --query \"contains(AttachedPolicies[].PolicyArn, 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore')\" --output text | grep -q true"
          tf_import_if_missing "module.database.aws_iam_role_policy_attachment.rds_enhanced_monitoring" "${PROJECT_ENV_PREFIX}-rds-enhanced-monitoring-role/arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole" "aws iam list-attached-role-policies --role-name ${PROJECT_ENV_PREFIX}-rds-enhanced-monitoring-role --query \"contains(AttachedPolicies[].PolicyArn, 'arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole')\" --output text | grep -q true"

      - name: Terraform plan
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          PLAN_ARGS=(
            -var-file="${TFVARS_FILE}"
            -var="aws_region=${AWS_REGION}"
            -var="project_name=${PROJECT_NAME}"
            -var="db_password=${DB_PASSWORD}"
            -var="frontend_image_tag=${FRONTEND_IMAGE_TAG}"
            -var="backend_image_tag=${BACKEND_IMAGE_TAG}"
            -out=tfplan
          )

          PLAN_LOG="plan.log"

          set +e
          terraform plan ${TARGET_ARGS} "${PLAN_ARGS[@]}" >"${PLAN_LOG}" 2>&1
          PLAN_EXIT=$?
          set -e

          cat "${PLAN_LOG}"

          if [[ ${PLAN_EXIT} -ne 0 ]]; then
            if grep -q "Moved resource instances excluded by targeting" "${PLAN_LOG}"; then
              echo "Targeted plan failed because resources moved. Retrying full plan without -target."
              terraform plan "${PLAN_ARGS[@]}"
            else
              exit ${PLAN_EXIT}
            fi
          fi

      - name: Show DB plan changes
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail
          terraform show -json tfplan > tfplan.json

          DB_CHANGES="$(jq -r '.resource_changes[]? | select(.address == "module.database.aws_db_instance.this") | .change.actions | join(",")' tfplan.json)"

          if [[ -n "${DB_CHANGES}" ]]; then
            echo "Database resource actions: ${DB_CHANGES}"
            jq -r '.resource_changes[]? | select(.address == "module.database.aws_db_instance.this") | {address, actions: .change.actions, before: .change.before, after: .change.after, after_unknown: .change.after_unknown}' tfplan.json
          else
            echo "No database changes in this plan."
          fi

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ needs.resolve.outputs.environment }}
          path: |
            terraform/tfplan
          if-no-files-found: error

  apply:
    name: Terraform Apply
    needs:
      - resolve
      - plan
    if: needs.resolve.outputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.environment == 'prod' && 'prod' || '' }}
    env:
      TFVARS_FILE: ${{ needs.resolve.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
      FRONTEND_IMAGE_TAG: ${{ needs.resolve.outputs.frontend_image_tag }}
      BACKEND_IMAGE_TAG: ${{ needs.resolve.outputs.backend_image_tag }}
      TARGET_ARGS: ${{ needs.resolve.outputs.target_args }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformApply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ needs.resolve.outputs.environment }}
          path: terraform

      - name: Terraform apply
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          set +e
          terraform apply -auto-approve tfplan > apply.log 2>&1
          APPLY_EXIT=$?
          set -e

          cat apply.log

          if [[ ${APPLY_EXIT} -eq 0 ]]; then
            exit 0
          fi

          if ! grep -q "Saved plan is stale" apply.log; then
            exit ${APPLY_EXIT}
          fi

          echo "Saved plan is stale because the Terraform state changed after planning."
          echo "Creating a fresh plan now that this workflow owns the Terraform concurrency slot."

          terraform plan ${TARGET_ARGS} \
            -var-file="${TFVARS_FILE}" \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="db_password=${DB_PASSWORD}" \
            -var="frontend_image_tag=${FRONTEND_IMAGE_TAG}" \
            -var="backend_image_tag=${BACKEND_IMAGE_TAG}" \
            -out=tfplan

          terraform apply -auto-approve tfplan

      - name: Show frontend URL and diagnostics
        if: always()
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          FRONTEND_URL="$(terraform output -raw frontend_url 2>/dev/null || true)"
          FRONTEND_IP="$(terraform output -raw frontend_public_ip 2>/dev/null || true)"

          if [[ -n "${FRONTEND_URL}" ]]; then
            echo "Frontend URL: ${FRONTEND_URL}"
          fi

          if [[ -z "${FRONTEND_IP}" ]]; then
            echo "No frontend public IP found in Terraform output."
            exit 0
          fi

          echo "Frontend public IP: ${FRONTEND_IP}"

          INSTANCE_ID="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --filters "Name=ip-address,Values=${FRONTEND_IP}" "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text | awk '{print $1}')"

          if [[ -z "${INSTANCE_ID}" || "${INSTANCE_ID}" == "None" ]]; then
            echo "No active EC2 instance currently has public IP ${FRONTEND_IP}."
            exit 0
          fi

          aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --instance-ids "${INSTANCE_ID}" \
            --query 'Reservations[].Instances[].{InstanceId:InstanceId,State:State.Name,Name:Tags[?Key==`Name`]|[0].Value,PublicIp:PublicIpAddress,PrivateIp:PrivateIpAddress,SecurityGroups:SecurityGroups[].GroupId,LaunchTime:LaunchTime}'

          FRONTEND_SG_ID="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --instance-ids "${INSTANCE_ID}" \
            --query 'Reservations[0].Instances[0].SecurityGroups[0].GroupId' \
            --output text)"

          BACKEND_SG_ID="$(aws ec2 describe-security-groups \
            --region "${AWS_REGION}" \
            --filters "Name=group-name,Values=${PROJECT_NAME}-${{ needs.resolve.outputs.environment }}-backend-sg" \
            --query 'SecurityGroups[0].GroupId' \
            --output text)"

          echo "Frontend security group: ${FRONTEND_SG_ID}"
          echo "Backend security group: ${BACKEND_SG_ID}"

          FRONTEND_SG_JSON="$(aws ec2 describe-security-groups \
            --region "${AWS_REGION}" \
            --group-ids "${FRONTEND_SG_ID}" \
            --output json)"

          echo "Frontend security group ingress rules:"
          echo "${FRONTEND_SG_JSON}" | jq '.SecurityGroups[0].IpPermissions'

          if echo "${FRONTEND_SG_JSON}" | jq -e '
            .SecurityGroups[0].IpPermissions[]
            | select(.IpProtocol == "tcp")
            | select(.FromPort <= 80 and .ToPort >= 80)
            | select(any(.IpRanges[]?; .CidrIp == "0.0.0.0/0"))
          ' >/dev/null; then
            echo "Frontend SG allows TCP 80 from 0.0.0.0/0."
          else
            echo "Frontend SG does not allow TCP 80 from 0.0.0.0/0."
            exit 1
          fi

          BACKEND_SG_JSON="$(aws ec2 describe-security-groups \
            --region "${AWS_REGION}" \
            --group-ids "${BACKEND_SG_ID}" \
            --output json)"

          echo "${BACKEND_SG_JSON}" | jq '.SecurityGroups[0].IpPermissions'

          if echo "${BACKEND_SG_JSON}" | jq -e --arg frontend_sg "${FRONTEND_SG_ID}" '
            .SecurityGroups[0].IpPermissions[]
            | select(.IpProtocol == "tcp")
            | select(.FromPort <= 8000 and .ToPort >= 8000)
            | select(any(.UserIdGroupPairs[]?; .GroupId == $frontend_sg))
          ' >/dev/null; then
            echo "Backend SG allows TCP 8000 from the frontend SG."
          else
            echo "Backend SG does not allow TCP 8000 from the frontend SG."
            exit 1
          fi

          FRONTEND_READY=false
          FRONTEND_BODY=""
          for i in {1..30}; do
            FRONTEND_BODY="$(curl -fsS --connect-timeout 10 --max-time 15 "${FRONTEND_URL}" || true)"
            if [[ -n "${FRONTEND_BODY}" && "${FRONTEND_BODY}" != *"Welcome to nginx"* && "${FRONTEND_BODY}" != *"Todo app is starting"* ]]; then
              FRONTEND_READY=true
              break
            fi

            if [[ "${FRONTEND_BODY}" == *"Welcome to nginx"* ]]; then
              echo "Frontend is serving the stock Nginx page. Attempt ${i}/30; waiting 15s for user data to finish."
            elif [[ "${FRONTEND_BODY}" == *"Todo app is starting"* ]]; then
              echo "Frontend fallback page is reachable. Attempt ${i}/30; waiting 15s for the React container."
            else
              echo "Frontend HTTP check failed. Attempt ${i}/30; waiting 15s..."
            fi
            sleep 15
          done

          if [[ "${FRONTEND_READY}" == "true" ]]; then
            echo "Frontend HTTP check passed."
            API_HEALTH="$(curl -fsS --connect-timeout 10 --max-time 15 "${FRONTEND_URL%/}/api/health" || true)"
            if [[ -n "${API_HEALTH}" ]]; then
              echo "Frontend API proxy health response: ${API_HEALTH}"
            else
              echo "Frontend is serving the React app, but /api/health is not reachable through Nginx."
              exit 1
            fi
          else
            if [[ "${FRONTEND_READY}" == "true" ]]; then
              echo "Frontend HTTP returned content, but it is not the React todo app."
              echo "${FRONTEND_BODY}" | head -n 40
            fi

            echo "Attempting frontend HTTP recovery through SSM."
            RECOVERY_COMMAND_ID="$(aws ssm send-command \
              --region "${AWS_REGION}" \
              --instance-ids "${INSTANCE_ID}" \
              --document-name "AWS-RunShellScript" \
              --comment "Start frontend fallback HTTP service" \
              --parameters 'commands=["set -eux","sudo apt-get update -y","sudo apt-get install -y nginx","sudo mkdir -p /var/www/html","cat <<'\''EOF'\'' | sudo tee /var/www/html/index.html >/dev/null\n<!DOCTYPE html>\n<html lang=\"en\">\n<head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1\"><title>Todo App Starting</title></head>\n<body><h1>Todo app is starting</h1><p>The frontend host is reachable. The application container still needs attention.</p></body>\n</html>\nEOF","sudo cp /var/www/html/index.html /var/www/html/index.nginx-debian.html || true","sudo systemctl enable nginx","sudo systemctl restart nginx","sudo ss -ltnp || true","curl -fsS http://localhost | head -n 40 || true"]' \
              --query 'Command.CommandId' \
              --output text 2>/dev/null || true)"

            if [[ -n "${RECOVERY_COMMAND_ID}" && "${RECOVERY_COMMAND_ID}" != "None" ]]; then
              sleep 30
              aws ssm get-command-invocation \
                --region "${AWS_REGION}" \
                --command-id "${RECOVERY_COMMAND_ID}" \
                --instance-id "${INSTANCE_ID}" \
                --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
                --output text || true

              FRONTEND_BODY="$(curl -fsS --connect-timeout 10 --max-time 15 "${FRONTEND_URL}" || true)"
              if [[ -n "${FRONTEND_BODY}" ]]; then
                echo "Frontend HTTP is reachable after SSM recovery."
                echo "${FRONTEND_BODY}" | head -n 40
              fi
            else
              echo "Could not start SSM recovery. The instance may not be registered with SSM yet."
            fi

            echo "Frontend HTTP check failed. Recent console output follows."
            aws ec2 get-console-output \
              --region "${AWS_REGION}" \
              --instance-id "${INSTANCE_ID}" \
              --latest \
              --output text || true

            echo "Trying SSM diagnostics from inside the frontend instance."
            COMMAND_ID="$(aws ssm send-command \
              --region "${AWS_REGION}" \
              --instance-ids "${INSTANCE_ID}" \
              --document-name "AWS-RunShellScript" \
              --comment "Frontend diagnostics after failed HTTP check" \
              --parameters 'commands=["cloud-init status --long || true","systemctl status nginx --no-pager || true","systemctl status docker --no-pager || true","ss -ltnp || true","curl -fsS http://localhost | head -n 80 || true","curl -i http://localhost/api/health || true","docker ps -a || true","docker exec todo-frontend sh -c \"ls -la /usr/share/nginx/html && sed -n 1,80p /usr/share/nginx/html/index.html && echo === nginx config === && sed -n 1,160p /etc/nginx/conf.d/default.conf\" || true","docker logs todo-frontend --tail 120 || true","tail -n 200 /var/log/user-data-frontend.log || true"]' \
              --query 'Command.CommandId' \
              --output text 2>/dev/null || true)"

            if [[ -n "${COMMAND_ID}" && "${COMMAND_ID}" != "None" ]]; then
              sleep 10
              aws ssm get-command-invocation \
                --region "${AWS_REGION}" \
                --command-id "${COMMAND_ID}" \
                --instance-id "${INSTANCE_ID}" \
                --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
                --output text || true
            else
              echo "Could not start SSM diagnostics. The instance may not be registered with SSM yet."
            fi

            exit 1
          fi
