name: Deploy Infrastructure

on:
  # Manual deploy for any environment
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
        default: dev
      action:
        description: Terraform action
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: apply
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: latest

  # PR validation only
  pull_request:
    branches:
      - uat
      - prod
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yml"

  # Terraform-only changes still deploy by branch
  push:
    branches:
      - dev
      - uat
      - prod
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yml"

  # Auto-deploy dev after Docker images are successfully built, tested, and pushed
  workflow_run:
    workflows:
      - Docker Build Test Push
    types:
      - completed
    branches:
      - dev

permissions:
  id-token: write
  contents: read
  pull-requests: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
  APP_DIR: .

jobs:
  validate-promotion:
    name: Validate Promotion Path
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate allowed promotion path
        shell: bash
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          HEAD_BRANCH="${{ github.head_ref }}"

          echo "Base branch: ${BASE_BRANCH}"
          echo "Head branch: ${HEAD_BRANCH}"

          if [[ "${BASE_BRANCH}" == "uat" && "${HEAD_BRANCH}" != "dev" ]]; then
            echo "Invalid promotion. UAT only accepts promotion from dev."
            exit 1
          fi

          if [[ "${BASE_BRANCH}" == "prod" && "${HEAD_BRANCH}" != "uat" ]]; then
            echo "Invalid promotion. Prod only accepts promotion from uat."
            exit 1
          fi

          echo "Promotion path is valid."

  resolve:
    name: Resolve Deployment Inputs
    runs-on: ubuntu-latest
    needs:
      - validate-promotion
    if: always() && (github.event_name != 'pull_request' || needs.validate-promotion.result == 'success')
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      action: ${{ steps.resolve.outputs.action }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      tfvars_file: ${{ steps.resolve.outputs.tfvars_file }}
      state_key: ${{ steps.resolve.outputs.state_key }}
      aws_account_id: ${{ steps.resolve.outputs.aws_account_id }}
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
    steps:
      - name: Resolve environment, action, and image tag
        id: resolve
        shell: bash
        run: |
          SHOULD_DEPLOY="true"

          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            if [[ "${{ github.event.workflow_run.conclusion }}" != "success" ]]; then
              echo "Docker workflow did not succeed. Skipping deploy."
              SHOULD_DEPLOY="false"
            fi

            ENVIRONMENT="dev"
            ACTION="apply"
            IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"

          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            ACTION="${{ github.event.inputs.action }}"
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
            if [[ -z "${IMAGE_TAG}" ]]; then
              IMAGE_TAG="latest"
            fi

          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ENVIRONMENT="${{ github.base_ref }}"
            ACTION="plan"
            IMAGE_TAG="latest"

          else
            case "${GITHUB_REF_NAME}" in
              dev) ENVIRONMENT="dev" ;;
              uat) ENVIRONMENT="uat" ;;
              prod) ENVIRONMENT="prod" ;;
              *) echo "Unsupported branch: ${GITHUB_REF_NAME}"; exit 1 ;;
            esac
            ACTION="apply"
            IMAGE_TAG="latest"
          fi

          if [[ -z "${AWS_ACCOUNT_ID}" ]]; then
            AWS_ACCOUNT_ID_RESOLVED="$(echo "${BOOTSTRAP_ROLE_ARN}" | awk -F: '{print $5}')"
          else
            AWS_ACCOUNT_ID_RESOLVED="${AWS_ACCOUNT_ID}"
          fi

          TFVARS_FILE="environments/${ENVIRONMENT}.tfvars"
          STATE_KEY="${PROJECT_NAME}/${ENVIRONMENT}/terraform.tfstate"

          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "action=${ACTION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "tfvars_file=${TFVARS_FILE}" >> "$GITHUB_OUTPUT"
          echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"
          echo "aws_account_id=${AWS_ACCOUNT_ID_RESOLVED}" >> "$GITHUB_OUTPUT"
          echo "should_deploy=${SHOULD_DEPLOY}" >> "$GITHUB_OUTPUT"

          echo "Environment: ${ENVIRONMENT}"
          echo "Action: ${ACTION}"
          echo "Image tag: ${IMAGE_TAG}"
          echo "TFVars file: ${TFVARS_FILE}"
          echo "State key: ${STATE_KEY}"
          echo "AWS account ID: ${AWS_ACCOUNT_ID_RESOLVED}"
          echo "Should deploy: ${SHOULD_DEPLOY}"

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs:
      - resolve
    if: needs.resolve.outputs.should_deploy == 'true'
    env:
      ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
      ACTION: ${{ needs.resolve.outputs.action }}
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
      TFVARS_FILE: ${{ needs.resolve.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
      AWS_ACCOUNT_ID: ${{ needs.resolve.outputs.aws_account_id }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required variables and files
        shell: bash
        run: |
          REQUIRED_VARS=(
            "AWS_REGION"
            "PROJECT_NAME"
            "BOOTSTRAP_ROLE_ARN"
            "TF_STATE_BUCKET"
            "TERRAFORM_VERSION"
            "DB_PASSWORD"
          )

          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME}" ]]; then
              echo "Missing required variable or secret: ${VAR_NAME}"
              exit 1
            fi
          done

          if [[ ! -f "terraform/${TFVARS_FILE}" ]]; then
            echo "Missing tfvars file: terraform/${TFVARS_FILE}"
            find terraform -maxdepth 3 -type f | sort
            exit 1
          fi

          echo "Required variables and files are valid."

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformPlan

      - name: Confirm AWS identity
        shell: bash
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform fmt check
        working-directory: terraform
        shell: bash
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: terraform
        shell: bash
        run: terraform validate

      - name: Terraform plan
        if: env.ACTION != 'destroy'
        working-directory: terraform
        shell: bash
        run: |
          terraform plan \
            -var-file="${TFVARS_FILE}" \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${IMAGE_TAG}" \
            -out=tfplan

      - name: Terraform destroy plan
        if: env.ACTION == 'destroy'
        working-directory: terraform
        shell: bash
        run: |
          terraform plan -destroy \
            -var-file="${TFVARS_FILE}" \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${IMAGE_TAG}" \
            -out=tfplan

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.ENVIRONMENT }}
          path: terraform/tfplan
          if-no-files-found: error

  terraform-apply-nonprod:
    name: Terraform Apply Non-Prod
    runs-on: ubuntu-latest
    needs:
      - resolve
      - terraform-plan
    if: github.event_name != 'pull_request' && needs.resolve.outputs.should_deploy == 'true' && needs.resolve.outputs.action != 'plan' && needs.resolve.outputs.environment != 'prod'
    env:
      ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
      ACTION: ${{ needs.resolve.outputs.action }}
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
      TFVARS_FILE: ${{ needs.resolve.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
      AWS_ACCOUNT_ID: ${{ needs.resolve.outputs.aws_account_id }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformApply

      - name: Confirm AWS identity
        shell: bash
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ env.ENVIRONMENT }}
          path: terraform

      - name: Terraform apply
        if: env.ACTION == 'apply'
        working-directory: terraform
        shell: bash
        run: terraform apply -auto-approve tfplan

      - name: Terraform destroy
        if: env.ACTION == 'destroy'
        working-directory: terraform
        shell: bash
        run: terraform apply -auto-approve tfplan

  terraform-apply-prod:
    name: Terraform Apply Prod
    runs-on: ubuntu-latest
    needs:
      - resolve
      - terraform-plan
    if: github.event_name != 'pull_request' && needs.resolve.outputs.should_deploy == 'true' && needs.resolve.outputs.action != 'plan' && needs.resolve.outputs.environment == 'prod'
    environment: prod
    env:
      ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
      ACTION: ${{ needs.resolve.outputs.action }}
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
      TFVARS_FILE: ${{ needs.resolve.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
      AWS_ACCOUNT_ID: ${{ needs.resolve.outputs.aws_account_id }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformProd

      - name: Confirm AWS identity
        shell: bash
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ env.ENVIRONMENT }}
          path: terraform

      - name: Terraform apply
        if: env.ACTION == 'apply'
        working-directory: terraform
        shell: bash
        run: terraform apply -auto-approve tfplan

      - name: Terraform destroy
        if: env.ACTION == 'destroy'
        working-directory: terraform
        shell: bash
        run: terraform apply -auto-approve tfplan
