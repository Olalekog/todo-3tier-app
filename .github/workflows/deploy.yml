name: Deploy Infrastructure

on:
  workflow_call:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: string
      action:
        description: Terraform action
        required: true
        type: string
      image_tag:
        description: Docker image tag to deploy
        required: false
        type: string
        default: latest
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
        default: dev
      action:
        description: Terraform action
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: latest
  pull_request:
    branches:
      - uat
      - prod
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: read

concurrency:
  group: deploy-${{ inputs.environment || github.event.inputs.environment || github.base_ref || github.ref_name }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
  APP_DIR: .

jobs:
  validate-promotion:
    name: Validate Promotion Path
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate branch promotion
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_BRANCH="${{ github.head_ref }}"
          TARGET_BRANCH="${{ github.base_ref }}"

          if [[ "${TARGET_BRANCH}" == "uat" && "${SOURCE_BRANCH}" != "dev" ]]; then
            echo "Only dev can be promoted to uat. Current source: ${SOURCE_BRANCH}"
            exit 1
          fi

          if [[ "${TARGET_BRANCH}" == "prod" && "${SOURCE_BRANCH}" != "uat" ]]; then
            echo "Only uat can be promoted to prod. Current source: ${SOURCE_BRANCH}"
            exit 1
          fi

          echo "Promotion path is valid: ${SOURCE_BRANCH} -> ${TARGET_BRANCH}"

  resolve:
    name: Resolve Deployment Inputs
    runs-on: ubuntu-latest
    needs: validate-promotion
    if: always() && (github.event_name != 'pull_request' || needs.validate-promotion.result == 'success')
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      action: ${{ steps.resolve.outputs.action }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      tfvars_file: ${{ steps.resolve.outputs.tfvars_file }}
      state_key: ${{ steps.resolve.outputs.state_key }}
      aws_account_id: ${{ steps.resolve.outputs.aws_account_id }}
    steps:
      - name: Resolve deploy inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            ENVIRONMENT="${{ inputs.environment }}"
            ACTION="${{ inputs.action }}"
            IMAGE_TAG="${{ inputs.image_tag }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            ACTION="${{ github.event.inputs.action }}"
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ENVIRONMENT="${{ github.base_ref }}"
            ACTION="plan"
            IMAGE_TAG="latest"
          else
            echo "Unsupported event: ${{ github.event_name }}"
            exit 1
          fi

          case "${ENVIRONMENT}" in
            dev|uat|prod) ;;
            *) echo "Invalid environment: ${ENVIRONMENT}"; exit 1 ;;
          esac

          case "${ACTION}" in
            plan|apply|destroy) ;;
            *) echo "Invalid action: ${ACTION}"; exit 1 ;;
          esac

          if [[ -z "${IMAGE_TAG}" ]]; then
            IMAGE_TAG="latest"
          fi

          if [[ -z "${PROJECT_NAME}" ]]; then
            echo "Missing required GitHub variable: PROJECT_NAME"
            exit 1
          fi

          if [[ -z "${AWS_REGION}" ]]; then
            echo "Missing required GitHub variable: AWS_REGION"
            exit 1
          fi

          if [[ -z "${BOOTSTRAP_ROLE_ARN}" ]]; then
            echo "Missing required GitHub variable: BOOTSTRAP_ROLE_ARN"
            exit 1
          fi

          if [[ -z "${TF_STATE_BUCKET}" ]]; then
            echo "Missing required GitHub variable: TF_STATE_BUCKET"
            exit 1
          fi

          RESOLVED_AWS_ACCOUNT_ID="${AWS_ACCOUNT_ID}"
          if [[ -z "${RESOLVED_AWS_ACCOUNT_ID}" ]]; then
            RESOLVED_AWS_ACCOUNT_ID="$(echo "${BOOTSTRAP_ROLE_ARN}" | awk -F: '{print $5}')"
          fi

          TFVARS_FILE="environments/${ENVIRONMENT}.tfvars"
          STATE_KEY="${PROJECT_NAME}/${ENVIRONMENT}/terraform.tfstate"

          echo "environment=${ENVIRONMENT}" >> "${GITHUB_OUTPUT}"
          echo "action=${ACTION}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "tfvars_file=${TFVARS_FILE}" >> "${GITHUB_OUTPUT}"
          echo "state_key=${STATE_KEY}" >> "${GITHUB_OUTPUT}"
          echo "aws_account_id=${RESOLVED_AWS_ACCOUNT_ID}" >> "${GITHUB_OUTPUT}"

  terraform-plan:
    name: Terraform Plan
    needs: resolve
    runs-on: ubuntu-latest
    if: needs.resolve.result == 'success'
    env:
      ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
      ACTION: ${{ needs.resolve.outputs.action }}
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
      TFVARS_FILE: ${{ needs.resolve.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Terraform files and secrets
        shell: bash
        run: |
          test -d terraform || (echo "Missing terraform directory" && exit 1)
          test -f "terraform/${TFVARS_FILE}" || (echo "Missing terraform/${TFVARS_FILE}" && exit 1)
          if [[ -z "${DB_PASSWORD}" ]]; then
            echo "Missing required GitHub secret: DB_PASSWORD"
            exit 1
          fi

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformPlan

      - name: Confirm AWS identity
        shell: bash
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform fmt check
        working-directory: terraform
        shell: bash
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: terraform
        shell: bash
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        shell: bash
        run: |
          if [[ "${ACTION}" == "destroy" ]]; then
            terraform plan -destroy \
              -var-file="${TFVARS_FILE}" \
              -var="aws_region=${AWS_REGION}" \
              -var="project_name=${PROJECT_NAME}" \
              -var="db_password=${DB_PASSWORD}" \
              -var="image_tag=${IMAGE_TAG}" \
              -out=tfplan
          else
            terraform plan \
              -var-file="${TFVARS_FILE}" \
              -var="aws_region=${AWS_REGION}" \
              -var="project_name=${PROJECT_NAME}" \
              -var="db_password=${DB_PASSWORD}" \
              -var="image_tag=${IMAGE_TAG}" \
              -out=tfplan
          fi

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.ENVIRONMENT }}-${{ github.run_id }}
          path: terraform/tfplan
          retention-days: 1

  terraform-apply-nonprod:
    name: Terraform Apply Non-Prod
    needs:
      - resolve
      - terraform-plan
    runs-on: ubuntu-latest
    if: needs.terraform-plan.result == 'success' && needs.resolve.outputs.action != 'plan' && needs.resolve.outputs.environment != 'prod'
    env:
      ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
      ACTION: ${{ needs.resolve.outputs.action }}
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformApplyNonProd

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ env.ENVIRONMENT }}-${{ github.run_id }}
          path: terraform

      - name: Terraform apply or destroy
        working-directory: terraform
        shell: bash
        run: |
          if [[ "${ACTION}" == "destroy" ]]; then
            terraform apply -auto-approve tfplan
          else
            terraform apply -auto-approve tfplan
          fi

  terraform-apply-prod:
    name: Terraform Apply Prod
    needs:
      - resolve
      - terraform-plan
    runs-on: ubuntu-latest
    if: needs.terraform-plan.result == 'success' && needs.resolve.outputs.action != 'plan' && needs.resolve.outputs.environment == 'prod'
    environment: prod
    env:
      ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
      ACTION: ${{ needs.resolve.outputs.action }}
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformApplyProd

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ env.ENVIRONMENT }}-${{ github.run_id }}
          path: terraform

      - name: Terraform apply or destroy
        working-directory: terraform
        shell: bash
        run: terraform apply -auto-approve tfplan
