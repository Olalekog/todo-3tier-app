name: Deploy Infrastructure

on:
  workflow_call:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: string
      action:
        description: Terraform action
        required: true
        type: string
      image_tag:
        description: Docker image tag to deploy
        required: false
        type: string
        default: latest
      allow_replacement:
        description: Allow Terraform plans that delete or replace resources
        required: false
        type: string
        default: "false"
    secrets:
      DB_PASSWORD:
        required: true

  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
      action:
        description: Terraform action
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: destroy
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: latest
      allow_replacement:
        description: Allow Terraform plans that delete or replace resources
        required: false
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

  push:
    branches:
      - dev
      - uat
      - prod
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yml"

  pull_request:
    branches:
      - uat
      - prod
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: read

concurrency:
  group: deploy-${{ inputs.environment || github.base_ref || github.ref_name }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
  APP_DIR: .

jobs:
  build:
    name: Build / Resolve Inputs
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      action: ${{ steps.resolve.outputs.action }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      tfvars_file: ${{ steps.resolve.outputs.tfvars_file }}
      state_key: ${{ steps.resolve.outputs.state_key }}
      aws_account_id: ${{ steps.resolve.outputs.aws_account_id }}
      allow_replacement: ${{ steps.resolve.outputs.allow_replacement }}
    steps:
      - name: Resolve deployment inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          INPUT_ENVIRONMENT="${{ inputs.environment || '' }}"
          INPUT_ACTION="${{ inputs.action || '' }}"
          INPUT_IMAGE_TAG="${{ inputs.image_tag || '' }}"
          INPUT_ALLOW_REPLACEMENT="${{ inputs.allow_replacement || 'false' }}"

          if [[ -n "${INPUT_ENVIRONMENT}" ]]; then
            ENVIRONMENT="${INPUT_ENVIRONMENT}"
            ACTION="${INPUT_ACTION:-apply}"
            IMAGE_TAG="${INPUT_IMAGE_TAG:-latest}"
            ALLOW_REPLACEMENT="${INPUT_ALLOW_REPLACEMENT:-false}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_BRANCH="${{ github.base_ref }}"
            HEAD_BRANCH="${{ github.head_ref }}"

            echo "Base branch: ${BASE_BRANCH}"
            echo "Head branch: ${HEAD_BRANCH}"

            if [[ "${BASE_BRANCH}" == "uat" && "${HEAD_BRANCH}" != "dev" ]]; then
              echo "Invalid promotion. UAT can only be promoted from dev."
              exit 1
            fi

            if [[ "${BASE_BRANCH}" == "prod" && "${HEAD_BRANCH}" != "uat" ]]; then
              echo "Invalid promotion. Prod can only be promoted from uat."
              exit 1
            fi

            ENVIRONMENT="${BASE_BRANCH}"
            ACTION="plan"
            IMAGE_TAG="latest"
            ALLOW_REPLACEMENT="false"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            case "${GITHUB_REF_NAME}" in
              dev) ENVIRONMENT="dev"; ACTION="apply" ;;
              uat) ENVIRONMENT="uat"; ACTION="plan" ;;
              prod) ENVIRONMENT="prod"; ACTION="plan" ;;
              *) echo "Unsupported branch for infrastructure deploy: ${GITHUB_REF_NAME}"; exit 1 ;;
            esac
            IMAGE_TAG="latest"
            ALLOW_REPLACEMENT="false"
          else
            echo "Unsupported event without reusable or manual inputs: ${{ github.event_name }}"
            exit 1
          fi

          case "${ENVIRONMENT}" in
            dev|uat|prod) ;;
            *) echo "Invalid environment: ${ENVIRONMENT}"; exit 1 ;;
          esac

          case "${ACTION}" in
            plan|apply|destroy) ;;
            *) echo "Invalid action: ${ACTION}"; exit 1 ;;
          esac

          case "${ALLOW_REPLACEMENT}" in
            true|false) ;;
            *) echo "Invalid allow_replacement value: ${ALLOW_REPLACEMENT}. Use true or false."; exit 1 ;;
          esac

          if [[ -z "${IMAGE_TAG}" ]]; then
            IMAGE_TAG="latest"
          fi

          REQUIRED_VARS=(
            "PROJECT_NAME"
            "AWS_REGION"
            "BOOTSTRAP_ROLE_ARN"
            "TF_STATE_BUCKET"
            "TERRAFORM_VERSION"
          )

          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME}" ]]; then
              echo "Missing required GitHub variable: ${VAR_NAME}"
              exit 1
            fi
          done

          RESOLVED_AWS_ACCOUNT_ID="${AWS_ACCOUNT_ID}"
          if [[ -z "${RESOLVED_AWS_ACCOUNT_ID}" ]]; then
            RESOLVED_AWS_ACCOUNT_ID="$(echo "${BOOTSTRAP_ROLE_ARN}" | awk -F: '{print $5}')"
          fi

          TFVARS_FILE="environments/${ENVIRONMENT}.tfvars"
          STATE_KEY="${PROJECT_NAME}/${ENVIRONMENT}/terraform.tfstate"

          echo "environment=${ENVIRONMENT}" >> "${GITHUB_OUTPUT}"
          echo "action=${ACTION}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "tfvars_file=${TFVARS_FILE}" >> "${GITHUB_OUTPUT}"
          echo "state_key=${STATE_KEY}" >> "${GITHUB_OUTPUT}"
          echo "aws_account_id=${RESOLVED_AWS_ACCOUNT_ID}" >> "${GITHUB_OUTPUT}"
          echo "allow_replacement=${ALLOW_REPLACEMENT}" >> "${GITHUB_OUTPUT}"

          echo "Environment: ${ENVIRONMENT}"
          echo "Action: ${ACTION}"
          echo "Image tag: ${IMAGE_TAG}"
          echo "State key: ${STATE_KEY}"
          echo "Allow replacement: ${ALLOW_REPLACEMENT}"

  test:
    name: Test / Terraform Validate and Plan
    runs-on: ubuntu-latest
    needs:
      - build
    if: always() && needs.build.result == 'success'
    outputs:
      plan_has_changes: ${{ steps.plan.outputs.plan_has_changes }}
      plan_has_destructive_changes: ${{ steps.plan.outputs.plan_has_destructive_changes }}
    env:
      ENVIRONMENT: ${{ needs.build.outputs.environment }}
      ACTION: ${{ needs.build.outputs.action }}
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      TFVARS_FILE: ${{ needs.build.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.build.outputs.state_key }}
      ALLOW_REPLACEMENT: ${{ needs.build.outputs.allow_replacement }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deploy files and secrets
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -d "terraform" ]]; then
            echo "Missing terraform directory at repo root."
            exit 1
          fi

          if [[ ! -f "terraform/${TFVARS_FILE}" ]]; then
            echo "Missing tfvars file: terraform/${TFVARS_FILE}"
            find terraform -maxdepth 3 -type f | sort
            exit 1
          fi

          if [[ -z "${DB_PASSWORD}" ]]; then
            echo "Missing required secret: DB_PASSWORD"
            exit 1
          fi

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformTest

      - name: Confirm AWS identity
        shell: bash
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform fmt
        working-directory: terraform
        shell: bash
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform
        shell: bash
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Import existing ECR repositories if already created
        if: env.ACTION != 'destroy'
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          FRONTEND_REPO="${PROJECT_NAME}/${ENVIRONMENT}/todo-frontend"
          BACKEND_REPO="${PROJECT_NAME}/${ENVIRONMENT}/todo-backend"

          import_ecr_repo_if_needed() {
            local terraform_address="$1"
            local repository_name="$2"

            echo "Checking ECR repository: ${repository_name}"

            if aws ecr describe-repositories --repository-names "${repository_name}" >/dev/null 2>&1; then
              echo "ECR repository exists in AWS: ${repository_name}"

              if terraform state show "${terraform_address}" >/dev/null 2>&1; then
                echo "Repository is already managed by Terraform state: ${terraform_address}"
              else
                echo "Repository exists but is not in Terraform state. Importing: ${repository_name}"
                terraform import \
                  -var-file="${TFVARS_FILE}" \
                  -var="aws_region=${AWS_REGION}" \
                  -var="project_name=${PROJECT_NAME}" \
                  -var="db_password=${DB_PASSWORD}" \
                  -var="image_tag=${IMAGE_TAG}" \
                  "${terraform_address}" \
                  "${repository_name}"
              fi
            else
              echo "ECR repository does not exist yet. Terraform will create it: ${repository_name}"
            fi
          }

          import_ecr_repo_if_needed "module.ecr.aws_ecr_repository.frontend" "${FRONTEND_REPO}"
          import_ecr_repo_if_needed "module.ecr.aws_ecr_repository.backend" "${BACKEND_REPO}"

      - name: Terraform Validate
        working-directory: terraform
        shell: bash
        run: terraform validate

      - name: Terraform Plan with no-change and replacement guard
        id: plan
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          echo "plan_has_changes=false" >> "${GITHUB_OUTPUT}"
          echo "plan_has_destructive_changes=false" >> "${GITHUB_OUTPUT}"

          if [[ "${ACTION}" == "destroy" ]]; then
            terraform plan -destroy \
              -var-file="${TFVARS_FILE}" \
              -var="aws_region=${AWS_REGION}" \
              -var="project_name=${PROJECT_NAME}" \
              -var="db_password=${DB_PASSWORD}" \
              -var="image_tag=${IMAGE_TAG}" \
              -out=tfplan

            terraform show -json tfplan > tfplan.json
            echo "plan_has_changes=true" >> "${GITHUB_OUTPUT}"
            echo "plan_has_destructive_changes=true" >> "${GITHUB_OUTPUT}"

            if [[ "${ALLOW_REPLACEMENT}" != "true" ]]; then
              echo "Destroy was requested, but allow_replacement is false."
              echo "Blocking destroy to protect application infrastructure."
              exit 1
            fi

            exit 0
          fi

          terraform plan \
            -var-file="${TFVARS_FILE}" \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${IMAGE_TAG}" \
            -out=tfplan

          terraform show -json tfplan > tfplan.json

          CHANGE_COUNT="$(jq '[.resource_changes[]? | select(.change.actions != ["no-op"])] | length' tfplan.json)"
          DESTRUCTIVE_COUNT="$(jq '[.resource_changes[]? | select(.change.actions | index("delete"))] | length' tfplan.json)"

          echo "Terraform change count: ${CHANGE_COUNT}"
          echo "Terraform destructive/replacement count: ${DESTRUCTIVE_COUNT}"

          if [[ "${CHANGE_COUNT}" -eq 0 ]]; then
            echo "Terraform detected no infrastructure changes. Apply will be skipped."
            echo "plan_has_changes=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Terraform detected infrastructure changes. Apply is allowed if no destructive actions are present."
          echo "plan_has_changes=true" >> "${GITHUB_OUTPUT}"

          if [[ "${DESTRUCTIVE_COUNT}" -gt 0 ]]; then
            echo "plan_has_destructive_changes=true" >> "${GITHUB_OUTPUT}"
            echo "Terraform plan includes delete or replacement actions."
            echo "The following resources would be deleted or replaced:"
            jq -r '.resource_changes[]? | select(.change.actions | index("delete")) | "- " + .address + " actions=" + (.change.actions | join(","))' tfplan.json

            if [[ "${ALLOW_REPLACEMENT}" != "true" ]]; then
              echo "Blocking apply to avoid destroying or recreating application infrastructure."
              echo "To allow intentional replacement, run workflow_dispatch with allow_replacement=true."
              exit 1
            fi
          else
            echo "No delete or replacement actions detected. In-place updates are allowed."
          fi

      - name: Upload Terraform plan
        if: steps.plan.outputs.plan_has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ env.ENVIRONMENT }}
          path: terraform/tfplan
          retention-days: 1

  deploy-nonprod:
    name: Deploy / Apply Non-Prod
    runs-on: ubuntu-latest
    needs:
      - build
      - test
    if: always() && needs.test.result == 'success' && needs.test.outputs.plan_has_changes == 'true' && needs.build.outputs.action != 'plan' && needs.build.outputs.environment != 'prod'
    env:
      ENVIRONMENT: ${{ needs.build.outputs.environment }}
      ACTION: ${{ needs.build.outputs.action }}
      STATE_KEY: ${{ needs.build.outputs.state_key }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformDeployNonProd

      - name: Confirm AWS identity
        shell: bash
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        shell: bash
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ env.ENVIRONMENT }}
          path: terraform

      - name: Terraform Apply or Destroy
        working-directory: terraform
        shell: bash
        run: terraform apply -auto-approve tfplan

  deploy-prod:
    name: Deploy / Apply Prod
    runs-on: ubuntu-latest
    needs:
      - build
      - test
    if: always() && needs.test.result == 'success' && needs.test.outputs.plan_has_changes == 'true' && needs.build.outputs.action != 'plan' && needs.build.outputs.environment == 'prod'
    environment: prod
    env:
      ENVIRONMENT: ${{ needs.build.outputs.environment }}
      ACTION: ${{ needs.build.outputs.action }}
      STATE_KEY: ${{ needs.build.outputs.state_key }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformDeployProd

      - name: Confirm AWS identity
        shell: bash
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        shell: bash
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ env.ENVIRONMENT }}
          path: terraform

      - name: Terraform Apply or Destroy
        working-directory: terraform
        shell: bash
        run: terraform apply -auto-approve tfplan
