name: Build, Test, and Deploy Todo App

on:
  push:
    branches:
      - dev
      - uat
      - prod
    paths:
      - "frontend/**"
      - "backend/**"
      - "terraform/**"
      - ".github/workflows/deploy.yml"

  pull_request:
    branches:
      - uat
      - prod
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
    paths:
      - "frontend/**"
      - "backend/**"
      - "terraform/**"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - uat
          - prod
      terraform_action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read
  pull-requests: read

concurrency:
  group: todo-3tier-${{ github.event_name }}-${{ github.ref_name }}-${{ github.event.inputs.environment || github.base_ref || github.ref_name }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  IMAGE_TAG: latest
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

jobs:
  validate-promotion-path:
    name: Validate Promotion Path
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate source and target branch
        shell: bash
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          TARGET_BRANCH="${{ github.base_ref }}"

          echo "Source branch: ${SOURCE_BRANCH}"
          echo "Target branch: ${TARGET_BRANCH}"

          if [[ "${TARGET_BRANCH}" == "uat" && "${SOURCE_BRANCH}" == "dev" ]]; then
            echo "Valid promotion path: dev -> uat"
            exit 0
          fi

          if [[ "${TARGET_BRANCH}" == "prod" && "${SOURCE_BRANCH}" == "uat" ]]; then
            echo "Valid promotion path: uat -> prod"
            echo "Production deployment will require GitHub Environment approval on prod after merge."
            exit 0
          fi

          echo "Invalid promotion path."
          echo "Allowed promotion paths are:"
          echo "  dev -> uat"
          echo "  uat -> prod"
          exit 1

  set-environment:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      tfvars_file: ${{ steps.resolve.outputs.tfvars_file }}
      terraform_action: ${{ steps.resolve.outputs.terraform_action }}
    steps:
      - name: Resolve deployment environment
        id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            TERRAFORM_ACTION="${{ github.event.inputs.terraform_action }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ENVIRONMENT="${{ github.base_ref }}"
            TERRAFORM_ACTION="plan"
          else
            case "${{ github.ref_name }}" in
              dev)
                ENVIRONMENT="dev"
                ;;
              uat)
                ENVIRONMENT="uat"
                ;;
              prod)
                ENVIRONMENT="prod"
                ;;
              *)
                echo "Unsupported branch: ${{ github.ref_name }}"
                exit 1
                ;;
            esac
            TERRAFORM_ACTION="apply"
          fi

          TFVARS_FILE="terraform/environments/${ENVIRONMENT}.tfvars"

          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "tfvars_file=${TFVARS_FILE}" >> "$GITHUB_OUTPUT"
          echo "terraform_action=${TERRAFORM_ACTION}" >> "$GITHUB_OUTPUT"

          echo "Environment: ${ENVIRONMENT}"
          echo "TFVars file: ${TFVARS_FILE}"
          echo "Terraform action: ${TERRAFORM_ACTION}"

  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    needs:
      - validate-promotion-path
      - set-environment
    if: |
      always() &&
      (
        github.event_name != 'pull_request' ||
        needs.validate-promotion-path.result == 'success'
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required variables
        shell: bash
        run: |
          REQUIRED_VARS=(
            "AWS_REGION"
            "PROJECT_NAME"
            "BOOTSTRAP_ROLE_ARN"
            "TERRAFORM_VERSION"
            "TF_STATE_BUCKET"
            "DB_PASSWORD"
          )

          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME}" ]]; then
              echo "Missing required GitHub variable or secret: ${VAR_NAME}"
              exit 1
            fi
          done

          if [[ ! -f "${{ needs.set-environment.outputs.tfvars_file }}" ]]; then
            echo "Missing tfvars file: ${{ needs.set-environment.outputs.tfvars_file }}"
            exit 1
          fi

          echo "Required variables and tfvars file are present."

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions

      - name: Confirm AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${PROJECT_NAME}/${{ needs.set-environment.outputs.environment }}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var-file="environments/${{ needs.set-environment.outputs.environment }}.tfvars" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${IMAGE_TAG}" \
            -out=tfplan

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs:
      - set-environment
      - validate
    if: github.event_name != 'pull_request' && needs.set-environment.outputs.terraform_action != 'destroy'

    outputs:
      frontend_image: ${{ steps.image.outputs.frontend_image }}
      backend_image: ${{ steps.image.outputs.backend_image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${PROJECT_NAME}/${{ needs.set-environment.outputs.environment }}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Create or Update ECR Repositories
        working-directory: terraform
        run: |
          terraform apply -target=module.ecr -auto-approve \
            -var-file="environments/${{ needs.set-environment.outputs.environment }}.tfvars" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${IMAGE_TAG}"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Images
        id: image
        shell: bash
        run: |
          ENVIRONMENT="${{ needs.set-environment.outputs.environment }}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          FRONTEND_REPO="${PROJECT_NAME}/${ENVIRONMENT}/todo-frontend"
          BACKEND_REPO="${PROJECT_NAME}/${ENVIRONMENT}/todo-backend"

          FRONTEND_IMAGE_LATEST="${REGISTRY}/${FRONTEND_REPO}:latest"
          BACKEND_IMAGE_LATEST="${REGISTRY}/${BACKEND_REPO}:latest"
          FRONTEND_IMAGE_SHA="${REGISTRY}/${FRONTEND_REPO}:${GITHUB_SHA}"
          BACKEND_IMAGE_SHA="${REGISTRY}/${BACKEND_REPO}:${GITHUB_SHA}"

          docker build -t "${FRONTEND_IMAGE_LATEST}" -t "${FRONTEND_IMAGE_SHA}" ./frontend
          docker build -t "${BACKEND_IMAGE_LATEST}" -t "${BACKEND_IMAGE_SHA}" ./backend

          docker push "${FRONTEND_IMAGE_LATEST}"
          docker push "${FRONTEND_IMAGE_SHA}"
          docker push "${BACKEND_IMAGE_LATEST}"
          docker push "${BACKEND_IMAGE_SHA}"

          echo "frontend_image=${FRONTEND_IMAGE_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${BACKEND_IMAGE_SHA}" >> "$GITHUB_OUTPUT"

  test:
    name: Test Docker Images
    runs-on: ubuntu-latest
    needs:
      - set-environment
      - build
    if: github.event_name != 'pull_request' && needs.set-environment.outputs.terraform_action != 'destroy'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull Docker Images From ECR
        shell: bash
        run: |
          docker pull "${{ needs.build.outputs.frontend_image }}"
          docker pull "${{ needs.build.outputs.backend_image }}"

      - name: Test Frontend Docker Image
        shell: bash
        run: |
          docker run -d --name todo-frontend-test -p 8080:80 "${{ needs.build.outputs.frontend_image }}"
          sleep 10
          curl -f http://localhost:8080 || (docker logs todo-frontend-test && exit 1)
          docker rm -f todo-frontend-test

      - name: Start MySQL Test Database
        shell: bash
        run: |
          docker network create todo-test-network

          docker run -d --name todo-mysql-test \
            --network todo-test-network \
            -e MYSQL_DATABASE=todoapp \
            -e MYSQL_USER=todo_admin \
            -e MYSQL_PASSWORD=test-password \
            -e MYSQL_ROOT_PASSWORD=root-password \
            mysql:8.0

          for i in {1..30}; do
            if docker exec todo-mysql-test mysqladmin ping -h 127.0.0.1 -uroot -proot-password --silent; then
              echo "MySQL test database is ready."
              exit 0
            fi
            echo "Waiting for MySQL test database..."
            sleep 5
          done

          docker logs todo-mysql-test
          exit 1

      - name: Test Backend Docker Image
        shell: bash
        run: |
          docker run -d --name todo-backend-test \
            --network todo-test-network \
            -p 8000:8000 \
            -e DB_HOST="todo-mysql-test" \
            -e DB_PORT="3306" \
            -e DB_NAME="todoapp" \
            -e DB_USER="todo_admin" \
            -e DB_PASSWORD="test-password" \
            "${{ needs.build.outputs.backend_image }}"

          sleep 15
          curl -f http://localhost:8000/health || (docker logs todo-backend-test && exit 1)
          curl -f http://localhost:8000/todos || true

      - name: Cleanup Test Containers
        if: always()
        shell: bash
        run: |
          docker rm -f todo-frontend-test todo-backend-test todo-mysql-test || true
          docker network rm todo-test-network || true

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs:
      - set-environment
      - validate
      - build
      - test
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      (
        needs.set-environment.outputs.terraform_action == 'destroy' ||
        (needs.build.result == 'success' && needs.test.result == 'success')
      )
    environment: ${{ needs.set-environment.outputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${PROJECT_NAME}/${{ needs.set-environment.outputs.environment }}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        if: needs.set-environment.outputs.terraform_action == 'plan'
        working-directory: terraform
        run: |
          terraform plan \
            -var-file="environments/${{ needs.set-environment.outputs.environment }}.tfvars" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${IMAGE_TAG}" \
            -out=tfplan

      - name: Terraform Apply Full Stack
        if: needs.set-environment.outputs.terraform_action == 'apply'
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var-file="environments/${{ needs.set-environment.outputs.environment }}.tfvars" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${IMAGE_TAG}"

      - name: Terraform Destroy
        if: needs.set-environment.outputs.terraform_action == 'destroy'
        working-directory: terraform
        run: |
          terraform destroy -auto-approve \
            -var-file="environments/${{ needs.set-environment.outputs.environment }}.tfvars" \
            -var="db_password=${DB_PASSWORD}" \
            -var="image_tag=${IMAGE_TAG}"

      - name: Terraform Outputs
        if: needs.set-environment.outputs.terraform_action == 'apply'
        working-directory: terraform
        run: terraform output
