name: Deploy Infrastructure

on:
  workflow_call:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: string
      action:
        description: Terraform action
        required: true
        type: string
      workload:
        description: Workload scope
        required: false
        type: string
        default: infra
      frontend_image_tag:
        description: Frontend image tag
        required: false
        type: string
        default: latest
      backend_image_tag:
        description: Backend image tag
        required: false
        type: string
        default: latest
    secrets:
      DB_PASSWORD:
        required: true

  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
        default: dev
      action:
        description: Terraform action
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan
      workload:
        description: Workload scope
        required: true
        type: choice
        options:
          - infra
          - frontend
          - backend
          - app
        default: infra
      frontend_image_tag:
        description: Frontend image tag
        required: false
        type: string
        default: latest
      backend_image_tag:
        description: Backend image tag
        required: false
        type: string
        default: latest

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION || '1.9.0' }}

jobs:
  resolve:
    name: Resolve Deploy Inputs
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      action: ${{ steps.resolve.outputs.action }}
      workload: ${{ steps.resolve.outputs.workload }}
      tfvars_file: ${{ steps.resolve.outputs.tfvars_file }}
      state_key: ${{ steps.resolve.outputs.state_key }}
      frontend_image_tag: ${{ steps.resolve.outputs.frontend_image_tag }}
      backend_image_tag: ${{ steps.resolve.outputs.backend_image_tag }}
      target_args: ${{ steps.resolve.outputs.target_args }}

    steps:
      - name: Resolve inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_VARS=("AWS_REGION" "AWS_ACCOUNT_ID" "PROJECT_NAME" "BOOTSTRAP_ROLE_ARN" "TF_STATE_BUCKET")
          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME}" ]]; then
              echo "Missing required GitHub Actions variable: ${VAR_NAME}"
              exit 1
            fi
          done

          if [[ -z "${{ secrets.DB_PASSWORD }}" ]]; then
            echo "Missing required GitHub Actions secret: DB_PASSWORD"
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment || 'dev' }}"
            ACTION="${{ github.event.inputs.action || 'plan' }}"
            WORKLOAD="${{ github.event.inputs.workload || 'infra' }}"
            FRONTEND_IMAGE_TAG="${{ github.event.inputs.frontend_image_tag || 'latest' }}"
            BACKEND_IMAGE_TAG="${{ github.event.inputs.backend_image_tag || 'latest' }}"
          else
            ENVIRONMENT="${{ inputs.environment || 'dev' }}"
            ACTION="${{ inputs.action || 'plan' }}"
            WORKLOAD="${{ inputs.workload || 'infra' }}"
            FRONTEND_IMAGE_TAG="${{ inputs.frontend_image_tag || 'latest' }}"
            BACKEND_IMAGE_TAG="${{ inputs.backend_image_tag || 'latest' }}"
          fi

          case "${ENVIRONMENT}" in
            dev|uat|prod) ;;
            *)
              echo "Invalid environment: ${ENVIRONMENT}"
              exit 1
              ;;
          esac

          case "${ACTION}" in
            plan|apply) ;;
            *)
              echo "Invalid action: ${ACTION}"
              echo "Allowed actions: plan, apply"
              exit 1
              ;;
          esac

          if [[ "${ENVIRONMENT}" == "prod" && "${ACTION}" != "apply" ]]; then
            echo "Production deployments must use the apply action."
            exit 1
          fi

          case "${WORKLOAD}" in
            infra|frontend|backend|app) ;;
            *)
              echo "Invalid workload: ${WORKLOAD}"
              exit 1
              ;;
          esac

          TFVARS_FILE="environments/${ENVIRONMENT}.tfvars"
          STATE_KEY="${PROJECT_NAME}/${ENVIRONMENT}/terraform.tfstate"

          TARGET_ARGS=""
          if [[ "${WORKLOAD}" == "frontend" ]]; then
            TARGET_ARGS="-target=module.frontend_compute"
          elif [[ "${WORKLOAD}" == "backend" ]]; then
            TARGET_ARGS="-target=module.backend_compute -target=module.frontend_compute"
          elif [[ "${WORKLOAD}" == "app" ]]; then
            TARGET_ARGS="-target=module.frontend_compute -target=module.backend_compute"
          fi

          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "action=${ACTION}" >> "$GITHUB_OUTPUT"
          echo "workload=${WORKLOAD}" >> "$GITHUB_OUTPUT"
          echo "tfvars_file=${TFVARS_FILE}" >> "$GITHUB_OUTPUT"
          echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"
          echo "frontend_image_tag=${FRONTEND_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "backend_image_tag=${BACKEND_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "target_args=${TARGET_ARGS}" >> "$GITHUB_OUTPUT"

  plan:
    name: Terraform Validate and Plan
    needs:
      - resolve
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
      TFVARS_FILE: ${{ needs.resolve.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
      FRONTEND_IMAGE_TAG: ${{ needs.resolve.outputs.frontend_image_tag }}
      BACKEND_IMAGE_TAG: ${{ needs.resolve.outputs.backend_image_tag }}
      TARGET_ARGS: ${{ needs.resolve.outputs.target_args }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformPlan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform fmt, init, and validate
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f "${TFVARS_FILE}" ]]; then
            echo "Missing tfvars file: terraform/${TFVARS_FILE}"
            exit 1
          fi

          terraform fmt -check -recursive

          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

          terraform validate

      - name: Reconcile existing singleton resources into state
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          TF_IMPORT_ARGS=(
            -var-file="${TFVARS_FILE}"
            -var="aws_region=${AWS_REGION}"
            -var="project_name=${PROJECT_NAME}"
            -var="db_password=${DB_PASSWORD}"
            -var="frontend_image_tag=${FRONTEND_IMAGE_TAG}"
            -var="backend_image_tag=${BACKEND_IMAGE_TAG}"
          )

          tf_import_if_missing() {
            local address="$1"
            local import_id="$2"
            local check_cmd="$3"

            if terraform state show "$address" >/dev/null 2>&1; then
              return 0
            fi

            if eval "$check_cmd" >/dev/null 2>&1; then
              echo "Importing ${address} from ${import_id}"
              terraform import "${TF_IMPORT_ARGS[@]}" "$address" "$import_id"
            fi
          }

          PROJECT_ENV_PREFIX="${PROJECT_NAME}-${ENVIRONMENT}"

          # IAM roles
          tf_import_if_missing "module.backend_compute.aws_iam_role.this" "${PROJECT_ENV_PREFIX}-backend-ec2-role" "aws iam get-role --role-name ${PROJECT_ENV_PREFIX}-backend-ec2-role --output json"
          tf_import_if_missing "module.frontend_compute.aws_iam_role.this" "${PROJECT_ENV_PREFIX}-frontend-ec2-role" "aws iam get-role --role-name ${PROJECT_ENV_PREFIX}-frontend-ec2-role --output json"
          tf_import_if_missing "module.database.aws_iam_role.rds_enhanced_monitoring" "${PROJECT_ENV_PREFIX}-rds-enhanced-monitoring-role" "aws iam get-role --role-name ${PROJECT_ENV_PREFIX}-rds-enhanced-monitoring-role --output json"

          # IAM instance profiles
          tf_import_if_missing "module.backend_compute.aws_iam_instance_profile.this" "${PROJECT_ENV_PREFIX}-backend-instance-profile" "aws iam get-instance-profile --instance-profile-name ${PROJECT_ENV_PREFIX}-backend-instance-profile --output json"
          tf_import_if_missing "module.frontend_compute.aws_iam_instance_profile.this" "${PROJECT_ENV_PREFIX}-frontend-instance-profile" "aws iam get-instance-profile --instance-profile-name ${PROJECT_ENV_PREFIX}-frontend-instance-profile --output json"

          # IAM inline and attached policies
          tf_import_if_missing "module.backend_compute.aws_iam_role_policy.ecr_read[0]" "${PROJECT_ENV_PREFIX}-backend-ec2-role:${PROJECT_ENV_PREFIX}-backend-ecr-read" "aws iam get-role-policy --role-name ${PROJECT_ENV_PREFIX}-backend-ec2-role --policy-name ${PROJECT_ENV_PREFIX}-backend-ecr-read --output json"
          tf_import_if_missing "module.frontend_compute.aws_iam_role_policy.ecr_read[0]" "${PROJECT_ENV_PREFIX}-frontend-ec2-role:${PROJECT_ENV_PREFIX}-frontend-ecr-read" "aws iam get-role-policy --role-name ${PROJECT_ENV_PREFIX}-frontend-ec2-role --policy-name ${PROJECT_ENV_PREFIX}-frontend-ecr-read --output json"
          tf_import_if_missing "module.backend_compute.aws_iam_role_policy_attachment.ssm" "${PROJECT_ENV_PREFIX}-backend-ec2-role/arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore" "aws iam list-attached-role-policies --role-name ${PROJECT_ENV_PREFIX}-backend-ec2-role --query \"contains(AttachedPolicies[].PolicyArn, 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore')\" --output text | grep -q true"
          tf_import_if_missing "module.frontend_compute.aws_iam_role_policy_attachment.ssm" "${PROJECT_ENV_PREFIX}-frontend-ec2-role/arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore" "aws iam list-attached-role-policies --role-name ${PROJECT_ENV_PREFIX}-frontend-ec2-role --query \"contains(AttachedPolicies[].PolicyArn, 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore')\" --output text | grep -q true"
          tf_import_if_missing "module.database.aws_iam_role_policy_attachment.rds_enhanced_monitoring" "${PROJECT_ENV_PREFIX}-rds-enhanced-monitoring-role/arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole" "aws iam list-attached-role-policies --role-name ${PROJECT_ENV_PREFIX}-rds-enhanced-monitoring-role --query \"contains(AttachedPolicies[].PolicyArn, 'arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole')\" --output text | grep -q true"

      - name: Terraform plan
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          PLAN_ARGS=(
            -var-file="${TFVARS_FILE}"
            -var="aws_region=${AWS_REGION}"
            -var="project_name=${PROJECT_NAME}"
            -var="db_password=${DB_PASSWORD}"
            -var="frontend_image_tag=${FRONTEND_IMAGE_TAG}"
            -var="backend_image_tag=${BACKEND_IMAGE_TAG}"
            -out=tfplan
          )

          PLAN_LOG="plan.log"

          set +e
          terraform plan ${TARGET_ARGS} "${PLAN_ARGS[@]}" >"${PLAN_LOG}" 2>&1
          PLAN_EXIT=$?
          set -e

          cat "${PLAN_LOG}"

          if [[ ${PLAN_EXIT} -ne 0 ]]; then
            if grep -q "Moved resource instances excluded by targeting" "${PLAN_LOG}"; then
              echo "Targeted plan failed because resources moved. Retrying full plan without -target."
              terraform plan "${PLAN_ARGS[@]}"
            else
              exit ${PLAN_EXIT}
            fi
          fi

      - name: Show DB plan changes
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail
          terraform show -json tfplan > tfplan.json

          DB_CHANGES="$(jq -r '.resource_changes[]? | select(.address == "module.database.aws_db_instance.this") | .change.actions | join(",")' tfplan.json)"

          if [[ -n "${DB_CHANGES}" ]]; then
            echo "Database resource actions: ${DB_CHANGES}"
            jq -r '.resource_changes[]? | select(.address == "module.database.aws_db_instance.this") | {address, actions: .change.actions, before: .change.before, after: .change.after, after_unknown: .change.after_unknown}' tfplan.json
          else
            echo "No database changes in this plan."
          fi

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ needs.resolve.outputs.environment }}
          path: |
            terraform/tfplan
          if-no-files-found: error

  apply:
    name: Terraform Apply
    needs:
      - resolve
      - plan
    if: needs.resolve.outputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.environment == 'prod' && 'prod' || '' }}
    env:
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformApply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ needs.resolve.outputs.environment }}
          path: terraform

      - name: Terraform apply
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail
          terraform apply -auto-approve tfplan
