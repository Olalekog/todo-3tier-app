name: SonarQube Infrastructure Deploy

on:
  push:
    branches:
      - dev
    paths:
      - "terraform/security-tools/deploy/**"
      - "terraform/templates/user_data_sonarqube.sh.tftpl"
      - ".github/workflows/sonarqube-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION || '1.9.0' }}

jobs:
  resolve:
    name: Resolve SonarQube Inputs
    runs-on: ubuntu-latest
    outputs:
      tfvars_file: ${{ steps.resolve.outputs.tfvars_file }}
      state_key: ${{ steps.resolve.outputs.state_key }}

    steps:
      - name: Resolve inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          ACTION="apply"

          TFVARS_FILE="environments/dev.tfvars"
          STATE_KEY="${PROJECT_NAME}/dev/terraform.tfstate"

          echo "tfvars_file=${TFVARS_FILE}" >> "$GITHUB_OUTPUT"
          echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"

  plan-sonarqube:
    name: Terraform Plan SonarQube
    runs-on: ubuntu-latest
    needs:
      - resolve
    env:
      TFVARS_FILE: ${{ needs.resolve.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      SONARQUBE_TFVARS_FILE: security-tools/deploy/sonarqube.tfvars
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsSonarQubePlan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init and validate
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"
          terraform validate

      - name: Remove terminated SonarQube instance from state
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_ADDRESS="module.security_integration.module.sonarqube_compute[0].aws_instance.this"
          INSTANCE_ID="$(terraform state show "${INSTANCE_ADDRESS}" 2>/dev/null | awk -F ' = ' '/^[[:space:]]*id[[:space:]]*=/{print $2; exit}' || true)"

          if [[ -z "${INSTANCE_ID}" ]]; then
            echo "No SonarQube EC2 instance currently tracked in Terraform state."
            exit 0
          fi

          INSTANCE_STATE="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --instance-ids "${INSTANCE_ID}" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text 2>/dev/null || true)"

          echo "Tracked SonarQube instance ${INSTANCE_ID} state: ${INSTANCE_STATE:-not-found}"

          if [[ -z "${INSTANCE_STATE}" || "${INSTANCE_STATE}" == "None" || "${INSTANCE_STATE}" == "terminated" || "${INSTANCE_STATE}" == "shutting-down" ]]; then
            echo "Removing stale SonarQube instance from Terraform state so it can be recreated."
            terraform state rm "${INSTANCE_ADDRESS}"
          fi

      - name: Reconcile existing SonarQube resources into state
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          TF_IMPORT_ARGS=(
            -var-file="${TFVARS_FILE}"
            -var-file="${SONARQUBE_TFVARS_FILE}"
            -var="aws_region=${AWS_REGION}"
            -var="project_name=${PROJECT_NAME}"
            -var="db_password=${DB_PASSWORD}"
          )

          tf_import_if_missing() {
            local address="$1"
            local import_id="$2"
            local check_cmd="$3"

            if terraform state show "$address" >/dev/null 2>&1; then
              return 0
            fi

            if eval "$check_cmd" >/dev/null 2>&1; then
              echo "Importing ${address} from ${import_id}"
              terraform import "${TF_IMPORT_ARGS[@]}" "$address" "$import_id"
            fi
          }

          PROJECT_ENV_PREFIX="${PROJECT_NAME}-dev"
          SONARQUBE_ROLE="${PROJECT_ENV_PREFIX}-sonarqube-ec2-role"
          SONARQUBE_PROFILE="${PROJECT_ENV_PREFIX}-sonarqube-instance-profile"
          SONARQUBE_SG_NAME="${PROJECT_ENV_PREFIX}-sonarqube-sg"
          SONARQUBE_INSTANCE_NAME="${PROJECT_ENV_PREFIX}-sonarqube"
          VPC_ID="$(terraform state show module.network.aws_vpc.main 2>/dev/null | awk -F ' = ' '/^[[:space:]]*id[[:space:]]*=/{print $2; exit}' || true)"

          if [[ -n "${VPC_ID}" ]]; then
            SONARQUBE_SG_ID="$(aws ec2 describe-security-groups \
              --region "${AWS_REGION}" \
              --filters "Name=group-name,Values=${SONARQUBE_SG_NAME}" "Name=vpc-id,Values=${VPC_ID}" \
              --query 'SecurityGroups[0].GroupId' \
              --output text 2>/dev/null || true)"
          else
            SONARQUBE_SG_ID=""
          fi

          SONARQUBE_INSTANCE_ID="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=${SONARQUBE_INSTANCE_NAME}" "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text | awk '{print $1}')"

          tf_import_if_missing "module.security_integration.module.sonarqube_compute[0].aws_iam_role.this" "${SONARQUBE_ROLE}" "aws iam get-role --role-name ${SONARQUBE_ROLE} --output json"
          tf_import_if_missing "module.security_integration.module.sonarqube_compute[0].aws_iam_instance_profile.this" "${SONARQUBE_PROFILE}" "aws iam get-instance-profile --instance-profile-name ${SONARQUBE_PROFILE} --output json"
          tf_import_if_missing "module.security_integration.module.sonarqube_compute[0].aws_iam_role_policy_attachment.ssm" "${SONARQUBE_ROLE}/arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore" "aws iam list-attached-role-policies --role-name ${SONARQUBE_ROLE} --query \"contains(AttachedPolicies[].PolicyArn, 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore')\" --output text | grep -q true"

          if [[ -n "${SONARQUBE_SG_ID}" && "${SONARQUBE_SG_ID}" != "None" ]]; then
            tf_import_if_missing "module.security_integration.module.security_groups.aws_security_group.sonarqube[0]" "${SONARQUBE_SG_ID}" "aws ec2 describe-security-groups --region ${AWS_REGION} --group-ids ${SONARQUBE_SG_ID} --output json"
          fi

          if [[ -n "${SONARQUBE_INSTANCE_ID}" && "${SONARQUBE_INSTANCE_ID}" != "None" ]]; then
            tf_import_if_missing "module.security_integration.module.sonarqube_compute[0].aws_instance.this" "${SONARQUBE_INSTANCE_ID}" "aws ec2 describe-instances --region ${AWS_REGION} --instance-ids ${SONARQUBE_INSTANCE_ID} --output json"
          fi

      - name: Terraform plan SonarQube
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail
          terraform plan \
            -var-file="${TFVARS_FILE}" \
            -var-file="${SONARQUBE_TFVARS_FILE}" \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="db_password=${DB_PASSWORD}" \
            -target=module.security_integration \
            -out=sonarqube-tfplan

      - name: Upload SonarQube plan
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-plan
          path: terraform/sonarqube-tfplan
          if-no-files-found: error

  apply-sonarqube:
    name: Terraform Apply SonarQube
    runs-on: ubuntu-latest
    needs:
      - resolve
      - plan-sonarqube
    env:
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsSonarQubeApply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download SonarQube plan
        uses: actions/download-artifact@v4
        with:
          name: sonarqube-plan
          path: terraform

      - name: Terraform apply
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail
          terraform apply -auto-approve sonarqube-tfplan

      - name: Show SonarQube URL
        id: sonarqube_url
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail
          SONARQUBE_URL="$(terraform output -raw sonarqube_url || true)"
          echo "sonarqube_url=${SONARQUBE_URL}" >> "$GITHUB_OUTPUT"
          echo "${SONARQUBE_URL}"

      - name: Update SonarQube host variable
        if: steps.sonarqube_url.outputs.sonarqube_url != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SONARQUBE_URL: ${{ steps.sonarqube_url.outputs.sonarqube_url }}
        run: |
          set -euo pipefail
          gh variable set SONAR_HOST_URL --body "${SONARQUBE_URL}" --repo "${GITHUB_REPOSITORY}"

      - name: Wait for SonarQube to become reachable
        if: steps.sonarqube_url.outputs.sonarqube_url != ''
        shell: bash
        run: |
          set -euo pipefail
          URL="${{ steps.sonarqube_url.outputs.sonarqube_url }}"

          echo "Checking SonarQube endpoint: ${URL}"
          for i in {1..40}; do
            if curl -fsS --max-time 8 "${URL}" >/dev/null; then
              echo "SonarQube is reachable."
              exit 0
            fi
            echo "Attempt ${i}/40: SonarQube not ready yet; waiting 15s..."
            sleep 15
          done

          echo "SonarQube did not become reachable in time."
          exit 1

      - name: SonarQube diagnostics on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_NAME="${PROJECT_NAME}-dev-sonarqube"
          INSTANCE_ID="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=${INSTANCE_NAME}" "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text | awk '{print $1}')"

          if [[ -n "${INSTANCE_ID}" && "${INSTANCE_ID}" != "None" ]]; then
            echo "Instance: ${INSTANCE_ID}"
            aws ec2 describe-instances \
              --region "${AWS_REGION}" \
              --instance-ids "${INSTANCE_ID}" \
              --query 'Reservations[].Instances[].{State:State.Name,PublicIp:PublicIpAddress,PrivateIp:PrivateIpAddress,Subnet:SubnetId,SGs:SecurityGroups[].GroupId,LaunchTime:LaunchTime}'

            echo "Recent console output:"
            aws ec2 get-console-output \
              --region "${AWS_REGION}" \
              --instance-id "${INSTANCE_ID}" \
              --latest \
              --output text || true
          else
            echo "No SonarQube instance found for tag Name=${INSTANCE_NAME}"
          fi
