name: SonarQube Infrastructure Deploy

on:
  push:
    branches:
      - dev
    paths:
      - "terraform/**"
      - ".github/workflows/sonarqube-deploy.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION || '1.9.0' }}

jobs:
  resolve:
    name: Resolve SonarQube Inputs
    runs-on: ubuntu-latest
    outputs:
      tfvars_file: ${{ steps.resolve.outputs.tfvars_file }}
      state_key: ${{ steps.resolve.outputs.state_key }}

    steps:
      - name: Resolve inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          ACTION="apply"

          TFVARS_FILE="environments/dev.tfvars"
          STATE_KEY="${PROJECT_NAME}/sonarqube/terraform.tfstate"

          echo "tfvars_file=${TFVARS_FILE}" >> "$GITHUB_OUTPUT"
          echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"

  plan-sonarqube:
    name: Terraform Plan SonarQube
    runs-on: ubuntu-latest
    needs:
      - resolve
    env:
      TFVARS_FILE: ${{ needs.resolve.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      SONARQUBE_TFVARS_FILE: security-tools/deploy/sonarqube.tfvars
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsSonarQubePlan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init and validate
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"
          terraform validate

      - name: Terraform plan SonarQube
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail
          terraform plan \
            -var-file="${TFVARS_FILE}" \
            -var-file="${SONARQUBE_TFVARS_FILE}" \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="db_password=${DB_PASSWORD}" \
            -target=module.security_integration \
            -out=sonarqube-tfplan

      - name: Upload SonarQube plan
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-plan
          path: terraform/sonarqube-tfplan
          if-no-files-found: error

  apply-sonarqube:
    name: Terraform Apply SonarQube
    runs-on: ubuntu-latest
    needs:
      - resolve
      - plan-sonarqube
    env:
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsSonarQubeApply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download SonarQube plan
        uses: actions/download-artifact@v4
        with:
          name: sonarqube-plan
          path: terraform

      - name: Terraform apply
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail
          terraform apply -auto-approve sonarqube-tfplan

      - name: Show SonarQube URL
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail
          terraform output sonarqube_url || true