name: SonarQube Infrastructure Deploy

on:
  push:
    branches:
      - dev
    paths:
      - "terraform/security-tools/deploy/**"
      - "terraform/templates/user_data_sonarqube.sh.tftpl"
      - ".github/workflows/sonarqube-deploy.yml"
  workflow_dispatch:
    inputs:
      allow_recreate:
        description: Allow replacement of the SonarQube EC2 instance
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  actions: write

concurrency:
  group: terraform-sonarqube-dev
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  BOOTSTRAP_ROLE_ARN: ${{ vars.BOOTSTRAP_ROLE_ARN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION || '1.9.0' }}

jobs:
  resolve:
    name: Resolve SonarQube Inputs
    runs-on: ubuntu-latest
    outputs:
      tfvars_file: ${{ steps.resolve.outputs.tfvars_file }}
      state_key: ${{ steps.resolve.outputs.state_key }}
      app_state_key: ${{ steps.resolve.outputs.app_state_key }}
      allow_recreate: ${{ steps.resolve.outputs.allow_recreate }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          ACTION="apply"
          ALLOW_RECREATE="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_recreate || 'false' }}"

          TFVARS_FILE="sonarqube.tfvars"
          STATE_KEY="${PROJECT_NAME}/dev/security-tools/sonarqube.tfstate"
          APP_STATE_KEY="${PROJECT_NAME}/dev/terraform.tfstate"

          if [[ "${{ github.event_name }}" == "push" ]]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"

            if [[ -z "${BEFORE}" || "${BEFORE}" == "0000000000000000000000000000000000000000" ]]; then
              CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "${AFTER}")"
            else
              CHANGED_FILES="$(git diff --name-only "${BEFORE}" "${AFTER}")"
            fi

            echo "Changed files:"
            echo "${CHANGED_FILES}"

            if echo "${CHANGED_FILES}" | grep -Eq '^(terraform/security-tools/deploy/|terraform/templates/user_data_sonarqube\.sh\.tftpl)'; then
              ALLOW_RECREATE="true"
            fi
          fi

          echo "tfvars_file=${TFVARS_FILE}" >> "$GITHUB_OUTPUT"
          echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"
          echo "app_state_key=${APP_STATE_KEY}" >> "$GITHUB_OUTPUT"
          echo "allow_recreate=${ALLOW_RECREATE}" >> "$GITHUB_OUTPUT"

  plan-sonarqube:
    name: Terraform Plan SonarQube
    runs-on: ubuntu-latest
    needs:
      - resolve
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    env:
      TFVARS_FILE: ${{ needs.resolve.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
      ENVIRONMENT: dev
      ALLOWED_SSH_CIDR: 0.0.0.0/0
      USER_DATA_TEMPLATE_PATH: ../../templates/user_data_sonarqube.sh.tftpl
      ALLOW_RECREATE: ${{ needs.resolve.outputs.allow_recreate }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsSonarQubePlan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init and validate
        working-directory: terraform/security-tools/deploy
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"
          terraform validate

      - name: Resolve app network for SonarQube
        id: network
        shell: bash
        run: |
          set -euo pipefail

          VPC_NAME="${PROJECT_NAME}-${ENVIRONMENT}-vpc"
          SUBNET_NAME="${PROJECT_NAME}-${ENVIRONMENT}-public-1"

          VPC_ID="$(aws ec2 describe-vpcs \
            --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=${VPC_NAME}" "Name=state,Values=available" \
            --query 'Vpcs[0].VpcId' \
            --output text)"

          if [[ -z "${VPC_ID}" || "${VPC_ID}" == "None" ]]; then
            echo "No available app VPC found with tag Name=${VPC_NAME}."
            exit 1
          fi

          SONARQUBE_SUBNET_ID="$(aws ec2 describe-subnets \
            --region "${AWS_REGION}" \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=tag:Name,Values=${SUBNET_NAME}" \
            --query 'Subnets[0].SubnetId' \
            --output text)"

          if [[ -z "${SONARQUBE_SUBNET_ID}" || "${SONARQUBE_SUBNET_ID}" == "None" ]]; then
            echo "No public subnet found with tag Name=${SUBNET_NAME} in VPC ${VPC_ID}."
            exit 1
          fi

          echo "vpc_id=${VPC_ID}" >> "$GITHUB_OUTPUT"
          echo "sonarqube_subnet_id=${SONARQUBE_SUBNET_ID}" >> "$GITHUB_OUTPUT"

      - name: Remove terminated SonarQube instance from state
        working-directory: terraform/security-tools/deploy
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_ADDRESS="module.sonarqube_compute[0].aws_instance.this"
          INSTANCE_ID="$(terraform state show "${INSTANCE_ADDRESS}" 2>/dev/null | awk -F ' = ' '/^[[:space:]]*id[[:space:]]*=/{print $2; exit}' || true)"

          if [[ -z "${INSTANCE_ID}" ]]; then
            echo "No SonarQube EC2 instance currently tracked in Terraform state."
            exit 0
          fi

          INSTANCE_STATE="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --instance-ids "${INSTANCE_ID}" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text 2>/dev/null || true)"

          echo "Tracked SonarQube instance ${INSTANCE_ID} state: ${INSTANCE_STATE:-not-found}"

          if [[ -z "${INSTANCE_STATE}" || "${INSTANCE_STATE}" == "None" || "${INSTANCE_STATE}" == "terminated" || "${INSTANCE_STATE}" == "shutting-down" ]]; then
            echo "Removing stale SonarQube instance from Terraform state so it can be recreated."
            terraform state rm "${INSTANCE_ADDRESS}"
          fi

      - name: Reconcile existing SonarQube resources into state
        working-directory: terraform/security-tools/deploy
        shell: bash
        env:
          VPC_ID: ${{ steps.network.outputs.vpc_id }}
          SONARQUBE_SUBNET_ID: ${{ steps.network.outputs.sonarqube_subnet_id }}
        run: |
          set -euo pipefail

          TF_IMPORT_ARGS=(
            -var-file="${TFVARS_FILE}"
            -var="aws_region=${AWS_REGION}"
            -var="project_name=${PROJECT_NAME}"
            -var="environment=${ENVIRONMENT}"
            -var="vpc_id=${VPC_ID}"
            -var="sonarqube_subnet_id=${SONARQUBE_SUBNET_ID}"
            -var="allowed_ssh_cidr=${ALLOWED_SSH_CIDR}"
            -var="user_data_template_path=${USER_DATA_TEMPLATE_PATH}"
          )

          tf_import_if_missing() {
            local address="$1"
            local import_id="$2"
            local check_cmd="$3"

            if terraform state show "$address" >/dev/null 2>&1; then
              return 0
            fi

            if eval "$check_cmd" >/dev/null 2>&1; then
              echo "Importing ${address} from ${import_id}"
              terraform import "${TF_IMPORT_ARGS[@]}" "$address" "$import_id"
            fi
          }

          PROJECT_ENV_PREFIX="${PROJECT_NAME}-dev"
          SONARQUBE_ROLE="${PROJECT_ENV_PREFIX}-sonarqube-ec2-role"
          SONARQUBE_PROFILE="${PROJECT_ENV_PREFIX}-sonarqube-instance-profile"
          SONARQUBE_SG_NAME="${PROJECT_ENV_PREFIX}-sonarqube-sg"
          SONARQUBE_INSTANCE_NAME="${PROJECT_ENV_PREFIX}-sonarqube"

          SONARQUBE_SG_ID="$(aws ec2 describe-security-groups \
            --region "${AWS_REGION}" \
            --filters "Name=group-name,Values=${SONARQUBE_SG_NAME}" "Name=vpc-id,Values=${VPC_ID}" \
            --query 'SecurityGroups[0].GroupId' \
            --output text 2>/dev/null || true)"

          SONARQUBE_INSTANCE_ID="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=${SONARQUBE_INSTANCE_NAME}" "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text | awk '{print $1}')"

          tf_import_if_missing "module.sonarqube_compute[0].aws_iam_role.this" "${SONARQUBE_ROLE}" "aws iam get-role --role-name ${SONARQUBE_ROLE} --output json"
          tf_import_if_missing "module.sonarqube_compute[0].aws_iam_instance_profile.this" "${SONARQUBE_PROFILE}" "aws iam get-instance-profile --instance-profile-name ${SONARQUBE_PROFILE} --output json"
          tf_import_if_missing "module.sonarqube_compute[0].aws_iam_role_policy_attachment.ssm" "${SONARQUBE_ROLE}/arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore" "aws iam list-attached-role-policies --role-name ${SONARQUBE_ROLE} --query \"contains(AttachedPolicies[].PolicyArn, 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore')\" --output text | grep -q true"

          if [[ -n "${SONARQUBE_SG_ID}" && "${SONARQUBE_SG_ID}" != "None" ]]; then
            tf_import_if_missing "module.security_groups.aws_security_group.sonarqube[0]" "${SONARQUBE_SG_ID}" "aws ec2 describe-security-groups --region ${AWS_REGION} --group-ids ${SONARQUBE_SG_ID} --output json"
          fi

          if [[ -n "${SONARQUBE_INSTANCE_ID}" && "${SONARQUBE_INSTANCE_ID}" != "None" ]]; then
            tf_import_if_missing "module.sonarqube_compute[0].aws_instance.this" "${SONARQUBE_INSTANCE_ID}" "aws ec2 describe-instances --region ${AWS_REGION} --instance-ids ${SONARQUBE_INSTANCE_ID} --output json"
          fi

      - name: Terraform plan SonarQube
        id: plan
        working-directory: terraform/security-tools/deploy
        shell: bash
        env:
          VPC_ID: ${{ steps.network.outputs.vpc_id }}
          SONARQUBE_SUBNET_ID: ${{ steps.network.outputs.sonarqube_subnet_id }}
        run: |
          set -euo pipefail

          set +e
          terraform plan \
            -detailed-exitcode \
            -var-file="${TFVARS_FILE}" \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="environment=${ENVIRONMENT}" \
            -var="vpc_id=${VPC_ID}" \
            -var="sonarqube_subnet_id=${SONARQUBE_SUBNET_ID}" \
            -var="allowed_ssh_cidr=${ALLOWED_SSH_CIDR}" \
            -var="user_data_template_path=${USER_DATA_TEMPLATE_PATH}" \
            -out=sonarqube-tfplan
          PLAN_EXIT=$?
          set -e

          if [[ "${PLAN_EXIT}" == "0" ]]; then
            echo "SonarQube plan has no changes."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${PLAN_EXIT}" != "2" ]]; then
            exit "${PLAN_EXIT}"
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          terraform show -json sonarqube-tfplan > sonarqube-tfplan.json

          if jq -e '
            .resource_changes[]?
            | select(.address == "module.sonarqube_compute[0].aws_instance.this")
            | select((.change.actions == ["delete","create"]) or (.change.actions == ["create","delete"]))
          ' sonarqube-tfplan.json >/dev/null; then
            if [[ "${ALLOW_RECREATE}" != "true" ]]; then
              echo "SonarQube EC2 replacement is planned, but no SonarQube infrastructure file changed."
              echo "This protects the existing SonarQube instance from recreation caused by workflow-only changes or drift."
              echo "Use workflow_dispatch with allow_recreate=true when replacement is intentional."
              exit 1
            fi

            echo "SonarQube EC2 replacement is allowed because SonarQube infrastructure changed or manual override was selected."
          fi

      - name: Upload SonarQube plan
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-plan
          path: terraform/security-tools/deploy/sonarqube-tfplan
          if-no-files-found: error

  apply-sonarqube:
    name: Terraform Apply SonarQube
    runs-on: ubuntu-latest
    needs:
      - resolve
      - plan-sonarqube
    if: needs.plan-sonarqube.outputs.has_changes == 'true'
    env:
      TFVARS_FILE: ${{ needs.resolve.outputs.tfvars_file }}
      STATE_KEY: ${{ needs.resolve.outputs.state_key }}
      APP_STATE_KEY: ${{ needs.resolve.outputs.app_state_key }}
      ENVIRONMENT: dev
      ALLOWED_SSH_CIDR: 0.0.0.0/0
      USER_DATA_TEMPLATE_PATH: ../../templates/user_data_sonarqube.sh.tftpl
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsSonarQubeApply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform/security-tools/deploy
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Download SonarQube plan
        uses: actions/download-artifact@v4
        with:
          name: sonarqube-plan
          path: terraform/security-tools/deploy

      - name: Resolve app network for SonarQube
        id: network
        shell: bash
        run: |
          set -euo pipefail

          VPC_NAME="${PROJECT_NAME}-${ENVIRONMENT}-vpc"
          SUBNET_NAME="${PROJECT_NAME}-${ENVIRONMENT}-public-1"

          VPC_ID="$(aws ec2 describe-vpcs \
            --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=${VPC_NAME}" "Name=state,Values=available" \
            --query 'Vpcs[0].VpcId' \
            --output text)"

          if [[ -z "${VPC_ID}" || "${VPC_ID}" == "None" ]]; then
            echo "No available app VPC found with tag Name=${VPC_NAME}."
            exit 1
          fi

          SONARQUBE_SUBNET_ID="$(aws ec2 describe-subnets \
            --region "${AWS_REGION}" \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=tag:Name,Values=${SUBNET_NAME}" \
            --query 'Subnets[0].SubnetId' \
            --output text)"

          if [[ -z "${SONARQUBE_SUBNET_ID}" || "${SONARQUBE_SUBNET_ID}" == "None" ]]; then
            echo "No public subnet found with tag Name=${SUBNET_NAME} in VPC ${VPC_ID}."
            exit 1
          fi

          echo "vpc_id=${VPC_ID}" >> "$GITHUB_OUTPUT"
          echo "sonarqube_subnet_id=${SONARQUBE_SUBNET_ID}" >> "$GITHUB_OUTPUT"

      - name: Disable SonarQube termination protection
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_NAME="${PROJECT_NAME}-${ENVIRONMENT}-sonarqube"
          INSTANCE_IDS="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=${INSTANCE_NAME}" "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)"

          if [[ -z "${INSTANCE_IDS}" || "${INSTANCE_IDS}" == "None" ]]; then
            echo "No active SonarQube instances found for tag Name=${INSTANCE_NAME}."
            exit 0
          fi

          for INSTANCE_ID in ${INSTANCE_IDS}; do
            echo "Disabling termination protection on ${INSTANCE_ID}."
            aws ec2 modify-instance-attribute \
              --region "${AWS_REGION}" \
              --instance-id "${INSTANCE_ID}" \
              --no-disable-api-termination
          done

      - name: Terraform apply
        working-directory: terraform/security-tools/deploy
        shell: bash
        env:
          VPC_ID: ${{ steps.network.outputs.vpc_id }}
          SONARQUBE_SUBNET_ID: ${{ steps.network.outputs.sonarqube_subnet_id }}
        run: |
          set -euo pipefail

          set +e
          terraform apply -auto-approve sonarqube-tfplan > apply.log 2>&1
          APPLY_EXIT=$?
          set -e

          cat apply.log

          if [[ ${APPLY_EXIT} -eq 0 ]]; then
            exit 0
          fi

          if ! grep -q "Saved plan is stale" apply.log; then
            exit ${APPLY_EXIT}
          fi

          echo "Saved plan is stale because the Terraform state changed after planning."
          echo "Creating a fresh SonarQube plan now that this workflow owns the Terraform concurrency slot."

          terraform plan \
            -var-file="${TFVARS_FILE}" \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="environment=${ENVIRONMENT}" \
            -var="vpc_id=${VPC_ID}" \
            -var="sonarqube_subnet_id=${SONARQUBE_SUBNET_ID}" \
            -var="allowed_ssh_cidr=${ALLOWED_SSH_CIDR}" \
            -var="user_data_template_path=${USER_DATA_TEMPLATE_PATH}" \
            -out=sonarqube-tfplan

          terraform apply -auto-approve sonarqube-tfplan

      - name: Detach SonarQube resources from app state
        working-directory: terraform
        shell: bash
        run: |
          set -euo pipefail

          terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${APP_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

          ADDRESSES=(
            "module.security_integration.module.sonarqube_compute[0].aws_instance.this"
            "module.security_integration.module.sonarqube_compute[0].aws_iam_instance_profile.this"
            "module.security_integration.module.sonarqube_compute[0].aws_iam_role.this"
            "module.security_integration.module.sonarqube_compute[0].aws_iam_role_policy_attachment.ssm"
            "module.security_integration.module.security_groups.aws_security_group.sonarqube[0]"
          )

          for address in "${ADDRESSES[@]}"; do
            if terraform state show "${address}" >/dev/null 2>&1; then
              echo "Removing ${address} from app Terraform state."
              terraform state rm "${address}"
            else
              echo "${address} is not present in app Terraform state."
            fi
          done

      - name: Show SonarQube URL
        id: sonarqube_url
        working-directory: terraform/security-tools/deploy
        shell: bash
        run: |
          set -euo pipefail
          SONARQUBE_URL="$(terraform output -raw sonarqube_url || true)"
          echo "sonarqube_url=${SONARQUBE_URL}" >> "$GITHUB_OUTPUT"
          echo "${SONARQUBE_URL}"

      - name: Update SonarQube host variable
        if: steps.sonarqube_url.outputs.sonarqube_url != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SONARQUBE_URL: ${{ steps.sonarqube_url.outputs.sonarqube_url }}
        run: |
          set -euo pipefail
          if gh variable set SONAR_HOST_URL --body "${SONARQUBE_URL}" --repo "${GITHUB_REPOSITORY}"; then
            echo "Updated SONAR_HOST_URL to ${SONARQUBE_URL}"
          else
            echo "Warning: could not update SONAR_HOST_URL with the GitHub Actions token."
            echo "The scan workflow resolves the live SonarQube URL from AWS, so deployment can continue."
          fi

      - name: Wait for SonarQube to become reachable
        if: steps.sonarqube_url.outputs.sonarqube_url != ''
        shell: bash
        run: |
          set -euo pipefail
          URL="${{ steps.sonarqube_url.outputs.sonarqube_url }}"

          echo "Checking SonarQube endpoint: ${URL}"
          for i in {1..40}; do
            if curl -fsS --max-time 8 "${URL}" >/dev/null; then
              echo "SonarQube is reachable."
              exit 0
            fi
            echo "Attempt ${i}/40: SonarQube not ready yet; waiting 15s..."
            sleep 15
          done

          echo "SonarQube did not become reachable in time."
          exit 1

      - name: SonarQube diagnostics on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_NAME="${PROJECT_NAME}-dev-sonarqube"
          INSTANCE_ID="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=${INSTANCE_NAME}" "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text | awk '{print $1}')"

          if [[ -n "${INSTANCE_ID}" && "${INSTANCE_ID}" != "None" ]]; then
            echo "Instance: ${INSTANCE_ID}"
            aws ec2 describe-instances \
              --region "${AWS_REGION}" \
              --instance-ids "${INSTANCE_ID}" \
              --query 'Reservations[].Instances[].{State:State.Name,PublicIp:PublicIpAddress,PrivateIp:PrivateIpAddress,Subnet:SubnetId,SGs:SecurityGroups[].GroupId,LaunchTime:LaunchTime}'

            echo "Recent console output:"
            aws ec2 get-console-output \
              --region "${AWS_REGION}" \
              --instance-id "${INSTANCE_ID}" \
              --latest \
              --output text || true
          else
            echo "No SonarQube instance found for tag Name=${INSTANCE_NAME}"
          fi
